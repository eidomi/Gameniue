<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>למידת אנגלית - משחק לימוד מילים</title>
    
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #c78c3a;
            --color-primary-dark: #a06e20;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(160deg, #1a120b 0%, #2d1f0e 40%, #3d2b16 100%);
            --game-accent: #c78c3a;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Noto Sans Hebrew', 'Arial Hebrew', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: var(--space-md);
            left: var(--space-md);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: background var(--transition-fast);
            backdrop-filter: blur(8px);
        }

        .settings-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .settings-toggle:focus-visible {
            outline: 3px solid var(--color-warning);
            outline-offset: 2px;
        }

        .settings-toggle:focus {
            outline: 2px solid rgba(255,255,255,0.6);
        }

        .settings-toggle:active {
            background: rgba(255,255,255,0.35);
            transform: scale(0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-family);
            background: var(--game-gradient);
            color: var(--color-text);
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: var(--space-lg);
            padding-top: 70px;
            direction: rtl;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* Game Container */
        .game-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            box-shadow: var(--shadow-lg);
            width: min(1200px, 95vw);
            position: relative;
            z-index: 1;
        }

        /* Header */
        .game-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .game-title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            color: white;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .game-subtitle {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            color: white;
            min-width: 120px;
            flex: 1;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* Game Modes */
        .game-modes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-button {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mode-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .mode-button.active {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }

        /* Game Board */
        .game-board {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            min-height: 500px;
        }

        /* Question Area */
        .question-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 2em;
            color: white;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .question-category {
            background: var(--game-gradient);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .pronunciation {
            font-size: 1.2em;
            color: rgba(255,255,255,0.7);
            font-style: italic;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .speak-button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-normal);
            font-size: 1.2em;
        }

        .speak-button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .speak-button:active {
            transform: scale(0.95);
        }

        .speak-button.speaking {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Alphabet Board */
        .alphabet-toggle {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition-normal);
            margin-bottom: 15px;
            font-family: var(--font-family);
            backdrop-filter: blur(8px);
        }

        .alphabet-toggle:hover {
            background: rgba(255,255,255,0.2);
        }

        .alphabet-toggle .toggle-arrow {
            transition: transform var(--transition-normal);
            display: inline-block;
        }

        .alphabet-toggle.open .toggle-arrow {
            transform: rotate(180deg);
        }

        .alphabet-board {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 6px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .alphabet-board.open {
            display: grid;
        }

        .letter-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 2px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all var(--transition-fast);
            min-height: 56px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .letter-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }

        .letter-cell:active {
            transform: scale(0.95);
        }

        .letter-cell.speaking {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
        }

        .letter-en {
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            line-height: 1.2;
        }

        .letter-he {
            font-size: 0.75em;
            color: rgba(255,255,255,0.7);
            line-height: 1.2;
        }

        @media (max-width: 480px) {
            .alphabet-board {
                grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
                gap: 4px;
                padding: 10px;
            }
            .letter-cell {
                min-height: 48px;
                padding: 4px 1px;
            }
            .letter-en {
                font-size: 1.1em;
            }
            .letter-he {
                font-size: 0.65em;
            }
        }

        /* Visual Image */
        .visual-hint {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Answer Options */
        .answer-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .answer-button {
            background: var(--game-gradient);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .answer-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .answer-button.correct {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            animation: correctPulse 0.6s ease;
        }

        .answer-button.incorrect {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            animation: incorrectShake 0.6s ease;
        }

        /* Difficulty Selector */
        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .difficulty-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all var(--transition-normal);
            backdrop-filter: blur(10px);
        }

        .difficulty-button.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Progress and Streaks */
        .progress-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            transition: width 0.3s ease;
        }

        .streak-indicator {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        /* Achievements */
        .achievements {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .achievement {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            transition: all var(--transition-normal);
        }

        .achievement.unlocked {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            animation: achievementUnlock 1s ease;
        }

        /* Animations */
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes achievementUnlock {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
            100% { transform: scale(1) rotate(360deg); }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Level Up Modal */
        .level-up-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .level-up-content {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        .level-up-title {
            font-size: 2.5em;
            color: white;
            margin-bottom: 20px;
        }

        .level-up-message {
            font-size: 1.2em;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }

        .continue-button {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .continue-button:hover {
            transform: scale(1.05);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .game-title {
                font-size: 2em;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
            
            .game-modes {
                grid-template-columns: 1fr;
            }
            
            .answer-options {
                grid-template-columns: 1fr;
            }
            
            .question-text {
                font-size: 1.5em;
            }
            
            .visual-hint {
                width: 120px;
                height: 120px;
                font-size: 3em;
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 10px;
            }
            
            .game-board {
                padding: 20px;
            }
            
            .back-button {
                top: 10px;
                right: 10px;
            }
        }

        /* High Contrast Mode Support */
        @media (prefers-contrast: high) {
            .game-board {
                background: rgba(255,255,255,0.2);
                border: 3px solid rgba(255,255,255,0.8);
            }

            .answer-button {
                border: 2px solid rgba(255,255,255,0.8);
            }
        }

        /* Reduced Motion Support */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    
/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {

/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* Visual Feedback States - Added for Accessibility */
/* Keyboard Focus Indicators */
button:focus,
.clickable:focus,
.option:focus {
    outline: 3px solid #4facfe;
    outline-offset: 2px;
    z-index: 10;
}

/* Focus visible only for keyboard */
button:focus-visible {
    outline: 3px solid #00f2fe;
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

/* Remove default outline */

/* Active/Pressed States */

/* Disabled state feedback */
button:disabled,

    opacity: 0.5;

button:disabled:hover {

        softBuzz: { real: [0, 0.3, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05], imag: [0, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05, 0.03] }
    };

    const ENVELOPES = {
        bell: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.4 },
        chime: { attack: 0.002, decay: 0.1, sustain: 0.0, release: 0.08 },
        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },
        warmPad: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1.0 },
        softBuzz: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.2 }
    };

    const MODES = {
        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },
        classroom: { volume: 0.25, reverbMix: 0.0, durationScale: 0.6 }
    };

    class AudioManager {
        constructor() {
            if (AudioManager.instance) return AudioManager.instance;
            AudioManager.instance = this;
            this.context = null;
            this.isInitialized = false;
            this.isMuted = false;
            this.globalVolume = 0.5;
            this.activeNodes = new Set();
            this.isSupported = !!(window.AudioContext || window.webkitAudioContext);
            this.enableVisualFeedback = true;
            this.waves = {};
            this.masterGain = null;
            this.dryGain = null;
            this.reverbGain = null;
            this.convolver = null;
            this.mode = 'home';
            this.loadPreferences();
        }

        async initialize() {
            if (this.isInitialized || !this.isSupported) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.context = new AC();
                if (this.context.state === 'suspended') await this.context.resume();

                this.masterGain = this.context.createGain();
                this.masterGain.gain.value = this.globalVolume;
                this.masterGain.connect(this.context.destination);

                this.dryGain = this.context.createGain();
                this.dryGain.gain.value = 0.7;
                this.dryGain.connect(this.masterGain);

                this.reverbGain = this.context.createGain();
                this.reverbGain.gain.value = MODES[this.mode].reverbMix;
                this.convolver = this.context.createConvolver();
                this.convolver.buffer = this.createImpulseResponse(1.5, 2.0);
                this.reverbGain.connect(this.convolver);
                this.convolver.connect(this.masterGain);

                for (const [name, table] of Object.entries(WAVETABLES)) {
                    this.waves[name] = this.context.createPeriodicWave(
                        new Float32Array(table.real), new Float32Array(table.imag)
                    );
                }
                this.applyMode(this.mode);
                this.isInitialized = true;
            } catch (e) {
                console.warn('AudioManager v7.0: init failed', e);
                this.isSupported = false;
            }
        }

        createImpulseResponse(duration, decay) {
            const length = this.context.sampleRate * duration;
            const buffer = this.context.createBuffer(2, length, this.context.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return buffer;
        }

        applyMode(mode) {
            this.mode = mode;
            const profile = MODES[mode] ?? MODES.home;
            this.globalVolume = profile.volume;
            if (this.masterGain) this.masterGain.gain.value = profile.volume;
            if (this.reverbGain) this.reverbGain.gain.value = profile.reverbMix;
            this.savePreferences();
        }

        getDurationScale() { return MODES[this.mode]?.durationScale ?? 1.0; }

        playNote(frequency, duration, waveName, envelope, filterFreq, useReverb, volume) {
            if (!this.isInitialized || this.isMuted || !this.isSupported) {
                if (this.enableVisualFeedback) this.provideVisualFeedback('action');
                return;
            }
            const ctx = this.context;
            const now = ctx.currentTime;
            const env = envelope ?? ENVELOPES.bell;
            const ds = this.getDurationScale();
            const dur = duration * ds;
            const vol = volume ?? 1.0;

            const osc = ctx.createOscillator();
            if (waveName && this.waves[waveName]) {
                osc.setPeriodicWave(this.waves[waveName]);
            } else {
                osc.type = 'sine';
            }
            osc.frequency.value = frequency;

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(vol, now + env.attack * ds);
            gainNode.gain.linearRampToValueAtTime(vol * env.sustain, now + (env.attack + env.decay) * ds);
            gainNode.gain.setValueAtTime(vol * env.sustain, now + dur - env.release * ds);
            gainNode.gain.linearRampToValueAtTime(0, now + dur);

            osc.connect(gainNode);

            if (filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 1;
                gainNode.connect(filter);
                filter.connect(this.dryGain);
                if (useReverb) filter.connect(this.reverbGain);
            } else {
                gainNode.connect(this.dryGain);
                if (useReverb) gainNode.connect(this.reverbGain);
            }

            osc.start(now);
            osc.stop(now + dur + 0.05);
            this.activeNodes.add(osc);
            osc.onended = () => this.activeNodes.delete(osc);
        }

        playSequence(notes, tempo, waveName, envelope, filterFreq, useReverb) {
            const beatDuration = 60 / tempo;
            const ds = this.getDurationScale();
            notes.forEach((note, i) => {
                const freq = note.freq ?? note;
                const dur = (note.dur ?? beatDuration) * ds;
                const vol = note.vol ?? 1.0;
                setTimeout(() => {
                    this.playNote(freq, dur, waveName, envelope, filterFreq, useReverb, vol);
                }, i * beatDuration * ds * 1000);
            });
        }

        playCorrectSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.12},{freq:659.25,dur:0.12},{freq:783.99,dur:0.2}], 480, 'bell', ENVELOPES.bell, 2000, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playWrongSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('error'); return; }
            this.playSequence([{freq:200,dur:0.15,vol:0.3},{freq:150,dur:0.15,vol:0.2}], 300, 'softBuzz', ENVELOPES.softBuzz, 800, false);
            if (this.enableVisualFeedback) this.provideVisualFeedback('error');
        }

        playClickSound() {
            if (!this.isInitialized || this.isMuted) return;
            this.playNote(800, 0.03, 'chime', ENVELOPES.chime, null, false, 0.2);
        }

        playWinSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.25},{freq:659.25,dur:0.25},{freq:783.99,dur:0.25},{freq:1046.5,dur:0.5}], 240, 'brass', ENVELOPES.brass, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playLevelUpSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('action'); return; }
            this.playSequence([{freq:440,dur:0.15},{freq:554.37,dur:0.15},{freq:659.25,dur:0.15},{freq:880,dur:0.3}], 360, 'chime', ENVELOPES.chime, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('action');
        }

        playGameOverSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('warning'); return; }
            this.playSequence([{freq:440,dur:0.4},{freq:415.3,dur:0.4},{freq:392,dur:0.4},{freq:349.23,dur:0.8}], 120, 'warmPad', ENVELOPES.warmPad, 600, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('warning');
        }

        flashScreen(type) { this.provideVisualFeedback(type); }

        provideVisualFeedback(type) {
            if (typeof document === 'undefined') return;
            const existing = document.getElementById('audio-visual-feedback');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'audio-visual-feedback';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;';
            overlay.style.background = this.getFeedbackColor(type);
            overlay.style.animation = 'audioFlash 0.3s ease-out';
            document.body.appendChild(overlay);
            overlay.addEventListener('animationend', () => overlay.remove());
            if (!document.getElementById('audio-flash-style')) {
                const style = document.createElement('style');
                style.id = 'audio-flash-style';
                style.textContent = '@keyframes audioFlash{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}';
                document.head.appendChild(style);
            }
        }

        getFeedbackColor(type) {
            const colors = {
                success: 'radial-gradient(circle,rgba(46,204,113,.4) 0%,transparent 70%)',
                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',
                action: 'radial-gradient(circle,rgba(52,152,219,.4) 0%,transparent 70%)',
                warning: 'radial-gradient(circle,rgba(241,196,15,.4) 0%,transparent 70%)'
            };
            return colors[type] ?? colors.action;
        }

        savePreferences() {
            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

        loadPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem('audioPreferences') ?? '{}');
                this.globalVolume = saved.volume ?? 0.5;
                this.isMuted = saved.muted ?? false;
                this.enableVisualFeedback = saved.visualFeedback ?? true;
                this.mode = saved.mode ?? 'home';
            } catch(e) {}
        }

        setVolume(v) { this.globalVolume = Math.max(0,Math.min(1,v)); if(this.masterGain) this.masterGain.gain.value=this.globalVolume; this.savePreferences(); }
        setMuted(m) { this.isMuted = !!m; this.savePreferences(); }
        setVisualFeedback(v) { this.enableVisualFeedback = !!v; this.savePreferences(); }
        setMode(mode) { if (MODES[mode]) this.applyMode(mode); }

        destroy() {
            this.activeNodes.forEach(n => { try{n.stop();}catch(e){} });
            this.activeNodes.clear();
            if (this.context) { try{this.context.close();}catch(e){} }
        }
    }

    window.audioManager = new AudioManager();
    const initAudioOnInteraction = async () => {
        await window.audioManager.initialize();
        ['click','touchstart','keydown'].forEach(evt => document.removeEventListener(evt, initAudioOnInteraction));
    };
    ['click','touchstart','keydown'].forEach(evt => document.addEventListener(evt, initAudioOnInteraction, {once:false}));
    window.addEventListener('beforeunload', () => { if(window.audioManager) window.audioManager.destroy(); });
})();

<script>
(function() {
    'use strict';

    class ParticleSystem {
        constructor() {
            if (ParticleSystem.instance) return ParticleSystem.instance;
            ParticleSystem.instance = this;
            this.canvas = null;
            this.ctx = null;
            this.particles = [];
            this.animationId = null;
            this.reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        ensureCanvas() {
            if (this.canvas) return;
            this.canvas = document.createElement('canvas');
            this.canvas.id = 'particle-canvas';
            this.canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            document.body.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            window.addEventListener('resize', () => {
                if (this.canvas) {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }
            });
        }

        getParticleCount(base) {
            if (this.reducedMotion) return 0;
            var mode = window.audioManager ? window.audioManager.mode : 'home';
            return mode === 'classroom' ? Math.floor(base * 0.3) : base;
        }

        sparkle(x, y, color, count) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(count || 12);
            for (var i = 0; i < n; i++) {
                var angle = (Math.PI * 2 * i) / n + (Math.random() * 0.3);
                var speed = 2 + Math.random() * 3;
                this.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1, decay: 0.02 + Math.random() * 0.02,
                    size: 3 + Math.random() * 4,
                    color: color || '#f9ca24',
                    type: 'sparkle'
                });
            }
            this.startLoop();
        }

        confetti(count) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(count || 40);
            var colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#2ecc71'];
            for (var i = 0; i < n; i++) {
                this.particles.push({
                    x: Math.random() * this.canvas.width, y: -10,
                    vx: (Math.random() - 0.5) * 4,
                    vy: 2 + Math.random() * 3,
                    life: 1, decay: 0.005 + Math.random() * 0.005,
                    size: 6 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    type: 'confetti'
                });
            }
            this.startLoop();
        }

        burst(x, y, color) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(8);
            for (var i = 0; i < n; i++) {
                var angle = (Math.PI * 2 * i) / n;
                this.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * 5,
                    vy: Math.sin(angle) * 5,
                    life: 1, decay: 0.03,
                    size: 5,
                    color: color || '#e74c3c',
                    type: 'burst'
                });
            }
            this.startLoop();
        }

        startLoop() {
            if (this.animationId) return;
            var self = this;
            var loop = function() {
                if (self.particles.length === 0) {
                    self.animationId = null;
                    if (self.ctx) self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                    return;
                }
                self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();

                        { english: 'rainy', hebrew: 'גשום', pronunciation: '/ˈreɪני/', emoji: '🌧️' },
                        { english: 'cloudy', hebrew: 'מעונן', pronunciation: '/ˈklaʊדי/', emoji: '☁️' },
                        { english: 'windy', hebrew: 'רוחני', pronunciation: '/ˈwɪנדי/', emoji: '💨' },
                        { english: 'snowy', hebrew: 'מושלג', pronunciation: '/ˈsnoʊי/', emoji: '🌨️' },
                        { english: 'hot', hebrew: 'חם', pronunciation: '/hɑːט/', emoji: '🔥' },
                        { english: 'cold', hebrew: 'קר', pronunciation: '/koʊלד/', emoji: '🧊' },
                        { english: 'warm', hebrew: 'חמים', pronunciation: '/wɔːרם/', emoji: '🌡️' }
                    ]
                }
            };

            constructor() {
                const safeGet = (value, defaultValue) => value ?? defaultValue;
                this.currentWord = null;
                this.gameMode = 'wordMatch';
                this.difficulty = safeGet(safeStorage('gameDifficulty'), 'beginner');
                this.score = 0;
                this.level = 1;
                this.streak = 0;
                this.timer = 0;
                this.startTime = Date.now();
                this.currentQuestionIndex = 0;
                this.answeredQuestions = [];
                this.dailyProgress = this.loadDailyProgress();
                this.achievements = this.loadAchievements();
                
                // DOM ready timeout pattern
                setTimeout(() => {
                    this.initializeGame();
                    this.startTimer();
                    this.loadNewQuestion();
                }, 150);
            }

            initializeGame() {
                safeExecute(() => {
                    this.updateDisplay();
                    this.generateAchievements();
                    this.bindEvents();
                    
                    // Initialize audio on first interaction
                    document.addEventListener('click', () => {
                        // Audio will be initialized by the inline Audio System v7.0
                    }, { once: true });
                }, { context: 'initializeGame' });
            }

            bindEvents() {
                // Keyboard navigation support
                document.addEventListener('keydown', (e) => {
                    if (e.key >= '1' && e.key <= '4') {
                        const index = parseInt(e.key) - 1;
                        const buttons = document.querySelectorAll('.answer-button');
                        if (buttons[index]) {
                            buttons[index].click();
                        }
                    }
                });
            }

            startTimer() {
                this.timerInterval = setInterval(() => {
                    this.timer = Math.floor((Date.now() - this.startTime) / 1000);
                    this.updateTimerDisplay();
                }, 1000);
            }

            updateTimerDisplay() {
                const minutes = Math.floor(this.timer / 60);
                const seconds = this.timer % 60;
                const timerElement = safeQuery('#timer');
                if (timerElement) {
                    timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }

            loadNewQuestion() {
                safeExecute(() => {
                    const availableWords = this.getAvailableWords();
                    if (availableWords.length === 0) {
                        this.levelUp();
                        return;
                    }

                    this.currentWord = availableWords[Math.floor(Math.random() * availableWords.length)];
                    this.displayQuestion();
                    this.generateAnswerOptions();
                }, { context: 'loadNewQuestion' });
            }

            getAvailableWords() {
                const difficultyWords = this.wordDatabase[this.difficulty] ?? {};
                const allWords = [];
                
                for (const category in difficultyWords) {
                    const categoryWords = difficultyWords[category] ?? [];
                    categoryWords.forEach(word => {
                        if (word && word.english) {
                            word.category = category;
                            allWords.push(word);
                        }
                    });
                }
                
                return allWords.filter(word => 
                    word?.english && !this.answeredQuestions.includes(word.english)
                );
            }

            displayQuestion() {
                const categoryElement = safeQuery('#category');
                const questionElement = safeQuery('#question');
                const pronunciationElement = safeQuery('#pronunciation');
                const pronunciationTextElement = safeQuery('#pronunciationText');
                const visualHintElement = safeQuery('#visualHint');

                if (!this.currentWord || this.currentWord === null || typeof this.currentWord === 'undefined') return;

                const categoryNames = {
                    animals: 'בעלי חיים',
                    colors: 'צבעים',
                    numbers: 'מספרים',
                    food: 'אוכל',
                    family: 'משפחה',
                    actions: 'פעולות',
                    emotions: 'רגשות',
                    weather: 'מזג אוויר'
                };

                if (categoryElement) {
                    categoryElement.textContent = categoryNames[this.currentWord.category] || this.currentWord.category;
                }

                if (questionElement) {
                    switch (this.gameMode) {
                        case 'wordMatch':
                            questionElement.textContent = `מה המילה באנגלית עבור "${this.currentWord.hebrew}"?`;
                            break;
                        case 'pictureWord':
                            questionElement.textContent = 'איזה מילה מתאימה לתמונה?';
                            break;
                        case 'pronunciation':
                            questionElement.textContent = 'איך מבטאים את המילה הזו?';
                            break;
                        case 'category':
                            questionElement.textContent = `איזו מילה שייכת לקטגוריית "${categoryNames[this.currentWord.category]}"?`;
                            break;
                    }
                }

                if (pronunciationTextElement) {
                    pronunciationTextElement.textContent = this.currentWord.pronunciation;
                }
                
                if (pronunciationElement) {
                    pronunciationElement.style.display = 'flex';
                }

                if (visualHintElement) {
                    visualHintElement.textContent = this.currentWord.emoji;
                    visualHintElement.setAttribute('aria-label', `רמז חזותי: ${this.currentWord.hebrew}`);
                }
            }

            generateAnswerOptions() {
                const optionsContainer = safeQuery('#answerOptions');
                if (!optionsContainer || !this.currentWord) return;

                optionsContainer.innerHTML = '';
                
                const correctAnswer = this.currentWord.english;
                const wrongAnswers = this.getWrongAnswers(correctAnswer, 3);
                const allOptions = [correctAnswer, ...wrongAnswers];
                
                // Shuffle options
                for (let i = allOptions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
                }

                allOptions.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.className = 'answer-button';
                    button.textContent = option;
                    button.setAttribute('data-answer', option);
                    button.setAttribute('aria-label', `תשובה ${index + 1}: ${option}`);
                    button.onclick = () => { speechManager?.speakWord(option); this.checkAnswer(option); };
                    optionsContainer.appendChild(button);
                });
            }

            getWrongAnswers(correctAnswer, count) {
                const difficultyData = this.wordDatabase[this.difficulty] ?? {};
                const allWords = this.getAvailableWords().concat(
                    Object.values(difficultyData)
                        .flat()
                        .filter(word => word?.english && word.english !== correctAnswer)
                );
                
                const wrongAnswers = [];
                const usedAnswers = new Set([correctAnswer]);
                
                while (wrongAnswers.length < count && wrongAnswers.length < allWords.length && allWords.length > 0) {
                    const randomWord = allWords[Math.floor(Math.random() * allWords.length)];
                    if (randomWord?.english && !usedAnswers.has(randomWord.english)) {
                        wrongAnswers.push(randomWord.english);
                        usedAnswers.add(randomWord.english);
                    }
                }
                
                return wrongAnswers;
            }

            checkAnswer(selectedAnswer) {
                safeExecute(() => {
                    if (!this.currentWord) return;

                    const isCorrect = selectedAnswer === this.currentWord.english;
                    const buttons = document.querySelectorAll('.answer-button');
                    
                    buttons.forEach(button => {
                        button.disabled = true;
                        if (button.getAttribute('data-answer') === this.currentWord.english) {
                            button.classList.add('correct');
                        } else if (button.getAttribute('data-answer') === selectedAnswer && !isCorrect) {
                            button.classList.add('incorrect');
                        }
                    });

                    if (isCorrect) {
                        this.handleCorrectAnswer();
                        if (window.audioManager && window.audioManager !== null) {
                            window.audioManager.playCorrectSound();
                        }
                        if (window.particleSystem) {
                            var hEl = document.querySelector('.answer-options');
                            if (hEl) { var hRect = hEl.getBoundingClientRect(); window.particleSystem.sparkle(hRect.left + hRect.width / 2, hRect.top + hRect.height / 2, '#2ecc71', 15); }
                        }
                    } else {
                        this.handleIncorrectAnswer();
                        if (window.audioManager && window.audioManager !== null) {
                            window.audioManager.playWrongSound();
                        }
                        if (window.particleSystem) {
                            var hEl2 = document.querySelector('.answer-options');
                            if (hEl2) { var hRect2 = hEl2.getBoundingClientRect(); window.particleSystem.burst(hRect2.left + hRect2.width / 2, hRect2.top + hRect2.height / 2, '#e74c3c'); }
                        }
                    }

                    this.answeredQuestions.push(this.currentWord.english);
                    
                    setTimeout(() => {
                        this.loadNewQuestion();
                    }, 1500);
                }, { context: 'checkAnswer' });
            }

            handleCorrectAnswer() {
                this.score += this.calculateScore();
                this.streak++;
                this.checkAchievements();
                this.updateDisplay();
                this.updateProgress();
                
                // Save daily progress
                if (this.dailyProgress) {
                    this.dailyProgress.correctAnswers++;
                    this.dailyProgress.totalQuestions++;
                    this.saveDailyProgress();
                }

                // Speak the correct word for reinforcement
                setTimeout(() => {
                    if (!speechManager || speechManager === null) {
                        speechManager = new SpeechManager();
                    }
                    speechManager?.speakWord(this.currentWord?.english);
                }, 500);
            }

            handleIncorrectAnswer() {
                this.streak = 0;
                if (this.dailyProgress) {
                    this.dailyProgress.totalQuestions++;
                    this.saveDailyProgress();
                }
                this.updateDisplay();
            }

            calculateScore() {
                let baseScore = 10;
                
                // Difficulty multiplier
                const difficultyMultiplier = {
                    beginner: 1,
                    intermediate: 1.5,
                    advanced: 2
                };
                
                // Streak bonus
                const streakBonus = Math.min(this.streak * 2, 50);
                
                // Speed bonus (faster answers get more points)
                const timeBonus = Math.max(0, 10 - Math.floor(this.timer / 10));
                
                const multiplier = difficultyMultiplier[this.difficulty] ?? 1;
                return Math.floor(baseScore * multiplier + streakBonus + timeBonus);
            }

            checkAchievements() {
                const achievements = [
                    { id: 'first_correct', emoji: '🎯', condition: () => (this.dailyProgress?.correctAnswers ?? 0) >= 1, name: 'התשובה הראשונה' },
                    { id: 'streak_5', emoji: '🔥', condition: () => this.streak >= 5, name: 'רצף של 5' },
                    { id: 'streak_10', emoji: '⚡', condition: () => this.streak >= 10, name: 'רצף של 10' },
                    { id: 'score_100', emoji: '💯', condition: () => this.score >= 100, name: '100 נקודות' },
                    { id: 'score_500', emoji: '🌟', condition: () => this.score >= 500, name: '500 נקודות' },
                    { id: 'level_5', emoji: '🏆', condition: () => this.level >= 5, name: 'רמה 5' },
                    { id: 'daily_10', emoji: '📚', condition: () => (this.dailyProgress?.correctAnswers ?? 0) >= 10, name: '10 תשובות נכונות היום' },
                    { id: 'perfect_category', emoji: '🎓', condition: () => this.streak >= 8, name: 'מושלם בקטגוריה' }
                ];

                achievements.forEach(achievement => {
                    if (!this.achievements[achievement.id] && achievement.condition?.()) {
                        this.achievements[achievement.id] = true;
                        this.showAchievementUnlock(achievement);
                        this.saveAchievements();
                    }
                });
            }

                        }

            levelUp() {
                this.level++;
                this.answeredQuestions = [];

                if (window.audioManager && window.audioManager !== null) {
                    window.audioManager.playWinSound();
                }
                if (window.particleSystem) window.particleSystem.confetti(60);

            showLevelUpModal() {
                const modal = safeQuery('#levelUpModal');

                const message = safeQuery('#levelUpMessage');
                
                if (modal && title && message) {
                    title.textContent = `עלית לרמה ${this.level}!`;

            updateDisplay() {
                safeExecute(() => {

                    if (scoreElement) scoreElement.textContent = this.score.toLocaleString();

                    if (streakElement) streakElement.textContent = this.streak;
                    if (streakTextElement) streakTextElement.textContent = `רצף נכון: ${this.streak}`;
                }, { context: 'updateDisplay' });
            }

            updateProgress() {
                const totalQuestions = Object.values(this.wordDatabase[this.difficulty] ?? {}).flat().length;
                const progress = Math.min((this.answeredQuestions.length / totalQuestions) * 100, 100);
                
                const progressFill = safeQuery('#progressFill');
                if (progressFill) {
                    progressFill.style.width = `${progress}%`;
                    progressFill.parentElement?.setAttribute('aria-valuenow', progress);
                }
            }

            generateAchievements() {
                const achievementsContainer = safeQuery('#achievements');
                if (!achievementsContainer) return;
                
                const achievementsList = [
                    { id: 'first_correct', emoji: '🎯' },
                    { id: 'streak_5', emoji: '🔥' },
                    { id: 'streak_10', emoji: '⚡' },
                    { id: 'score_100', emoji: '💯' },
                    { id: 'score_500', emoji: '🌟' },
                    { id: 'level_5', emoji: '🏆' },
                    { id: 'daily_10', emoji: '📚' },

                ];
                
                achievementsContainer.innerHTML = '';
                achievementsList.forEach(achievement => {
                    const badge = document.createElement('div');
                    badge.className = `achievement ${this.achievements[achievement.id] ? 'unlocked' : ''}`;

            loadDailyProgress() {
                const today = new Date().toDateString();
                const saved = safeStorage('dailyProgress');
                
                if (saved) {
                    const progress = safeJSON(saved, {});
                    if (progress.date === today) {
                        return progress;
                    }
                }
                
                return {
                    date: today,
                    correctAnswers: 0,
                    totalQuestions: 0,
                    timeSpent: 0
                };
            }

            saveDailyProgress() {
                safeStorage('dailyProgress', this.dailyProgress);
            }

            loadAchievements() {
                const saved = safeStorage('achievements');
                return saved ? safeJSON(saved, {}) : {};
            }

            saveAchievements() {
                safeStorage('achievements', this.achievements);
            }
        }

        // Speech Synthesis Support
        class SpeechManager {
            constructor() {
                this.synth = window.speechSynthesis;
                this.speaking = false;
                this.voice = null;
                this.initializeVoice();
            }

            initializeVoice() {
                if (!this.synth) return;
                
                // Wait for voices to load
                const loadVoices = () => {
                    const voices = this.synth.getVoices();
                    // Prefer US English voices
                    this.voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                                voices.find(v => v.lang === 'en-US') ||
                                voices.find(v => v.lang.startsWith('en-')) ||
                                voices[0];
                };

                loadVoices();
                if (this.synth.onvoiceschanged !== undefined) {
                    this.synth.onvoiceschanged = loadVoices;
                }
            }

            speak(text, lang = 'en-US') {
                if (!this.synth || this.speaking) return;

                // Cancel any ongoing speech
                this.synth.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.9; // Slightly slower for learning
                utterance.pitch = 1;
                utterance.volume = 0.8;

                if (this.voice) {
                    utterance.voice = this.voice;
                }

                // Visual feedback
                const speakButton = document.getElementById('speakButton');
                if (speakButton) {
                    speakButton.classList.add('speaking');
                }

                utterance.onstart = () => {
                    this.speaking = true;
                };

                utterance.onend = () => {
                    this.speaking = false;
                    if (speakButton) {
                        speakButton.classList.remove('speaking');
                    }
                };

                utterance.onerror = (event) => {
                    console.warn('Speech synthesis error:', event);
                    this.speaking = false;
                    if (speakButton) {
                        speakButton.classList.remove('speaking');
                    }
                    // Fallback to audio manager sound
                    if (window.audioManager) {
                        window.audioManager.playClickSound();
                    }
                };

                this.synth.speak(utterance);
            }

            speakWord(word) {
                if (!word) return;
                
                // Remove special characters and speak clearly
                const cleanWord = word.replace(/[^a-zA-Z\s]/g, '');
                this.speak(cleanWord);
            }

            stop() {
                if (this.synth) {
                    this.synth.cancel();
                    this.speaking = false;
                }
            }
        }

        // Initialize speech manager
        let speechManager = null;
        
        // Global functions for UI interactions
        function speakWord() {
            safeExecute(() => {
                if (!speechManager || speechManager === null) {
                    speechManager = new SpeechManager();
                }
                
                if (window.game && window.game !== null && window.game.currentWord) {
                    speechManager?.speakWord(window.game.currentWord.english);
                    
                    // Also play audio feedback
                    if (window.audioManager && window.audioManager !== null) {
                        window.audioManager.playClickSound();
                    }
                }
            }, { context: 'speakWord' });
        }

        function initAlphabetBoard() {
            const board = document.getElementById('alphabetBoard');
            if (!board) return;
            board.innerHTML = '';
            alphabetData.forEach(letter => {
                const cell = document.createElement('div');
                cell.className = 'letter-cell';
                cell.setAttribute('role', 'button');
                cell.setAttribute('tabindex', '0');
                cell.setAttribute('aria-label', letter.en + ', ' + letter.he);
                cell.innerHTML = '<span class="letter-en">' + letter.en + '</span><span class="letter-he">' + letter.he + '</span>';
                cell.onclick = function() { speakLetter(letter.en, cell); };
                cell.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); speakLetter(letter.en, cell); } };
                board.appendChild(cell);
            });
        }

        function speakLetter(letter, cell) {
            safeExecute(() => {
                if (!speechManager || speechManager === null) {
                    speechManager = new SpeechManager();
                }
                if (speechManager && speechManager.synth) {
                    speechManager.synth.cancel();
                    speechManager.speaking = false;
                }
                var utterance = new SpeechSynthesisUtterance(letter);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                utterance.volume = 0.8;
                if (cell) { cell.classList.add('speaking'); }
                utterance.onend = function() { if (cell) { cell.classList.remove('speaking'); } };
                utterance.onerror = function() { if (cell) { cell.classList.remove('speaking'); } };
                window.speechSynthesis.speak(utterance);
            }, { context: 'speakLetter' });
        }

        function setGameMode(mode) {
            safeExecute(() => {
                if (window.game && window.game !== null) {
                    window.game.gameMode = mode;
                    window.game.loadNewQuestion();
                }
                
                // Update UI
                document.querySelectorAll('.mode-button').forEach(btn => {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-pressed', 'false');
                });
                
                const activeButton = event ? event.target : document.querySelector(`[onclick*="${mode}"]`);
                if (activeButton) {
                    activeButton.classList.add('active');
                    activeButton.setAttribute('aria-pressed', 'true');
                }
                
                if (window.audioManager && window.audioManager !== null) {
                    window.audioManager.playClickSound();
                }
            }, { context: 'setGameMode' });
        }

        function closeLevelUpModal() {
            const modal = safeQuery('#levelUpModal');
            if (modal) {
                modal.style.display = 'none';
            }
            
            if (window.audioManager && window.audioManager !== null) {
                window.audioManager.playClickSound();
            }
        }

        // Initialize game when page loads
        window.addEventListener('DOMContentLoaded', () => {
            safeExecute(() => {
                window.game = new HebrewEnglishGame();
            }, { context: 'gameInitialization' });
        });

        // Handle visibility change to pause/resume game
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Game is hidden, save progress
                if (window.game && window.game !== null) {
                    window.game.saveDailyProgress?.();
                    window.game.saveAchievements?.();
                }
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (window.game && window.game !== null) {
                window.game.saveDailyProgress?.();
                window.game.saveAchievements?.();
                if (window.game.timerInterval) {
                    clearInterval(window.game.timerInterval);
                }
            }
        });

        // Initialization complete message removed for performance
        // console.log('🎓 Hebrew-English Learning Game initialized | Educational | Accessible | Fun for all ages');
    </script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
