<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון חשבון - משחק מתמטיקה</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #6c5ce7;
            --color-primary-dark: #4a3db8;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(160deg, #0c0032 0%, #190061 45%, #240090 100%);
            --game-accent: #6c5ce7;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Noto Sans Hebrew', 'Arial Hebrew', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: var(--space-md);
            left: var(--space-md);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: background var(--transition-fast);
            backdrop-filter: blur(8px);
        }

        .settings-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .settings-toggle:focus-visible {
            outline: 3px solid var(--color-warning);
            outline-offset: 2px;
        }

        .settings-toggle:focus {
            outline: 2px solid rgba(255,255,255,0.6);
        }

        .settings-toggle:active {
            background: rgba(255,255,255,0.35);
            transform: scale(0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-family);
            background: var(--game-gradient);
            color: var(--color-text);
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: var(--space-lg);
            padding-top: 70px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all var(--transition-normal);
            backdrop-filter: blur(8px);
        }

        .back-button button:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .back-button button:focus-visible {
            outline: 3px solid var(--color-warning);
            outline-offset: 2px;
        }

        .back-button button:focus {
            outline: 2px solid rgba(255,255,255,0.6);
        }

        .back-button button:active {
            background: rgba(255,255,255,0.35);
            transform: scale(0.95);
        }

        .game-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            box-shadow: var(--shadow-lg);
            width: min(600px, 95vw);
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .score-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .score-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .score-item h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.8);
        }

        .score-item p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .diff-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            backdrop-filter: blur(8px);
        }

        .diff-btn:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.25);
        }

        .diff-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            color: white;
        }

        .timer-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .timer {
            font-size: 2.5em;
            font-weight: bold;
            color: white;
        }

        .timer.warning {
            color: #e74c3c;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-container {
            background: var(--game-gradient);
            color: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .question-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .question {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .operation-type {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .answer-btn {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 25px;
            border-radius: var(--radius-md);
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .answer-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .answer-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .answer-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .answer-btn.correct {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            animation: correctPulse 0.6s ease;
        }

        .answer-btn.incorrect {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            animation: shake 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .streak-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
        }

        .streak-stars {
            font-size: 2em;
            color: #f39c12;
            margin-top: 10px;
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            color: white;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .message.success {
            color: #a7f3d0;
            background: transparent;
        }

        .message.levelup {
            color: #fcd34d;
            background: transparent;
            font-size: 1.4em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: levelUpPulse 0.8s ease-in-out;
        }

        @keyframes levelUpPulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .message.error {
            color: #fca5a5;
            background: transparent;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #3498db, #9b59b6);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
        }

        .combo-display.show {
            display: block;
            animation: comboAnimation 1s ease;
        }

        @keyframes comboAnimation {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0) rotate(360deg);
                opacity: 0;
            }
        }

/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }

        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

        max-width: 700px;
    }

        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);

.modal, .overlay {

}

<script>
(function() {
    'use strict';

    const WAVETABLES = {
        bell: { real: [0, 0, 0.4, 0, 0.2, 0, 0.1, 0, 0.05], imag: [0, 1, 0, 0.3, 0, 0.1, 0, 0.05, 0] },
        chime: { real: [0, 0, 0.5, 0, 0.25, 0, 0.125], imag: [0, 1, 0, 0.5, 0, 0.25, 0] },
        brass: { real: [0, 0.5, 0.5, 0.35, 0.25, 0.2, 0.15, 0.1, 0.08], imag: [0, 0, 0, 0, 0, 0, 0, 0, 0] },
        warmPad: { real: [0, 1, 0.5, 0.25, 0.125, 0.0625], imag: [0, 0, 0.3, 0.15, 0.075, 0.0375] },
        softBuzz: { real: [0, 0.3, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05], imag: [0, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05, 0.03] }
    };

    const ENVELOPES = {
        bell: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.4 },
        chime: { attack: 0.002, decay: 0.1, sustain: 0.0, release: 0.08 },
        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },
        warmPad: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1.0 },
        softBuzz: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.2 }
    };

    const MODES = {
        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },
        classroom: { volume: 0.25, reverbMix: 0.0, durationScale: 0.6 }
    };

    class AudioManager {
        constructor() {
            if (AudioManager.instance) return AudioManager.instance;
            AudioManager.instance = this;
            this.context = null;
            this.isInitialized = false;
            this.isMuted = false;
            this.globalVolume = 0.5;
            this.activeNodes = new Set();
            this.isSupported = !!(window.AudioContext || window.webkitAudioContext);
            this.enableVisualFeedback = true;
            this.waves = {};
            this.masterGain = null;
            this.dryGain = null;
            this.reverbGain = null;
            this.convolver = null;
            this.mode = 'home';
            this.loadPreferences();
        }

        async initialize() {
            if (this.isInitialized || !this.isSupported) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.context = new AC();
                if (this.context.state === 'suspended') await this.context.resume();

                this.masterGain = this.context.createGain();
                this.masterGain.gain.value = this.globalVolume;
                this.masterGain.connect(this.context.destination);

                this.dryGain = this.context.createGain();
                this.dryGain.gain.value = 0.7;
                this.dryGain.connect(this.masterGain);

                this.reverbGain = this.context.createGain();
                this.reverbGain.gain.value = MODES[this.mode].reverbMix;
                this.convolver = this.context.createConvolver();
                this.convolver.buffer = this.createImpulseResponse(1.5, 2.0);
                this.reverbGain.connect(this.convolver);
                this.convolver.connect(this.masterGain);

                for (const [name, table] of Object.entries(WAVETABLES)) {
                    this.waves[name] = this.context.createPeriodicWave(
                        new Float32Array(table.real), new Float32Array(table.imag)
                    );
                }
                this.applyMode(this.mode);
                this.isInitialized = true;
            } catch (e) {
                console.warn('AudioManager v7.0: init failed', e);
                this.isSupported = false;
            }
        }

        createImpulseResponse(duration, decay) {
            const length = this.context.sampleRate * duration;
            const buffer = this.context.createBuffer(2, length, this.context.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return buffer;
        }

        applyMode(mode) {
            this.mode = mode;
            const profile = MODES[mode] ?? MODES.home;
            this.globalVolume = profile.volume;
            if (this.masterGain) this.masterGain.gain.value = profile.volume;
            if (this.reverbGain) this.reverbGain.gain.value = profile.reverbMix;
            this.savePreferences();
        }

        getDurationScale() { return MODES[this.mode]?.durationScale ?? 1.0; }

        playNote(frequency, duration, waveName, envelope, filterFreq, useReverb, volume) {
            if (!this.isInitialized || this.isMuted || !this.isSupported) {
                if (this.enableVisualFeedback) this.provideVisualFeedback('action');
                return;
            }
            const ctx = this.context;
            const now = ctx.currentTime;
            const env = envelope ?? ENVELOPES.bell;
            const ds = this.getDurationScale();
            const dur = duration * ds;
            const vol = volume ?? 1.0;

            const osc = ctx.createOscillator();
            if (waveName && this.waves[waveName]) {
                osc.setPeriodicWave(this.waves[waveName]);
            } else {
                osc.type = 'sine';
            }
            osc.frequency.value = frequency;

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(vol, now + env.attack * ds);
            gainNode.gain.linearRampToValueAtTime(vol * env.sustain, now + (env.attack + env.decay) * ds);
            gainNode.gain.setValueAtTime(vol * env.sustain, now + dur - env.release * ds);
            gainNode.gain.linearRampToValueAtTime(0, now + dur);

            osc.connect(gainNode);

            if (filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 1;
                gainNode.connect(filter);
                filter.connect(this.dryGain);
                if (useReverb) filter.connect(this.reverbGain);
            } else {
                gainNode.connect(this.dryGain);
                if (useReverb) gainNode.connect(this.reverbGain);
            }

            osc.start(now);
            osc.stop(now + dur + 0.05);
            this.activeNodes.add(osc);
            osc.onended = () => this.activeNodes.delete(osc);
        }

        playSequence(notes, tempo, waveName, envelope, filterFreq, useReverb) {
            const beatDuration = 60 / tempo;
            const ds = this.getDurationScale();
            notes.forEach((note, i) => {
                const freq = note.freq ?? note;
                const dur = (note.dur ?? beatDuration) * ds;
                const vol = note.vol ?? 1.0;
                setTimeout(() => {
                    this.playNote(freq, dur, waveName, envelope, filterFreq, useReverb, vol);
                }, i * beatDuration * ds * 1000);
            });
        }

        playCorrectSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.12},{freq:659.25,dur:0.12},{freq:783.99,dur:0.2}], 480, 'bell', ENVELOPES.bell, 2000, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playWrongSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('error'); return; }
            this.playSequence([{freq:200,dur:0.15,vol:0.3},{freq:150,dur:0.15,vol:0.2}], 300, 'softBuzz', ENVELOPES.softBuzz, 800, false);
            if (this.enableVisualFeedback) this.provideVisualFeedback('error');
        }

        playClickSound() {
            if (!this.isInitialized || this.isMuted) return;
            this.playNote(800, 0.03, 'chime', ENVELOPES.chime, null, false, 0.2);
        }

        playWinSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.25},{freq:659.25,dur:0.25},{freq:783.99,dur:0.25},{freq:1046.5,dur:0.5}], 240, 'brass', ENVELOPES.brass, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playLevelUpSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('action'); return; }
            this.playSequence([{freq:440,dur:0.15},{freq:554.37,dur:0.15},{freq:659.25,dur:0.15},{freq:880,dur:0.3}], 360, 'chime', ENVELOPES.chime, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('action');
        }

        playGameOverSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('warning'); return; }
            this.playSequence([{freq:440,dur:0.4},{freq:415.3,dur:0.4},{freq:392,dur:0.4},{freq:349.23,dur:0.8}], 120, 'warmPad', ENVELOPES.warmPad, 600, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('warning');
        }

        flashScreen(type) { this.provideVisualFeedback(type); }

        provideVisualFeedback(type) {
            if (typeof document === 'undefined') return;
            const existing = document.getElementById('audio-visual-feedback');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'audio-visual-feedback';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;';
            overlay.style.background = this.getFeedbackColor(type);
            overlay.style.animation = 'audioFlash 0.3s ease-out';
            document.body.appendChild(overlay);
            overlay.addEventListener('animationend', () => overlay.remove());
            if (!document.getElementById('audio-flash-style')) {
                const style = document.createElement('style');
                style.id = 'audio-flash-style';
                style.textContent = '@keyframes audioFlash{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}';
                document.head.appendChild(style);
            }
        }

        getFeedbackColor(type) {
            const colors = {
                success: 'radial-gradient(circle,rgba(46,204,113,.4) 0%,transparent 70%)',
                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',
                action: 'radial-gradient(circle,rgba(52,152,219,.4) 0%,transparent 70%)',
                warning: 'radial-gradient(circle,rgba(241,196,15,.4) 0%,transparent 70%)'
            };
            return colors[type] ?? colors.action;
        }

        savePreferences() {
            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

        loadPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem('audioPreferences') ?? '{}');
                this.globalVolume = saved.volume ?? 0.5;
                this.isMuted = saved.muted ?? false;
                this.enableVisualFeedback = saved.visualFeedback ?? true;
                this.mode = saved.mode ?? 'home';
            } catch(e) {}
        }

        setVolume(v) { this.globalVolume = Math.max(0,Math.min(1,v)); if(this.masterGain) this.masterGain.gain.value=this.globalVolume; this.savePreferences(); }
        setMuted(m) { this.isMuted = !!m; this.savePreferences(); }
        setVisualFeedback(v) { this.enableVisualFeedback = !!v; this.savePreferences(); }
        setMode(mode) { if (MODES[mode]) this.applyMode(mode); }

        destroy() {
            this.activeNodes.forEach(n => { try{n.stop();}catch(e){} });
            this.activeNodes.clear();
            if (this.context) { try{this.context.close();}catch(e){} }
        }
    }

    window.audioManager = new AudioManager();
    const initAudioOnInteraction = async () => {
        await window.audioManager.initialize();
        ['click','touchstart','keydown'].forEach(evt => document.removeEventListener(evt, initAudioOnInteraction));
    };
    ['click','touchstart','keydown'].forEach(evt => document.addEventListener(evt, initAudioOnInteraction, {once:false}));
    window.addEventListener('beforeunload', () => { if(window.audioManager) window.audioManager.destroy(); });
})();
</script>

    class ParticleSystem {
        constructor() {

        }

            this.canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            document.body.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            window.addEventListener('resize', () => {
                if (this.canvas) {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }

        }

            if (this.reducedMotion) return 0;

                    vy: Math.sin(angle) * speed,
                    life: 1, decay: 0.02 + Math.random() * 0.02,
                    size: 3 + Math.random() * 4,

                    x: Math.random() * this.canvas.width, y: -10,
                    vx: (Math.random() - 0.5) * 4,
                    vy: 2 + Math.random() * 3,
                    life: 1, decay: 0.005 + Math.random() * 0.005,
                    size: 6 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    type: 'confetti'

            this.startLoop();
        }

        burst(x, y, color) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(8);

                this.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * 5,
                    vy: Math.sin(angle) * 5,
                    life: 1, decay: 0.03,
                    size: 5,
                    color: color || '#e74c3c',

        }

        startLoop() {

            var loop = function() {
                if (self.particles.length === 0) {

                    return;
                }

                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {

                        p.rotation += p.rotationSpeed;
                    }

                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>

</head>
<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">
        <span id="modeIcon">🏠</span>
    </button>
    <div class="back-button">
        <button onclick="window.location.href = '../index.html'">🏠 חזרה לדף הראשי</button>
    </div>

    <div class="game-container">
        <h1>🔢 חידון חשבון 🔢</h1>

        <div class="score-board">
            <div class="score-item">
                <h3>נקודות</h3>
                <p id="score">0</p>
            </div>
            <div class="score-item">
                <h3>רצף נכונות</h3>
                <p id="streak">0</p>
            </div>
            <div class="score-item">
                <h3>דיוק</h3>
                <p id="accuracy">100%</p>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="diff-btn active" onclick="setDifficulty('easy')">קל</button>
            <button class="diff-btn" onclick="setDifficulty('medium')">בינוני</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">קשה</button>
            <button class="diff-btn" onclick="setDifficulty('expert')">מומחה</button>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="timer-container">
            <div class="timer" id="timer">2:00</div>
        </div>

        <div class="streak-indicator">
            <div>רצף נוכחי</div>
            <div class="streak-stars" id="streakStars"></div>
        </div>

        <div class="question-container">
            <div class="question" id="question">? = ? + ?</div>
            <div class="operation-type" id="operationType">חיבור</div>
        </div>

        <div class="answers-grid" id="answersGrid">
            <button class="answer-btn" onclick="checkAnswer(0)">?</button>
            <button class="answer-btn" onclick="checkAnswer(1)">?</button>
            <button class="answer-btn" onclick="checkAnswer(2)">?</button>
            <button class="answer-btn" onclick="checkAnswer(3)">?</button>
        </div>

        <div class="controls">
            <button class="control-btn" onclick="startGame()">התחל משחק חדש</button>
            <button class="control-btn" onclick="skipQuestion()">דלג על השאלה</button>
        </div>

        <div class="message" id="message"></div>

        <div style="text-align: center; margin-top: 20px; opacity: 0.7; font-size: 0.9em;">
            <p>💡 השתמש במקשי החצים או במספרים 1-4 לבחירת תשובות | מקש S לדילוג</p>
        </div>
    </div>

    <div class="combo-display" id="comboDisplay"></div>

    <script>
        // Game configuration
        const difficulties = {
            easy: {
                operations: ['+', '-'],
                range: [1, 20],
                time: 120,
                scoreMultiplier: 1
            },
            medium: {
                operations: ['+', '-', '×'],
                range: [1, 50],
                time: 60,
                scoreMultiplier: 2
            },
            hard: {
                operations: ['+', '-', '×', '÷'],
                range: [1, 100],
                time: 30,
                scoreMultiplier: 3
            },
            expert: {
                operations: ['+', '-', '×', '÷'],
                range: [10, 200],
                time: 15,
                scoreMultiplier: 5
            }
        };

        // Utility function for null safety with nullish coalescing
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        
        // Game state
        let currentDifficulty = 'easy';
        let score = 0;
        let streak = 0;
        let totalQuestions = 0;
        let correctAnswers = 0;
        let currentQuestion = null;
        let correctAnswerIndex = -1;
        let timer = null;
        let timeLeft = 30;
        let gameActive = false;
        let lastClickTime = 0;
        const DEBOUNCE_TIME = 300;

        // Sound effects with enhanced error handling and mobile support
        // Audio functions provided by global window.audioManager (Audio System v7.0)

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (gameActive) {
                startGame();
            }
        }

        function checkLevelProgression() {
            if (streak === 5) {
                const difficultyLevels = ['easy', 'medium', 'hard', 'expert'];
                const currentIndex = difficultyLevels.indexOf(currentDifficulty);
                
                if (currentIndex < difficultyLevels.length - 1) {
                    const nextLevel = difficultyLevels[currentIndex + 1];
                    const levelNames = {
                        'easy': 'קל',
                        'medium': 'בינוני', 
                        'hard': 'קשה',
                        'expert': 'מומחה'
                    };
                    
                    // Show level up message with special styling
                    showMessage(`🎉 עליתי דרגה! ${levelNames[nextLevel]} 🎉`, 'levelup');
                    
                    // Auto-advance to next difficulty and start new game
                    setTimeout(() => {
                        currentDifficulty = nextLevel;
                        document.querySelectorAll('.diff-btn').forEach(btn => {
                            btn.classList.remove('active');
                        });
                        document.querySelector(`[onclick="setDifficulty('${nextLevel}')"]`).classList.add('active');
                        
                        // Reset streak and generate new question without resetting score
                        streak = 0;
                        generateQuestion();
                    }, 2500);
                    
                    if (window.audioManager) window.audioManager.playCorrectSound(); // Celebration sound
                    if (window.particleSystem) window.particleSystem.confetti(40);
                    return true; // Level progression occurred
                }
            }
            return false; // No level progression
        }

        function generateQuestion() {
            const config = difficulties[currentDifficulty];
            const operation = config.operations[Math.floor(Math.random() * config.operations.length)];
            const [min, max] = config.range;
            
            let num1, num2, answer;
            
            switch (operation) {
                case '+':
                    num1 = Math.floor(Math.random() * (max - min + 1)) + min;
                    num2 = Math.floor(Math.random() * (max - min + 1)) + min;
                    answer = num1 + num2;
                    break;
                case '-':
                    // Generate subtraction with guaranteed positive result
                    const maxSubtract = Math.max(min, Math.floor((max - min) / 2));
                    num1 = Math.floor(Math.random() * (max - maxSubtract + 1)) + maxSubtract; // Larger number
                    num2 = Math.floor(Math.random() * (num1 - min + 1)) + min; // Smaller number
                    
                    // Ensure num1 > num2 for positive result
                    if (num2 >= num1) {
                        [num1, num2] = [num2 + 1, num1]; // Swap and adjust
                    }
                    
                    answer = num1 - num2;
                    
                    // Final safety check
                    if (answer <= 0) {
                        num1 = Math.floor(Math.random() * 10) + 10;
                        num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                        answer = num1 - num2;
                    }
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * Math.min(20, max / 2)) + 1;
                    num2 = Math.floor(Math.random() * Math.min(20, max / 2)) + 1;
                    answer = num1 * num2;
                    break;
                case '÷':
                    answer = Math.floor(Math.random() * Math.min(20, max / 2)) + 1;
                    num2 = Math.floor(Math.random() * Math.min(10, max / 4)) + 1;
                    num1 = answer * num2;
                    break;
            }
            
            currentQuestion = {
                num1: num1,
                num2: num2,
                operation: operation,
                answer: answer
            };
            
            displayQuestion();
            generateAnswers();
        }

        function displayQuestion() {
            const operationNames = {
                '+': 'חיבור',
                '-': 'חיסור',
                '×': 'כפל',
                '÷': 'חילוק'
            };
            
            // Use explicit direction for numbers to avoid RTL issues
            if (!currentQuestion) {
                console.warn('No current question');
                return;
            }
            document.getElementById('question').innerHTML = 
                `<span dir="ltr">${currentQuestion.num1} ${currentQuestion.operation} ${currentQuestion.num2} = ?</span>`;
            document.getElementById('operationType').textContent = 
                operationNames[currentQuestion.operation];
        }

        function generateAnswers() {
            if (!currentQuestion || currentQuestion.answer === undefined) {
                console.warn('No current question or answer');
                return;
            }
            const answers = [currentQuestion.answer];
            const variance = Math.max(3, Math.min(10, Math.floor(Math.abs(currentQuestion.answer) * 0.4)));
            
            while (answers.length < 4) {
                let wrongAnswer;
                if (Math.random() < 0.5) {
                    wrongAnswer = currentQuestion.answer + Math.floor(Math.random() * variance) + 1;
                } else {
                    wrongAnswer = currentQuestion.answer - Math.floor(Math.random() * variance) - 1;
                }
                
                if (wrongAnswer > 0 && !answers.includes(wrongAnswer)) {
                    answers.push(wrongAnswer);
                }
            }
            
            // Shuffle answers
            for (let i = answers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [answers[i], answers[j]] = [answers[j], answers[i]];
            }
            
            correctAnswerIndex = answers.indexOf(currentQuestion.answer);
            
            // Display answers
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = answers[index];
                btn.classList.remove('correct', 'incorrect');
                btn.disabled = false;
                btn.setAttribute('tabindex', '0');
            });
            
            updateAccessibility();
        }

        function checkAnswer(index) {
            const currentTime = Date.now();
            
            // Debounce rapid clicks
            if (currentTime - lastClickTime < DEBOUNCE_TIME) {
                return;
            }
            lastClickTime = currentTime;
            
            if (!gameActive) {
                return;
            }

            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            totalQuestions++;
            
            if (index === correctAnswerIndex) {
                // Correct answer
                buttons[index].classList.add('correct');
                correctAnswers++;
                streak++;
                
                const baseScore = 10 * difficulties[currentDifficulty].scoreMultiplier;
                const streakBonus = Math.floor(streak / 5) * 5;
                const timeBonus = Math.floor(timeLeft / 5);
                
                score += baseScore + streakBonus + timeBonus;
                
                if (window.audioManager) window.audioManager.playCorrectSound();
                if (window.particleSystem) {
                    var el = buttons[index] || document.querySelector('.question-container');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.sparkle(rect.left + rect.width / 2, rect.top + rect.height / 2, '#2ecc71', 15); }
                }
                updateStreakDisplay();

                // Check for level progression at 5 stars
                const leveledUp = checkLevelProgression();

                if (streak > 0 && streak % 5 === 0 && !leveledUp) {
                    showCombo(streak);
                    if (window.audioManager) window.audioManager.playCorrectSound();
                    if (window.particleSystem) {
                        var el = buttons[index] || document.querySelector('.question-container');
                        if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.sparkle(rect.left + rect.width / 2, rect.top + rect.height / 2, '#2ecc71', 15); }
                    }
                } else if (!leveledUp) {
                    showMessage('נכון! כל הכבוד!', 'success');
                }
            } else {
                // Wrong answer
                buttons[index].classList.add('incorrect');
                buttons[correctAnswerIndex].classList.add('correct');
                streak = 0;
                
                if (window.audioManager) window.audioManager.playWrongSound();
                if (window.particleSystem) {
                    var el = buttons[index] || document.querySelector('.question-container');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#e74c3c'); }
                }
                updateStreakDisplay();
                showMessage(`לא נכון. התשובה הנכונה: ${currentQuestion ? currentQuestion.answer : 'לא ידוע'}`, 'error');
            }
            
            updateStats();
            
            setTimeout(() => {
                if (gameActive) {
                    generateQuestion();
                }
            }, 2000);
        }

        function skipQuestion() {
            const currentTime = Date.now();
            
            // Debounce rapid clicks
            if (currentTime - lastClickTime < DEBOUNCE_TIME) {
                return;
            }
            lastClickTime = currentTime;
            
            if (!gameActive) return;
            
            totalQuestions++;
            streak = 0;
            updateStats();
            updateStreakDisplay();
            generateQuestion();
        }

        function startGame() {
            console.log('Starting new game...');
            
            // Null safety checks
            if (gameActive !== null && typeof gameActive !== 'undefined') {
                // Continue
            }

            // Hide any existing messages
            document.getElementById('message').className = 'message';
            
            score = 0;
            streak = 0;
            totalQuestions = 0;
            correctAnswers = 0;
            gameActive = true;
            
            // Re-enable answer buttons
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct', 'incorrect');
            });
            
            updateStats();
            updateStreakDisplay();
            updateAccessibility();
            
            const config = difficulties[currentDifficulty];
            timeLeft = config.time;
            
            startTimer();
            generateQuestion();
            
            console.log('Game started successfully');
        }

        function startTimer() {
            clearInterval(timer);
            
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            
            // Use requestAnimationFrame for smooth updates
            requestAnimationFrame(() => {
                timerElement.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 10) {
                    timerElement.classList.add('warning');
                } else {
                    timerElement.classList.remove('warning');
                }
            });
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            
            const accuracy = totalQuestions > 0 
                ? Math.round((correctAnswers / totalQuestions) * 100) 
                : 100;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const progress = totalQuestions > 0 
                ? Math.min((correctAnswers / 20) * 100, 100) 
                : 0;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateStreakDisplay() {
            const stars = '⭐'.repeat(Math.min(streak, 10));
            document.getElementById('streakStars').textContent = stars;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
            
            // Only auto-hide message if game is active
            if (gameActive) {
                const hideDelay = type === 'levelup' ? 4000 : 2000; // Longer display for level-up
                setTimeout(() => {
                    message.className = 'message';
                }, hideDelay);
            }
        }

        function showCombo(combo) {
            const comboDisplay = document.getElementById('comboDisplay');
            comboDisplay.textContent = `${combo} COMBO!`;
            comboDisplay.classList.add('show');
            
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            clearInterval(timer);
            timer = null; // Ensure cleanup
            
            const finalScore = score;
            const accuracy = totalQuestions > 0 
                ? Math.round((correctAnswers / totalQuestions) * 100) 
                : 0;
            
            showMessage(
                `המשחק הסתיים! ניקוד סופי: ${finalScore} | דיוק: ${accuracy}%`,
                accuracy >= 70 ? 'success' : 'error'
            );

            if (accuracy >= 70 && window.particleSystem) window.particleSystem.confetti(40);

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.disabled = true;
            });
            
            // Show restart instructions
            setTimeout(() => {
                const message = document.getElementById('message');
                message.innerHTML = `המשחק הסתיים! ניקוד סופי: ${finalScore} | דיוק: ${accuracy}%<br>
                    <button onclick="startGame()" style="background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 1em;">🔄 התחל משחק חדש</button>`;
                message.className = 'message success show';
            }, 2500);
        }

        // Add keyboard navigation and accessibility
        document.addEventListener('keydown', function(e) {
            if (!gameActive) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    console.log('Restarting game via keyboard');
                    startGame();
                }
                return;
            }
            
            // Number keys 1-4 for answer selection
            const keyNumber = parseInt(e.key);
            if (keyNumber >= 1 && keyNumber <= 4) {
                e.preventDefault();
                const answerIndex = keyNumber - 1;
                checkAnswer(answerIndex);
            }
            
            // Arrow key navigation
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const buttons = Array.from(document.querySelectorAll('.answer-btn:not(:disabled)'));
                const currentFocus = document.activeElement;
                const currentIndex = buttons.indexOf(currentFocus);
                
                let newIndex;
                switch (e.key) {
                    case 'ArrowUp':
                    case 'ArrowLeft':
                        newIndex = currentIndex > 0 ? currentIndex - 1 : buttons.length - 1;
                        break;
                    case 'ArrowDown':
                    case 'ArrowRight':
                        newIndex = currentIndex < buttons.length - 1 ? currentIndex + 1 : 0;
                        break;
                }
                
                if (buttons[newIndex]) {
                    buttons[newIndex].focus();
                }
            }
            
            // Enter or Space to click focused button
            if ((e.key === 'Enter' || e.key === ' ') && document.activeElement.classList.contains('answer-btn')) {
                e.preventDefault();
                const buttons = Array.from(document.querySelectorAll('.answer-btn'));
                const focusedIndex = buttons.indexOf(document.activeElement);
                if (focusedIndex !== -1) {
                    checkAnswer(focusedIndex);
                }
            }
            
            // 'S' key to skip question
            if (e.key.toLowerCase() === 's') {
                e.preventDefault();
                skipQuestion();
            }
        });

        // Add ARIA labels and focus management
        function updateAccessibility() {
            const answerBtns = document.querySelectorAll('.answer-btn');
            answerBtns.forEach((btn, index) => {
                btn.setAttribute('aria-label', `תשובה ${index + 1}: ${btn.textContent} - מקש ${index + 1}`);
                btn.setAttribute('tabindex', gameActive ? '0' : '-1');
            });
            
            // Update timer with ARIA live region
            document.getElementById('timer').setAttribute('aria-live', 'assertive');
            document.getElementById('score').setAttribute('aria-live', 'polite');
            document.getElementById('streak').setAttribute('aria-live', 'polite');
        }

        // Initialize game
        updateStats();
        updateStreakDisplay();
        updateAccessibility();

        // Add click listener to game container for easy restart
        document.querySelector('.game-container').addEventListener('click', function(e) {
            if (!gameActive && (e.target.classList.contains('message') || e.target.closest('.message'))) {
                console.log('Restarting game via message click');
                startGame();
            }
        });
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>

function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}

    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
