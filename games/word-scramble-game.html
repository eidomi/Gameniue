<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>בלבול מילים - משחק מילים</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #667eea;
            --color-primary-dark: #764ba2;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --game-accent: #f093fb;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Arial', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--game-gradient);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            transform: scale(1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--game-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            transform: scale(1.05);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
        }

        .stat-box h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-box p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .category-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            color: #2c3e50;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .word-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .scrambled-word {
            font-size: 3em;
            font-weight: bold;
            letter-spacing: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .scrambled-word.animate {
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hint {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 10px;
            min-height: 30px;
        }

        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: stretch;
        }

        .word-input {
            flex: 1;
            padding: 15px 25px;
            font-size: 1.3em;
            border: 3px solid #e9ecef;
            border-radius: var(--radius-pill);
            text-align: center;
            transition: all var(--transition-normal);
            text-transform: uppercase;
        }

        .word-input:focus {
            outline: none;
            border-color: #4facfe;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .word-input.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
        }

        .word-input.incorrect {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .submit-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: var(--radius-pill);
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn.hint-btn {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .control-btn.skip-btn {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .message.success {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .message.error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
            width: 100%;
            transition: width 1s linear;
        }

        .letter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .letter-btn {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            min-width: 50px;
            text-transform: uppercase;
        }

        .letter-btn:hover:not(.used) {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .letter-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(0.9);
        }
        
        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .scrambled-word {
                font-size: 2em;
                letter-spacing: 5px;
            }
            
            .stats {
                flex-direction: row;
                gap: 10px;
            }
            
            .stat-box {
                padding: 10px 15px;
            }
            
            .stat-box h3 {
                font-size: 0.8em;
            }
            
            .stat-box p {
                font-size: 1.4em;
            }
            
            .category-btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }
            
            .letter-btn {
                padding: 12px 15px;
                font-size: 1.2em;
                min-width: 45px;
            }
            
            .word-input {
                font-size: 1.1em;
                padding: 12px 20px;
            }
            
            .submit-btn {
                padding: 12px 25px;
                font-size: 1em;
            }
            
            .control-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
                margin-bottom: 20px;
            }
            
            .scrambled-word {
                font-size: 1.5em;
                letter-spacing: 3px;
            }
            
            .letter-btn {
                padding: 10px 12px;
                font-size: 1em;
                min-width: 40px;
                gap: 5px;
            }
            
            .input-section {
                flex-direction: column;
            }
            
            .submit-btn {
                width: 100%;
            }
        }
    
/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* Visual Feedback States - Added for Accessibility */
/* Keyboard Focus Indicators */
button:focus,
.clickable:focus,
.letter-button:focus {
    outline: 3px solid #4facfe;
    outline-offset: 2px;
    z-index: 10;
}

/* Focus visible only for keyboard */
button:focus-visible {
    outline: 3px solid #00f2fe;
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

/* Remove default outline */
button:focus:not(:focus-visible) {
    outline: none;
}

/* Active/Pressed States */
button:active,
.clickable:active {
    transform: scale(0.95);
    box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.3);
}

.letter-button:active {
    transform: scale(0.98);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.game-cell:active {
    background: rgba(79, 172, 254, 0.3);
    transform: scale(0.97);
}

/* Disabled state feedback */
button:disabled,
.clickable:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(50%);
}

button:disabled:hover {
    transform: none;
    box-shadow: none;
}

/* ======================================== */

/* ========================================
   Micro-Interactions CSS v1.0
   Consistent feedback animations | ROI: 300%
   ======================================== */

/* 1. Button hover/active transitions */
button:not(:disabled):hover,
.btn:not(:disabled):hover,
.control-btn:not(:disabled):hover,
.category-btn:not(:disabled):hover,
.submit-btn:not(:disabled):hover,
.letter-btn:not(.used):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:not(:disabled):active,
.btn:not(:disabled):active,
.submit-btn:not(:disabled):active,
.letter-btn:not(.used):active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
}

/* 2. Letter button pressed state */
.letter-btn:not(.used):active {
    transform: scale(0.92);
    box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.2);
}

/* 3. Success feedback - pulse/glow */
@keyframes correctPulse {
    0%   { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
    40%  { transform: scale(1.08); box-shadow: 0 0 25px rgba(46, 204, 113, 0.7); }
    100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
}

.word-input.correct {
    animation: correctPulse 0.6s ease;
}

/* 4. Score update - pop transition */
@keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); color: #f39c12; }
    100% { transform: scale(1); }
}

.stat-box p,
.score-value {
    transition: color 0.3s ease;
    display: inline-block;
}

.score-updated {
    animation: scorePop 0.4s ease;
}

                    return;
                }
                self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>

<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">
        <span id="modeIcon">🏠</span>
    </button>
    <div class="back-button">
        <button onclick="window.location.href = '../index.html'">🏠 חזרה לדף הראשי</button>
    </div>

    <div class="game-container">
        <h1>🔤 בלבול מילים 🔤</h1>

        <div class="stats">
            <div class="stat-box">
                <h3>נקודות</h3>
                <p id="score">0</p>
            </div>
            <div class="stat-box">
                <h3>רצף נוכחי</h3>
                <p id="streak">0</p>
            </div>
            <div class="stat-box">
                <h3>שלב</h3>
                <p id="level">1</p>
            </div>
        </div>

        <div class="category-selector">
            <button class="category-btn active" onclick="setCategory('animals', event)">חיות</button>
            <button class="category-btn" onclick="setCategory('food', event)">אוכל</button>
            <button class="category-btn" onclick="setCategory('countries', event)">מדינות</button>
            <button class="category-btn" onclick="setCategory('sports', event)">ספורט</button>
            <button class="category-btn" onclick="setCategory('all', event)">הכל</button>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="word-display">
            <div class="scrambled-word" id="scrambledWord">?????</div>
            <div class="hint" id="hint"></div>
        </div>

        <div class="letter-buttons" id="letterButtons"></div>

        <div class="input-section">
            <input type="text" class="word-input" id="wordInput" placeholder="הקלד את המילה כאן" readonly>
            <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">בדוק</button>
        </div>

        <div class="controls">
            <button class="control-btn hint-btn" id="hintBtn" onclick="showHint()">💡 רמז (3)</button>
            <button class="control-btn skip-btn" onclick="skipWord()">⏭️ דלג</button>
            <button class="control-btn" onclick="clearInput()">🔄 נקה</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // Word database
        const words = {
            animals: [
                { word: 'כלב', hint: 'חיית מחמד נאמנה' },
                { word: 'חתול', hint: 'חיית מחמד שאוהבת חלב' },
                { word: 'פיל', hint: 'החיה היבשתית הגדולה ביותר' },
                { word: 'אריה', hint: 'מלך החיות' },
                { word: 'דולפין', hint: 'יונק ימי חכם' },
                { word: 'נמר', hint: 'חתול גדול עם פסים' },
                { word: 'קוף', hint: 'חיה שאוהבת בננות' },
                { word: 'סוס', hint: 'חיה שרוכבים עליה' },
                { word: 'ציפור', hint: 'יש לה כנפיים ויכולה לעוף' },
                { word: 'דג', hint: 'חי במים' }
            ],
            food: [
                { word: 'פיצה', hint: 'מאכל איטלקי עגול' },
                { word: 'המבורגר', hint: 'כריך עם בשר' },
                { word: 'סלט', hint: 'מאכל בריא עם ירקות' },
                { word: 'פלאפל', hint: 'כדורי חומוס מטוגנים' },
                { word: 'חומוס', hint: 'ממרח מחומוס' },
                { word: 'שניצל', hint: 'עוף בפירורי לחם' },
                { word: 'פסטה', hint: 'מאכל איטלקי' },
                { word: 'סושי', hint: 'מאכל יפני עם אורז ודגים' },
                { word: 'עוגה', hint: 'קינוח מתוק' },
                { word: 'גלידה', hint: 'קינוח קר' }
            ],
            countries: [
                { word: 'ישראל', hint: 'המדינה שלנו' },
                { word: 'ספרד', hint: 'מדינה באירופה, בירתה מדריד' },
                { word: 'יפן', hint: 'ארץ השמש העולה' },
                { word: 'ברזיל', hint: 'המדינה הגדולה בדרום אמריקה' },
                { word: 'מצרים', hint: 'ארץ הפירמידות' },
                { word: 'איטליה', hint: 'המגף של אירופה' },
                { word: 'אוסטרליה', hint: 'יבשת ומדינה' },
                { word: 'קנדה', hint: 'השכנה הצפונית של ארה"ב' },
                { word: 'הודו', hint: 'מדינה גדולה באסיה' },
                { word: 'יוון', hint: 'ערש הדמוקרטיה' }
            ],
            sports: [
                { word: 'כדורגל', hint: 'המשחק הפופולרי בעולם' },
                { word: 'כדורסל', hint: 'משחק עם סל וכדור' },
                { word: 'טניס', hint: 'משחק עם מחבט וכדור' },
                { word: 'שחייה', hint: 'ספורט במים' },
                { word: 'ריצה', hint: 'הספורט הבסיסי ביותר' },
                { word: 'אופניים', hint: 'ספורט על שני גלגלים' },
                { word: 'כדורעף', hint: 'משחק עם רשת באמצע' },
                { word: 'גולף', hint: 'משחק עם מקלות וכדור קטן' },
                { word: 'אגרוף', hint: 'קרב בין שני מתאגרפים' },
                { word: 'יוגה', hint: 'פעילות גופנית ורוחנית' }
            ]
        };

        // Game state with performance optimization
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        let currentCategory = 'animals';
        let currentWord = null;
        let scrambledLetters = [];
        let playerWord = [];
        let score = safeGet(localStorage.getItem('wordScore'), 0);
        let streak = 0;
        let level = 1;
        let hints = 3;
        let timer = null;
        let timeLeft = 30;
        let lastInteraction = 0;
        const DEBOUNCE_TIME = 300; // Enhanced debouncing for better performance

        // Audio System v5.0 - Mobile-compatible with error handling and memory cleanup
        function setCategory(category, event) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }
            newWord();
        }

        function getAllWords() {
            let allWords = [];
            Object.values(words).forEach(category => {
                allWords = allWords.concat(category);
            });
            return allWords;
        }

        function scrambleWord(word) {
            const letters = word.split('');
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            // Make sure it's actually scrambled
            if (letters.join('') === word && word.length > 2) {
                return scrambleWord(word);
            }
            return letters;
        }

        function newWord() {
            clearInput();
            const wordInput = document.getElementById('wordInput');
            if (wordInput !== null && typeof wordInput !== 'undefined') {
                wordInput.classList.remove('correct', 'incorrect');
            }
            document.getElementById('message').className = 'message';
            
            const wordList = currentCategory === 'all' ? getAllWords() : words[currentCategory];
            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            if (!currentWord || !currentWord.word) {
                console.warn('Invalid word selected');
                return;
            }
            scrambledLetters = scrambleWord(currentWord.word);
            playerWord = [];
            
            // Add animation to scrambled word
            const scrambledWordEl = document.getElementById('scrambledWord');
            scrambledWordEl.textContent = scrambledLetters.join('');
            scrambledWordEl.classList.add('animate');
            setTimeout(() => scrambledWordEl.classList.remove('animate'), 500);
            
            displayLetterButtons();
            document.getElementById('hint').textContent = '';
            
            // Update accessibility after new word
            updateAccessibility();
            
            startTimer();
        }

        function displayLetterButtons() {
            const container = document.getElementById('letterButtons');
            container.innerHTML = '';
            
            scrambledLetters.forEach((letter, index) => {
                const button = document.createElement('button');
                button.className = 'letter-btn';
                button.textContent = letter;
                button.dataset.index = index;
                button.onclick = () => addLetter(index);
                container.appendChild(button);
            });
        }

        function addLetter(index) {
            // Debounce rapid clicks
            const now = Date.now();
            if (now - lastInteraction < 100) return;
            lastInteraction = now;
            
            const button = document.querySelector(`[data-index="${index}"]`);
            if (button.classList.contains('used')) return;
            
            if (window.audioManager) window.audioManager.playClickSound();
            button.classList.add('used');
            playerWord.push({ letter: scrambledLetters[index], index: index });
            updateInput();
        }

        function clearInput() {
            playerWord = [];
            updateInput();
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('used');
            });
        }

        function updateInput() {
            const input = document.getElementById('wordInput');
            input.value = playerWord.map(item => item.letter).join('');
        }

        function checkAnswer() {
            const playerAnswer = playerWord.map(item => item.letter).join('');
            const input = document.getElementById('wordInput');
            
            if (currentWord && playerAnswer === currentWord.word) {
                // Correct answer
                if (window.audioManager) window.audioManager.playCorrectSound();
                if (window.particleSystem) {
                    var el = input || document.querySelector('.word-display');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.sparkle(rect.left + rect.width / 2, rect.top + rect.height / 2, '#2ecc71', 15); }
                }
                input.classList.add('correct');
                score += 10 * level;
                streak++;
                
                if (streak % 5 === 0) {
                    level++;
                    if (window.particleSystem) window.particleSystem.confetti(40);
                    showMessage(`מעולה! עלית לשלב ${level}!`, 'success');
                } else {
                    showMessage('נכון! כל הכבוד!', 'success');
                }
                
                updateStats();
                setTimeout(newWord, 2000);
            } else {
                // Wrong answer
                if (window.audioManager) window.audioManager.playWrongSound();
                if (window.particleSystem) {
                    var el = input || document.querySelector('.word-display');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#e74c3c'); }
                }
                input.classList.add('incorrect');
                streak = 0;
                updateStats();
                showMessage('לא נכון, נסה שוב!', 'error');
                setTimeout(() => {
                    input.classList.remove('incorrect');
                    document.getElementById('message').className = 'message';
                }, 2000);
            }
        }

        function showHint() {
            if (hints <= 0) return;
            
            hints--;
            document.getElementById('hintBtn').textContent = `💡 רמז (${hints})`;
            document.getElementById('hint').textContent = currentWord && currentWord.hint ? currentWord.hint : '';
            
            if (hints === 0) {
                document.getElementById('hintBtn').disabled = true;
            }
        }

        function skipWord() {
            streak = 0;
            updateStats();
            showMessage(`המילה הייתה: ${currentWord && currentWord.word ? currentWord.word : 'לא ידוע'}`, 'error');
            setTimeout(newWord, 2000);
        }

        function startTimer() {
            clearInterval(timer);
            timeLeft = 30 - (level - 1) * 2; // Less time as level increases
            timeLeft = Math.max(timeLeft, 10); // Minimum 10 seconds
            
            updateTimerDisplay();
            
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    skipWord();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const maxTime = Math.max(30 - (level - 1) * 2, 10);
            const percentage = (timeLeft / maxTime) * 100;
            const timerFill = document.getElementById('timerFill');
            timerFill.style.width = percentage + '%';
            
            // Add visual warning when time is running out
            if (percentage < 20) {
                timerFill.style.background = 'linear-gradient(90deg, #e74c3c, #c0392b)';
                if (percentage < 10) {
                    timerFill.style.animation = 'pulse 1s infinite';
                }
            } else if (percentage < 50) {
                timerFill.style.background = 'linear-gradient(90deg, #f39c12, #e67e22)';
            } else {
                timerFill.style.background = 'linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c)';
                timerFill.style.animation = 'none';
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('level').textContent = level;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
        }

        // Initialize game
        newWord();
        
        // Enhanced cleanup for memory management v5.0
        window.addEventListener('beforeunload', () => {
            clearInterval(timer);
            timer = null;
        });

        window.addEventListener('pagehide', () => {
            clearInterval(timer);
            timer = null;
        });
        
        // Enhanced visibility API for pause/resume v5.0
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(timer);
                timer = null;
            } else if (currentWord && timeLeft > 0) {
                startTimer();
            }
        });
        
        // Enhanced accessibility and keyboard support v5.0
        function updateAccessibility() {
            const input = document.getElementById('wordInput');
            const scrambledSection = document.querySelector('.scrambled-letters');
            
            // Update ARIA labels
            input.setAttribute('aria-label', `הקלד את המילה הנכונה. רמז: ${currentWord ? currentWord.hint : ''}`);
            scrambledSection.setAttribute('aria-label', 'אותיות מבולבלות - גרור לסדר הנכון');
            
            // Update live regions
            document.getElementById('score').setAttribute('aria-live', 'polite');
            document.getElementById('level').setAttribute('aria-live', 'polite');
        }

        document.addEventListener('keydown', (e) => {
            const currentTime = Date.now();
            
            // Enhanced debouncing for all keyboard inputs
            if (currentTime - lastInteraction < DEBOUNCE_TIME) {
                return;
            }
            lastInteraction = currentTime;

            if (e.key === 'Enter') {
                const input = document.getElementById('wordInput');
                if (input.value.length > 0) {
                    checkAnswer();
                }
            } else if (e.key === 'Escape') {
                clearInput();
            } else if (e.key === 'h' || e.key === 'H' || e.key === 'ר') {
                showHint();
            } else if (e.key === 'n' || e.key === 'N') {
                newWord();
            }
        });
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
