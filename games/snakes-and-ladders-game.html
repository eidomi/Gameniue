<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>סולמות ונחשים - המהדורה האולטימטיבית</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Enchanted Storybook palette */
            --color-primary: #d4a574;
            --color-primary-dark: #b8864e;
            --color-success: #4a9e6f;
            --color-success-dark: #367a53;
            --color-error: #c0392b;
            --color-error-dark: #962d22;
            --color-warning: #d4a017;
            --color-warning-dark: #b8890f;
            --color-info: #5b8fb9;
            --color-surface: #fdf6e3;
            --color-text: #2c1810;
            --color-text-light: #6b5744;

            /* Game-specific theme — deep forest */
            --game-gradient: linear-gradient(160deg, #0a1628 0%, #132744 40%, #1a3a2a 100%);
            --game-accent: #d4a574;

            /* Parchment tones */
            --parchment: #f5e6c8;
            --parchment-dark: #e8d5b7;
            --wood: #5c3a1e;
            --wood-light: #8b6740;
            --gold: #d4a574;
            --gold-bright: #f0c97a;
            --emerald: #2d8b57;
            --emerald-glow: rgba(45, 139, 87, 0.4);
            --ruby: #c0392b;
            --ruby-glow: rgba(192, 57, 43, 0.4);
            --sapphire: #2e6b9e;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.4);

            /* Radius progression */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: var(--space-md);
            left: var(--space-md);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: background var(--transition-fast);
            backdrop-filter: blur(8px);
        }

        .settings-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        .settings-toggle:focus-visible {
            outline: 3px solid var(--color-warning);
            outline-offset: 2px;
        }

        .settings-toggle:focus {
            outline: 2px solid rgba(255,255,255,0.6);
        }

        .settings-toggle:active {
            background: rgba(255,255,255,0.35);
            transform: scale(0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-family);
            background: var(--game-gradient);
            color: var(--color-text);
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: var(--space-lg);
            padding-top: 70px;
        }



        .game-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 16px;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
            width: 100%;
        }

        .board-section {
            flex: 1.4;
            min-width: 320px;
            width: 100%;
            max-width: 600px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            background: linear-gradient(135deg, var(--wood) 0%, #3d2612 100%);
            padding: 8px;
            border-radius: 14px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(212, 165, 116, 0.3),
                0 0 0 3px rgba(92, 58, 30, 0.2);
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1/1;
            margin: 0 auto;
            direction: ltr;
            box-sizing: border-box;
        }

        .square {
            background: #fdf6e3;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: clamp(0.6em, 1.6vw, 1em);
            color: #3d2612;
            position: relative;
            cursor: default;
            transition: all var(--transition-fast);
            padding: 1px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden;
            line-height: 1.1;
        }

        /* Row banding — every other row of 10 gets a darker tint */
        .square.row-dark {
            background: #eedcc0;
        }

        .square:hover {
            filter: brightness(1.06);
        }

        /* Snake/ladder destination label */
        .square .dest {
            font-size: 0.75em;
            font-weight: 600;
            opacity: 0.85;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .square.snake-start {
            background: linear-gradient(135deg, #d4453a 0%, #a93226 100%);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(192, 57, 43, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .square.snake-start .dest { color: #ffd5d0; }

        .square.snake-end {
            background: #f0c8c4;
            color: #8b2e23;
            border: 1px dashed rgba(192, 57, 43, 0.3);
        }

        .square.ladder-start {
            background: linear-gradient(135deg, #45b577 0%, #2d8b57 100%);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(45, 139, 87, 0.25);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .square.ladder-start .dest { color: #c8f0d8; }

        .square.ladder-end {
            background: #b8e6c8;
            color: #1a6b3a;
            border: 1px dashed rgba(45, 139, 87, 0.3);
        }

        .square.square-100 {
            background: linear-gradient(135deg, #f0c97a 0%, #d4a574 100%);
            color: var(--wood);
            font-weight: 900;
        }

        /* SVG connection overlay */
        .board-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .player-piece {
            position: absolute;
            width: min(32px, 44%);
            height: min(32px, 44%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8em, 2vw, 1.2em);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .player1 {
            background: linear-gradient(135deg, #f0c97a 0%, #d4a574 100%);
            top: 2px; left: 2px;
            border: 2px solid rgba(92, 58, 30, 0.3);
        }

        .player2 {
            background: linear-gradient(135deg, #9b7bb8 0%, #7b5ea7 100%);
            bottom: 2px; right: 2px;
            border: 2px solid rgba(123, 94, 167, 0.4);
        }

        .player3 {
            background: linear-gradient(135deg, #5bb88a 0%, #3d9e6a 100%);
            top: 2px; right: 2px;
            border: 2px solid rgba(61, 158, 106, 0.4);
        }

        .player4 {
            background: linear-gradient(135deg, #e8956b 0%, #c97040 100%);
            bottom: 2px; left: 2px;
            border: 2px solid rgba(201, 112, 64, 0.4);
        }

        .controls-section {
            flex: 1;
            width: 100%;
            max-width: 380px;
        }

        .player-info {
            background: linear-gradient(135deg, var(--sapphire) 0%, #1e5580 100%);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            color: #fff;
            box-shadow: 0 8px 25px rgba(46, 107, 158, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-info h3 {
            margin-bottom: 8px;
            font-size: 1.5em;
            letter-spacing: 0.01em;
        }

        .player-info.active {
            background: linear-gradient(135deg, var(--emerald) 0%, #1e7a45 100%);
            box-shadow: 0 8px 25px rgba(45, 139, 87, 0.35);
            animation: glow-pulse 2.5s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(45, 139, 87, 0.3); }
            50% { box-shadow: 0 8px 35px rgba(45, 139, 87, 0.5), 0 0 15px rgba(45, 139, 87, 0.15); }
        }

        .dice-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .dice {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #fdf6e3 0%, #e8d5b7 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            color: var(--wood);
            cursor: pointer;
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 0.6),
                inset 0 -2px 4px rgba(92, 58, 30, 0.15);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(212, 165, 116, 0.5);
        }

        .dice:focus {
            outline: 3px solid var(--gold);
            outline-offset: 3px;
        }

        .dice:hover {
            transform: translateY(-4px) rotate(5deg);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--gold);
        }

        .dice.rolling {
            animation: diceRoll 0.5s ease-in-out;
        }

        @keyframes diceRoll {
            0% { transform: rotateX(0) rotateY(0); }
            25% { transform: rotateX(720deg) rotateY(360deg) scale(1.15); }
            50% { transform: rotateX(1440deg) rotateY(720deg) scale(0.85); }
            75% { transform: rotateX(2160deg) rotateY(1080deg) scale(1.08); }
            100% { transform: rotateX(2880deg) rotateY(1440deg) scale(1); }
        }

        .button {
            background: linear-gradient(135deg, var(--gold) 0%, var(--color-primary-dark) 100%);
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: 700;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 20px rgba(184, 134, 78, 0.35);
            width: 100%;
            margin-top: 10px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.02em;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 134, 78, 0.45);
            filter: brightness(1.08);
        }

        .button:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 1.15em;
            margin-top: 16px;
            padding: 14px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: none;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .message.show {
            display: block;
            animation: slideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .snake-visual, .ladder-visual {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .game-setup {
            margin-bottom: 20px;
            text-align: center;
        }

        .game-setup select, .game-setup button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .game-setup select:focus, .game-setup button:focus {
            outline: 2px solid rgba(255,255,255,0.6);
            outline-offset: 2px;
        }

        .game-setup button:hover {
            background: rgba(255,255,255,0.25);
            color: #fff;
        }

        .history {
            background: rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            margin-top: 16px;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .history::-webkit-scrollbar { width: 6px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb {
            background: rgba(212, 165, 116, 0.4);
            border-radius: 3px;
        }

        .history h4 {
            margin-bottom: 8px;
            color: white;
            font-size: 0.95em;
        }

        .history-item {
            padding: 6px 10px;
            margin: 3px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 0.88em;
            color: rgba(255,255,255,0.8);
            border-right: 3px solid var(--gold);
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .game-container {
                flex-direction: column;
                align-items: center;
                padding: 12px;
                gap: 12px;
                max-width: 100%;
                border-radius: var(--radius-md);
            }
            h1 { font-size: 1.8em; margin-bottom: 10px; }
            .board-section {
                min-width: unset;
                width: 100%;
                max-width: calc(100vw - 20px);
            }
            .board {
                width: calc(100vw - 24px);
                max-width: 95vw;
                height: calc(100vw - 24px);
                max-height: 95vw;
                padding: 5px;
                gap: 1px;
            }
            .square .dest { display: none; }
            .square {
                font-size: 0.6em;
                padding: 0;
                border-radius: 2px;
                min-width: 0;
                min-height: 0;
                line-height: 1;
                text-align: center;
            }
            .square small { font-size: 0.9em; }
            .square:hover { transform: none; filter: none; }
            .player-piece {
                width: 18px; height: 18px;
                font-size: 0.7em;
                top: 1px; left: 1px; right: auto; bottom: auto;
                border-width: 1px;
            }
            .player1 { top: 1px; left: 1px; }
            .player2 { top: 1px; right: 1px; left: auto; }
            .player3 { bottom: 1px; left: 1px; top: auto; }
            .player4 { bottom: 1px; right: 1px; top: auto; left: auto; }
            .controls-section { width: 100%; max-width: 400px; padding: 0 8px; }
            .player-info { padding: 12px; font-size: 0.9em; }
            .player-info h3 { font-size: 1.2em; }
            .dice-container { margin: 15px 0; }
            .dice { width: 64px; height: 64px; font-size: 1.8em; border-radius: 10px; }
            .button { padding: 10px 20px; font-size: 0.95em; margin-top: 8px; }
            .game-setup select, .game-setup button { padding: 8px 15px; font-size: 0.9em; margin: 3px; }
            .history { max-height: 80px; padding: 8px; font-size: 0.8em; margin-top: 10px; }
            .history-item { padding: 4px 8px; font-size: 0.85em; }
            .message { font-size: 0.95em; padding: 10px; margin-top: 10px; }
        }

        @media (max-width: 400px) {
            .board {
                width: calc(100vw - 16px); height: calc(100vw - 16px);
                max-width: 96vw; max-height: 96vw;
                padding: 3px; gap: 0.5px;
            }
            .square { font-size: 0.5em; }
            .player-piece { width: 15px; height: 15px; font-size: 0.6em; }
            h1 { font-size: 1.5em; }
            .dice { width: 54px; height: 54px; font-size: 1.5em; }
        }
    
/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* Visual Feedback States - Added for Accessibility */
button:focus,
.clickable:focus,
.cell:focus {
    outline: 3px solid var(--gold);
    outline-offset: 2px;
    z-index: 10;
}

button:focus-visible {
    outline: 3px solid var(--gold-bright);
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(212, 165, 116, 0.4);
}

button:focus:not(:focus-visible) { outline: none; }

button:active, .clickable:active {
    transform: scale(0.95);
    box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.2);
}

.cell:active { transform: scale(0.98); }
.game-cell:active { background: rgba(212, 165, 116, 0.3); transform: scale(0.97); }

button:disabled, .clickable:disabled {
    opacity: 0.5; cursor: not-allowed; filter: grayscale(50%);
}
button:disabled:hover { transform: none; box-shadow: none; }

        /* Responsive Design - Added for mobile optimization */
        @media (max-width: 768px) {
            .container, .game-container {
                padding: 10px;
                margin: 0 auto;
                max-width: 100%;
            }
            
            button {
                font-size: clamp(0.9rem, 2vw, 1.2rem);

                min-height: 44px;
            }
            
            .board, .game-board {
                width: clamp(280px, 90vw, 400px);
                margin: 0 auto;
            }

                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }
        }

                padding: 5px;
            }
            
            .board, .game-board {

                max-width: 350px;
            }
            
            button {
                width: 100%;
                margin: 5px 0;
            }
            
            .stats, .score-board {
                font-size: clamp(0.8rem, 2vw, 1rem);
            }
        }

   Consistent feedback animations | ROI: 300%

/* 1. Button hover/active transitions */
button:not(:disabled):hover,
.btn:not(:disabled):hover,
.button:not(:disabled):hover,
.dice:not(.rolling):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:not(:disabled):active,
.btn:not(:disabled):active,
.button:not(:disabled):active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
}

/* 2. Player piece landing - success pulse */
@keyframes correctPulse {
    0%   { transform: scale(1); box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35); }
    40%  { transform: scale(1.12); box-shadow: 0 0 20px var(--emerald-glow); }
    100% { transform: scale(1); box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35); }
}

.player-piece.landed {
    animation: correctPulse 0.6s ease;
}

/* 3. Error feedback - shake */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
}

.message.error {
    animation: shake 0.5s ease;
}

    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); color: var(--gold-bright); }

}

.player-info h3,
.score-value {
    transition: color 0.3s ease;
    display: inline-block;
}

}

}

<script>
(function() {
    'use strict';

    const WAVETABLES = {
        bell: { real: [0, 0, 0.4, 0, 0.2, 0, 0.1, 0, 0.05], imag: [0, 1, 0, 0.3, 0, 0.1, 0, 0.05, 0] },
        chime: { real: [0, 0, 0.5, 0, 0.25, 0, 0.125], imag: [0, 1, 0, 0.5, 0, 0.25, 0] },
        brass: { real: [0, 0.5, 0.5, 0.35, 0.25, 0.2, 0.15, 0.1, 0.08], imag: [0, 0, 0, 0, 0, 0, 0, 0, 0] },
        warmPad: { real: [0, 1, 0.5, 0.25, 0.125, 0.0625], imag: [0, 0, 0.3, 0.15, 0.075, 0.0375] },
        softBuzz: { real: [0, 0.3, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05], imag: [0, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05, 0.03] }
    };

    const ENVELOPES = {
        bell: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.4 },
        chime: { attack: 0.002, decay: 0.1, sustain: 0.0, release: 0.08 },
        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },
        warmPad: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1.0 },
        softBuzz: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.2 }
    };

    const MODES = {
        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },
        classroom: { volume: 0.25, reverbMix: 0.0, durationScale: 0.6 }
    };

    class AudioManager {
        constructor() {
            if (AudioManager.instance) return AudioManager.instance;
            AudioManager.instance = this;
            this.context = null;
            this.isInitialized = false;
            this.isMuted = false;
            this.globalVolume = 0.5;
            this.activeNodes = new Set();
            this.isSupported = !!(window.AudioContext || window.webkitAudioContext);
            this.enableVisualFeedback = true;
            this.waves = {};
            this.masterGain = null;
            this.dryGain = null;
            this.reverbGain = null;
            this.convolver = null;
            this.mode = 'home';
            this.loadPreferences();
        }

        async initialize() {
            if (this.isInitialized || !this.isSupported) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.context = new AC();
                if (this.context.state === 'suspended') await this.context.resume();

                this.masterGain = this.context.createGain();
                this.masterGain.gain.value = this.globalVolume;
                this.masterGain.connect(this.context.destination);

                this.dryGain = this.context.createGain();
                this.dryGain.gain.value = 0.7;
                this.dryGain.connect(this.masterGain);

                this.reverbGain = this.context.createGain();
                this.reverbGain.gain.value = MODES[this.mode].reverbMix;
                this.convolver = this.context.createConvolver();
                this.convolver.buffer = this.createImpulseResponse(1.5, 2.0);
                this.reverbGain.connect(this.convolver);
                this.convolver.connect(this.masterGain);

                for (const [name, table] of Object.entries(WAVETABLES)) {
                    this.waves[name] = this.context.createPeriodicWave(
                        new Float32Array(table.real), new Float32Array(table.imag)
                    );
                }
                this.applyMode(this.mode);
                this.isInitialized = true;
            } catch (e) {
                console.warn('AudioManager v7.0: init failed', e);
                this.isSupported = false;
            }
        }

        createImpulseResponse(duration, decay) {
            const length = this.context.sampleRate * duration;
            const buffer = this.context.createBuffer(2, length, this.context.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return buffer;
        }

        applyMode(mode) {
            this.mode = mode;
            const profile = MODES[mode] ?? MODES.home;
            this.globalVolume = profile.volume;
            if (this.masterGain) this.masterGain.gain.value = profile.volume;
            if (this.reverbGain) this.reverbGain.gain.value = profile.reverbMix;

        }

            const env = envelope ?? ENVELOPES.bell;
            const ds = this.getDurationScale();
            const dur = duration * ds;
            const vol = volume ?? 1.0;

            const osc = ctx.createOscillator();
            if (waveName && this.waves[waveName]) {

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(vol, now + env.attack * ds);
            gainNode.gain.linearRampToValueAtTime(vol * env.sustain, now + (env.attack + env.decay) * ds);
            gainNode.gain.setValueAtTime(vol * env.sustain, now + dur - env.release * ds);
            gainNode.gain.linearRampToValueAtTime(0, now + dur);

            osc.connect(gainNode);

            if (filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 1;
                gainNode.connect(filter);
                filter.connect(this.dryGain);
                if (useReverb) filter.connect(this.reverbGain);
            } else {
                gainNode.connect(this.dryGain);
                if (useReverb) gainNode.connect(this.reverbGain);
            }

            osc.start(now);
            osc.stop(now + dur + 0.05);
            this.activeNodes.add(osc);
            osc.onended = () => this.activeNodes.delete(osc);

        playSequence(notes, tempo, waveName, envelope, filterFreq, useReverb) {
            const beatDuration = 60 / tempo;
            const ds = this.getDurationScale();
            notes.forEach((note, i) => {
                const freq = note.freq ?? note;

        }

        playLevelUpSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('action'); return; }

            if (this.enableVisualFeedback) this.provideVisualFeedback('action');
        }

        playGameOverSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('warning'); return; }
            this.playSequence([{freq:440,dur:0.4},{freq:415.3,dur:0.4},{freq:392,dur:0.4},{freq:349.23,dur:0.8}], 120, 'warmPad', ENVELOPES.warmPad, 600, true);

        }

            const existing = document.getElementById('audio-visual-feedback');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'audio-visual-feedback';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;';
            overlay.style.background = this.getFeedbackColor(type);
            overlay.style.animation = 'audioFlash 0.3s ease-out';
            document.body.appendChild(overlay);
            overlay.addEventListener('animationend', () => overlay.remove());
            if (!document.getElementById('audio-flash-style')) {
                const style = document.createElement('style');
                style.id = 'audio-flash-style';
                style.textContent = '@keyframes audioFlash{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}';
                document.head.appendChild(style);
            }
        }

        getFeedbackColor(type) {
            const colors = {
                success: 'radial-gradient(circle,rgba(46,204,113,.4) 0%,transparent 70%)',
                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',
                action: 'radial-gradient(circle,rgba(52,152,219,.4) 0%,transparent 70%)',
                warning: 'radial-gradient(circle,rgba(241,196,15,.4) 0%,transparent 70%)'
            };
            return colors[type] ?? colors.action;
        }

        savePreferences() {
            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

        loadPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem('audioPreferences') ?? '{}');
                this.globalVolume = saved.volume ?? 0.5;
                this.isMuted = saved.muted ?? false;
                this.enableVisualFeedback = saved.visualFeedback ?? true;
                this.mode = saved.mode ?? 'home';
            } catch(e) {}
        }

        setVolume(v) { this.globalVolume = Math.max(0,Math.min(1,v)); if(this.masterGain) this.masterGain.gain.value=this.globalVolume; this.savePreferences(); }
        setMuted(m) { this.isMuted = !!m; this.savePreferences(); }
        setVisualFeedback(v) { this.enableVisualFeedback = !!v; this.savePreferences(); }
        setMode(mode) { if (MODES[mode]) this.applyMode(mode); }
        playSound(freq, dur, waveType) { this.playNote(freq, dur ?? 0.15, null, ENVELOPES.chime, null, false, 0.3); }

        destroy() {
            this.activeNodes.forEach(n => { try{n.stop();}catch(e){} });
            this.activeNodes.clear();
            if (this.context) { try{this.context.close();}catch(e){} }
        }
    }

    window.audioManager = new AudioManager();
    const initAudioOnInteraction = async () => {
        await window.audioManager.initialize();
        ['click','touchstart','keydown'].forEach(evt => document.removeEventListener(evt, initAudioOnInteraction));
    };
    ['click','touchstart','keydown'].forEach(evt => document.addEventListener(evt, initAudioOnInteraction, {once:false}));
    window.addEventListener('beforeunload', () => { if(window.audioManager) window.audioManager.destroy(); });
})();
</script>

<script>
(function() {
    'use strict';

    class ParticleSystem {
        constructor() {
            if (ParticleSystem.instance) return ParticleSystem.instance;
            ParticleSystem.instance = this;
            this.canvas = null;
            this.ctx = null;
            this.particles = [];
            this.animationId = null;
            this.reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        }

        ensureCanvas() {
            if (this.canvas) return;
            this.canvas = document.createElement('canvas');
            this.canvas.id = 'particle-canvas';
            this.canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;';
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
            document.body.appendChild(this.canvas);
            this.ctx = this.canvas.getContext('2d');
            window.addEventListener('resize', () => {
                if (this.canvas) {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }
            });
        }

        getParticleCount(base) {
            if (this.reducedMotion) return 0;
            var mode = window.audioManager ? window.audioManager.mode : 'home';
            return mode === 'classroom' ? Math.floor(base * 0.3) : base;
        }

        sparkle(x, y, color, count) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(count || 12);
            for (var i = 0; i < n; i++) {
                var angle = (Math.PI * 2 * i) / n + (Math.random() * 0.3);
                var speed = 2 + Math.random() * 3;
                this.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1, decay: 0.02 + Math.random() * 0.02,
                    size: 3 + Math.random() * 4,
                    color: color || '#f9ca24',
                    type: 'sparkle'
                });
            }
            this.startLoop();
        }

        confetti(count) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(count || 40);
            var colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#2ecc71'];
            for (var i = 0; i < n; i++) {
                this.particles.push({
                    x: Math.random() * this.canvas.width, y: -10,
                    vx: (Math.random() - 0.5) * 4,
                    vy: 2 + Math.random() * 3,
                    life: 1, decay: 0.005 + Math.random() * 0.005,
                    size: 6 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    type: 'confetti'
                });
            }
            this.startLoop();
        }

        burst(x, y, color) {
            if (this.reducedMotion) return;
            this.ensureCanvas();
            var n = this.getParticleCount(8);
            for (var i = 0; i < n; i++) {
                var angle = (Math.PI * 2 * i) / n;
                this.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * 5,
                    vy: Math.sin(angle) * 5,
                    life: 1, decay: 0.03,
                    size: 5,
                    color: color || '#e74c3c',
                    type: 'burst'
                });
            }
            this.startLoop();
        }

        startLoop() {
            if (this.animationId) return;
            var self = this;
            var loop = function() {
                if (self.particles.length === 0) {
                    self.animationId = null;
                    if (self.ctx) self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                    return;
                }
                self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>

<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">

    <div class="game-container">
        <h1>🐍 סולמות ונחשים 🪜</h1>
        
        <div class="board-section">
            <div class="game-setup" id="gameSetup">
                <label>שחקנים: </label>
                <select id="playerCount">
                    <option value="2">2 שחקנים</option>
                    <option value="3">3 שחקנים</option>
                    <option value="4">4 שחקנים</option>
                </select>
                <button class="button" onclick="startGame()" style="width: auto;">התחל משחק</button>
            </div>
            
            <div class="board" id="gameBoard" style="display: none;">
                <!-- Board squares will be generated by JavaScript -->
            </div>
        </div>
        
        <div class="controls-section" id="controlsSection" style="display: none;">
            <div class="player-info active" id="playerInfo">
                <h3>תור שחקן <span id="currentPlayer">1</span></h3>
                <p>מיקום: <span id="playerPosition">1</span></p>
            </div>
            
            <div class="dice-container">
                <div class="dice" id="dice" onclick="rollDice(event)" ontouchstart="rollDice(event)" 
                     tabindex="0" role="button" aria-label="הטל קובייה" 
                     onkeydown="handleDiceKeyPress(event)">🎲</div>
            </div>
            
            <button class="button" onclick="rollDice(event)" ontouchstart="rollDice(event)">הטל קובייה</button>
            
            <div style="text-align: center; margin-top: 10px; font-size: 0.9em; color: #666;">
                💡 לחץ על הקובייה או השתמש ברווח/Enter
            </div>
            
            <div class="message" id="message"></div>
            
            <div class="history">
                <h4>היסטוריית מהלכים</h4>
                <div id="historyLog"></div>
            </div>
            
            <button class="button" onclick="resetGame()">משחק חדש</button>
        </div>
    </div>

    <script>
        // Game configuration
        const BOARD_SIZE = 100;
        const snakes = {
            98: 78, 95: 75, 93: 73, 87: 24, 64: 60, 62: 19, 56: 53, 49: 11, 47: 26, 16: 6
        };
        const ladders = {
            2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 78: 98, 80: 94
        };
        
        // Game state
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        let players = [];
        let currentPlayerIndex = 0;
        let gameActive = false;
        let isMoving = false;
        let lastTouchTime = 0;
        let rollInterval = safeGet(localStorage.getItem('gameInterval'), null);
        const DEBOUNCE_TIME = 300;
        
        // Audio functions provided by global window.audioManager (Audio System v7.0)

        function playDiceSound() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => { if (window.audioManager) window.audioManager.playSound(200 + Math.random() * 400, 0.05, 'square'); }, i * 50);
            }
        }

        function playMoveSound() {
            if (window.audioManager) window.audioManager.playSound(440, 0.1);
        }

        function playSnakeSound() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => { if (window.audioManager) window.audioManager.playSound(800 - i * 50, 0.1, 'sawtooth'); }, i * 50);
            }
        }

        function playLadderSound() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => { if (window.audioManager) window.audioManager.playSound(400 + i * 50, 0.1); }, i * 50);
            }
        }

        function playWinSound() {
            const notes = [523, 659, 784, 1047, 784, 1047];
            notes.forEach((note, i) => {
                setTimeout(() => { if (window.audioManager) window.audioManager.playSound(note, 0.3); }, i * 200);
            });
        }
        
        function initializeBoard() {
            const board = document.getElementById('gameBoard');
            if (board !== null && typeof board !== 'undefined') {
                board.innerHTML = '';
            }

            // Remove old SVG if any
            const oldSvg = board?.parentElement?.querySelector('.board-svg');
            if (oldSvg) oldSvg.remove();

            // Create squares in reverse order for proper board layout
            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num;
                    if (row % 2 === 0) {
                        num = row * 10 + col + 1;
                    } else {
                        num = row * 10 + (10 - col);
                    }

                    const square = document.createElement('div');
                    square.className = 'square';
                    square.id = `square-${num}`;

                    // Row banding: visual row index (0=top row which is 91-100, etc.)
                    const visualRow = 9 - row;
                    if (visualRow % 2 === 1) square.classList.add('row-dark');

                    // Mark special squares with destination labels
                    if (snakes[num]) {
                        square.classList.add('snake-start');
                        square.innerHTML = `${num}<span class="dest">↓${snakes[num]}</span>`;
                    } else if (Object.values(snakes).includes(num)) {
                        square.classList.add('snake-end');
                        square.textContent = num;
                    } else if (ladders[num]) {
                        square.classList.add('ladder-start');
                        square.innerHTML = `${num}<span class="dest">↑${ladders[num]}</span>`;
                    } else if (Object.values(ladders).includes(num)) {
                        square.classList.add('ladder-end');
                        square.textContent = num;
                    } else {
                        square.textContent = num;
                    }

                    if (num === 100) {
                        square.classList.add('square-100');
                        square.innerHTML = '🏆100';
                    }

                    board.appendChild(square);
                }
            }

            // Draw SVG connections after a frame so layout is ready
            requestAnimationFrame(() => drawConnections());
        }

        function drawConnections() {
            const board = document.getElementById('gameBoard');
            if (!board) return;

            // Remove existing SVG
            const existing = board.querySelector('.board-svg');
            if (existing) existing.remove();

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('board-svg');
            svg.setAttribute('viewBox', `0 0 ${board.offsetWidth} ${board.offsetHeight}`);
            svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';

            const boardRect = board.getBoundingClientRect();

            function getSquareCenter(num) {
                const sq = document.getElementById(`square-${num}`);
                if (!sq) return null;
                const r = sq.getBoundingClientRect();
                return {
                    x: r.left - boardRect.left + r.width / 2,
                    y: r.top - boardRect.top + r.height / 2
                };
            }

            // Draw snakes (wavy red lines)
            for (const [from, to] of Object.entries(snakes)) {
                const start = getSquareCenter(parseInt(from));
                const end = getSquareCenter(to);
                if (!start || !end) continue;

                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const mx = (start.x + end.x) / 2;
                const my = (start.y + end.y) / 2;
                // Offset control points for a wavy S-curve
                const off = Math.min(Math.abs(dx), 30) + 15;
                const cp1x = mx + off;
                const cp1y = start.y + (end.y - start.y) * 0.3;
                const cp2x = mx - off;
                const cp2y = start.y + (end.y - start.y) * 0.7;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M${start.x},${start.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${end.x},${end.y}`);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', 'rgba(192, 57, 43, 0.45)');
                path.setAttribute('stroke-width', '3');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-dasharray', '6,4');
                svg.appendChild(path);

                // Snake head dot at start
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('cx', start.x);
                dot.setAttribute('cy', start.y);
                dot.setAttribute('r', '4');
                dot.setAttribute('fill', 'rgba(192, 57, 43, 0.6)');
                svg.appendChild(dot);
            }

            // Draw ladders (gold parallel lines with rungs)
            for (const [from, to] of Object.entries(ladders)) {
                const start = getSquareCenter(parseInt(from));
                const end = getSquareCenter(to);
                if (!start || !end) continue;

                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                // Perpendicular offset for parallel rails
                const px = (-dy / len) * 4;
                const py = (dx / len) * 4;

                // Left rail
                const rail1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                rail1.setAttribute('x1', start.x + px); rail1.setAttribute('y1', start.y + py);
                rail1.setAttribute('x2', end.x + px); rail1.setAttribute('y2', end.y + py);
                rail1.setAttribute('stroke', 'rgba(184, 134, 78, 0.5)');
                rail1.setAttribute('stroke-width', '2');
                rail1.setAttribute('stroke-linecap', 'round');
                svg.appendChild(rail1);

                // Right rail
                const rail2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                rail2.setAttribute('x1', start.x - px); rail2.setAttribute('y1', start.y - py);
                rail2.setAttribute('x2', end.x - px); rail2.setAttribute('y2', end.y - py);
                rail2.setAttribute('stroke', 'rgba(184, 134, 78, 0.5)');
                rail2.setAttribute('stroke-width', '2');
                rail2.setAttribute('stroke-linecap', 'round');
                svg.appendChild(rail2);

                // Rungs (4-6 evenly spaced)
                const rungCount = Math.max(3, Math.min(6, Math.floor(len / 20)));
                for (let i = 1; i <= rungCount; i++) {
                    const t = i / (rungCount + 1);
                    const rx = start.x + dx * t;
                    const ry = start.y + dy * t;
                    const rung = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    rung.setAttribute('x1', rx + px); rung.setAttribute('y1', ry + py);
                    rung.setAttribute('x2', rx - px); rung.setAttribute('y2', ry - py);
                    rung.setAttribute('stroke', 'rgba(184, 134, 78, 0.4)');
                    rung.setAttribute('stroke-width', '1.5');
                    rung.setAttribute('stroke-linecap', 'round');
                    svg.appendChild(rung);
                }
            }

            board.appendChild(svg);
        }

        // Redraw connections on resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { if (gameActive) drawConnections(); }, 200);
        });
        
        function startGame() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            players = [];
            
            const playerEmojis = ['👤', '👥', '👦', '👧'];
            const playerClasses = ['player1', 'player2', 'player3', 'player4'];
            
            for (let i = 0; i < playerCount; i++) {
                players.push({
                    id: i + 1,
                    position: 1,
                    emoji: playerEmojis[i],
                    class: playerClasses[i]
                });
            }
            
            currentPlayerIndex = 0;
            gameActive = true;
            
            // Hide setup, show game
            document.getElementById('gameSetup').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'grid';
            document.getElementById('controlsSection').style.display = 'block';
            
            initializeBoard();
            updatePlayerPositions();
            updateCurrentPlayerInfo();
            
            addToHistory('המשחק התחיל עם ' + playerCount + ' שחקנים!');
        }
        
        function updatePlayerPositions() {
            // Cache DOM elements for better performance
            const squares = {};
            
            // Remove all existing player pieces efficiently
            document.querySelectorAll('.player-piece').forEach(piece => piece.remove());
            
            // Add player pieces at their positions
            players.forEach(player => {
                // Cache square lookup
                if (!squares[player.position]) {
                    squares[player.position] = document.getElementById(`square-${player.position}`);
                }
                
                const square = squares[player.position];
                if (square) {
                    const piece = document.createElement('div');
                    piece.className = `player-piece ${player.class}`;
                    piece.textContent = player.emoji;
                    piece.setAttribute('aria-label', `שחקן ${player.id} במיקום ${player.position}`);
                    square.appendChild(piece);
                }
            });
        }
        
        function updateCurrentPlayerInfo() {
            const currentPlayer = players[currentPlayerIndex];
            document.getElementById('currentPlayer').textContent = currentPlayer.id;
            document.getElementById('playerPosition').textContent = currentPlayer.position;
            
            // Update player info styling
            const playerInfo = document.getElementById('playerInfo');
            playerInfo.className = `player-info active ${currentPlayer.class}`;
        }
        
        function rollDice(event) {
            // Enhanced debouncing for touch and click events
            const currentTime = Date.now();
            if (currentTime - lastTouchTime < DEBOUNCE_TIME) {
                return;
            }
            lastTouchTime = currentTime;
            
            // Prevent default for touch events
            if (event && event.type === 'touchstart') {
                event.preventDefault();
            }
            
            if (!gameActive || isMoving) return;
            
            isMoving = true;
            const dice = document.getElementById('dice');
            dice.classList.add('rolling');
            playDiceSound();
            
            // Clear any existing interval
            if (rollInterval) {
                clearInterval(rollInterval);
            }
            
            // Animate dice rolling with performance optimization
            let rollCount = 0;
            rollInterval = setInterval(() => {
                requestAnimationFrame(() => {
                    dice.textContent = Math.floor(Math.random() * 6) + 1;
                });
                rollCount++;
                
                if (rollCount > 10) {
                    clearInterval(rollInterval);
                    rollInterval = null;
                    const finalRoll = Math.floor(Math.random() * 6) + 1;
                    
                    requestAnimationFrame(() => {
                        dice.textContent = finalRoll;
                        dice.classList.remove('rolling');
                    });
                    
                    setTimeout(() => {
                        movePiece(finalRoll);
                    }, 300);
                }
            }, 100);
        }
        
        async function movePiece(steps) {
            const currentPlayer = players[currentPlayerIndex];
            const startPosition = currentPlayer.position;
            let targetPosition = startPosition + steps;
            
            // Check if move would go beyond 100
            if (targetPosition > BOARD_SIZE) {
                showMessage(`צריך זריקה מדויקת כדי לנצח! זרקת ${steps} אבל צריך ${BOARD_SIZE - startPosition} או פחות.`);
                addToHistory(`שחקן ${currentPlayer.id} זרק ${steps} - גבוה מדי!`);
                nextTurn();
                return;
            }
            
            // Animate movement step by step with requestAnimationFrame
            for (let i = 1; i <= steps; i++) {
                await new Promise(resolve => {
                    setTimeout(() => {
                        requestAnimationFrame(() => {
                            currentPlayer.position = startPosition + i;
                            updatePlayerPositions();
                            playMoveSound();
                            resolve();
                        });
                    }, 200);
                });
            }
            
            let finalPosition = targetPosition;
            let moveType = 'normal';
            
            // Check for snakes
            if (snakes[targetPosition]) {
                finalPosition = snakes[targetPosition];
                moveType = 'snake';
                showMessage(`אוי לא! נשיכת נחש! יורד ל-${finalPosition}`);
                playSnakeSound();
                if (window.particleSystem) window.particleSystem.burst(window.innerWidth / 2, window.innerHeight / 2, '#e74c3c');
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                currentPlayer.position = finalPosition;
                updatePlayerPositions();
            }
            
            // Check for ladders
            if (ladders[targetPosition]) {
                finalPosition = ladders[targetPosition];
                moveType = 'ladder';
                showMessage(`מזל טוב! מטפס בסולם ל-${finalPosition}`);
                playLadderSound();
                if (window.particleSystem) window.particleSystem.sparkle(window.innerWidth / 2, window.innerHeight / 3, '#2ecc71', 15);
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                currentPlayer.position = finalPosition;
                updatePlayerPositions();
            }
            
            // Log the move
            let historyText = `שחקן ${currentPlayer.id} זרק ${steps}: ${startPosition} → ${targetPosition}`;
            if (moveType === 'snake') historyText += ` 🐍→ ${finalPosition}`;
            if (moveType === 'ladder') historyText += ` 🪜→ ${finalPosition}`;
            addToHistory(historyText);
            
            // Check for win
            if (finalPosition === BOARD_SIZE) {
                gameActive = false;
                playWinSound();
                if (window.particleSystem) window.particleSystem.confetti(60);
                showMessage(`🎉 שחקן ${currentPlayer.id} ניצח! 🎉`);
                addToHistory(`🏆 שחקן ${currentPlayer.id} ניצח במשחק!`);
                document.getElementById('dice').style.display = 'none';
                return;
            }
            
            nextTurn();
        }
        
        function nextTurn() {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            updateCurrentPlayerInfo();
            isMoving = false;
            
            if (!gameActive) return;
            
            setTimeout(() => {
                const messages = document.querySelectorAll('.message.show');
                messages.forEach(msg => msg.classList.remove('show'));
            }, 2000);
        }
        
        function showMessage(text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.classList.add('show');
        }
        
        function addToHistory(text) {
            const historyLog = document.getElementById('historyLog');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.textContent = text;
            historyLog.insertBefore(item, historyLog.firstChild);
            
            // Keep only last 10 items
            while (historyLog.children.length > 10) {
                historyLog.removeChild(historyLog.lastChild);
            }
        }
        
        function handleDiceKeyPress(event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                rollDice(event);
            }
        }
        
        // Keyboard support
        document.addEventListener('keydown', (event) => {
            if (!gameActive || isMoving) return;
            
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault();
                rollDice(event);
            }
        });
        
        function resetGame() {
            gameActive = false;
            players = [];
            currentPlayerIndex = 0;
            isMoving = false;
            
            // Clear any active intervals
            if (rollInterval) {
                clearInterval(rollInterval);
                rollInterval = null;
            }
            
            // Reset UI elements
            document.getElementById('gameSetup').style.display = 'block';
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('controlsSection').style.display = 'none';
            document.getElementById('dice').style.display = 'block';
            document.getElementById('dice').textContent = '🎲';
            document.getElementById('historyLog').innerHTML = '';
            
            // Clear all messages
            const messages = document.querySelectorAll('.message.show');
            messages.forEach(msg => msg.classList.remove('show'));
        }
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
