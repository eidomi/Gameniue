<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק זיכרון - התאמת קלפים</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #667eea;
            --color-primary-dark: #764ba2;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --game-accent: #667eea;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Arial', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--game-gradient);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            transform: scale(1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--game-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            transform: scale(1.05);
        }

        @media (hover: none) {
            .back-button button:hover {
                transform: none;
            }
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .controls button {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all var(--transition-normal);
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 0 auto;
            max-width: 400px;
        }

        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0.6;
            cursor: default;
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card:hover:not(.flipped):not(.matched) {
            transform: scale(1.05);
        }

        .win-message {
            text-align: center;
            font-size: 1.5em;
            color: #4a5568;
            margin-top: 20px;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
            
            .stat-box {
                width: 100%;
                max-width: 200px;
            }
        }

        @media (hover: none) {
            button:hover,
            .card:hover:not(.flipped):not(.matched) {
                transform: none;
            }
        }
    
/* Focus States - Added by automated script */
button:focus,
.clickable:focus,
.card:focus,
.game-cell:focus {
    outline: 3px solid #4facfe;
    outline-offset: 2px;
    z-index: 10;
}

button:focus-visible {
    outline: 3px solid #00f2fe;
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

button:focus:not(:focus-visible) {
    outline: none;
}
/* Active States - Added by automated script */
button:active,
.clickable:active {
    transform: scale(0.95);
    box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.3);
}

.card:active {
    transform: scale(0.98);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.game-cell:active {
    background: rgba(79, 172, 254, 0.3);
    transform: scale(0.97);
}
/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

                font-size: clamp(0.8rem, 2vw, 1rem);
            }

<script>
(function() {
    'use strict';

    const WAVETABLES = {
        bell: { real: [0, 0, 0.4, 0, 0.2, 0, 0.1, 0, 0.05], imag: [0, 1, 0, 0.3, 0, 0.1, 0, 0.05, 0] },
        chime: { real: [0, 0, 0.5, 0, 0.25, 0, 0.125], imag: [0, 1, 0, 0.5, 0, 0.25, 0] },
        brass: { real: [0, 0.5, 0.5, 0.35, 0.25, 0.2, 0.15, 0.1, 0.08], imag: [0, 0, 0, 0, 0, 0, 0, 0, 0] },
        warmPad: { real: [0, 1, 0.5, 0.25, 0.125, 0.0625], imag: [0, 0, 0.3, 0.15, 0.075, 0.0375] },
        softBuzz: { real: [0, 0.3, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05], imag: [0, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05, 0.03] }
    };

    const ENVELOPES = {
        bell: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.4 },
        chime: { attack: 0.002, decay: 0.1, sustain: 0.0, release: 0.08 },
        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },
        warmPad: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1.0 },
        softBuzz: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.2 }
    };

    const MODES = {
        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },
        classroom: { volume: 0.25, reverbMix: 0.0, durationScale: 0.6 }
    };

    class AudioManager {
        constructor() {
            if (AudioManager.instance) return AudioManager.instance;
            AudioManager.instance = this;
            this.context = null;
            this.isInitialized = false;
            this.isMuted = false;
            this.globalVolume = 0.5;
            this.activeNodes = new Set();
            this.isSupported = !!(window.AudioContext || window.webkitAudioContext);
            this.enableVisualFeedback = true;
            this.waves = {};
            this.masterGain = null;
            this.dryGain = null;
            this.reverbGain = null;
            this.convolver = null;
            this.mode = 'home';
            this.loadPreferences();
        }

        async initialize() {
            if (this.isInitialized || !this.isSupported) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.context = new AC();
                if (this.context.state === 'suspended') await this.context.resume();

                this.masterGain = this.context.createGain();
                this.masterGain.gain.value = this.globalVolume;
                this.masterGain.connect(this.context.destination);

                this.dryGain = this.context.createGain();
                this.dryGain.gain.value = 0.7;
                this.dryGain.connect(this.masterGain);

                this.reverbGain = this.context.createGain();
                this.reverbGain.gain.value = MODES[this.mode].reverbMix;
                this.convolver = this.context.createConvolver();
                this.convolver.buffer = this.createImpulseResponse(1.5, 2.0);
                this.reverbGain.connect(this.convolver);
                this.convolver.connect(this.masterGain);

                for (const [name, table] of Object.entries(WAVETABLES)) {
                    this.waves[name] = this.context.createPeriodicWave(
                        new Float32Array(table.real), new Float32Array(table.imag)
                    );
                }
                this.applyMode(this.mode);
                this.isInitialized = true;
            } catch (e) {
                console.warn('AudioManager v7.0: init failed', e);
                this.isSupported = false;
            }
        }

        createImpulseResponse(duration, decay) {
            const length = this.context.sampleRate * duration;
            const buffer = this.context.createBuffer(2, length, this.context.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return buffer;
        }

        applyMode(mode) {
            this.mode = mode;
            const profile = MODES[mode] ?? MODES.home;
            this.globalVolume = profile.volume;
            if (this.masterGain) this.masterGain.gain.value = profile.volume;
            if (this.reverbGain) this.reverbGain.gain.value = profile.reverbMix;
            this.savePreferences();
        }

        getDurationScale() { return MODES[this.mode]?.durationScale ?? 1.0; }

        playNote(frequency, duration, waveName, envelope, filterFreq, useReverb, volume) {
            if (!this.isInitialized || this.isMuted || !this.isSupported) {
                if (this.enableVisualFeedback) this.provideVisualFeedback('action');
                return;
            }
            const ctx = this.context;
            const now = ctx.currentTime;
            const env = envelope ?? ENVELOPES.bell;
            const ds = this.getDurationScale();
            const dur = duration * ds;
            const vol = volume ?? 1.0;

            const osc = ctx.createOscillator();
            if (waveName && this.waves[waveName]) {
                osc.setPeriodicWave(this.waves[waveName]);
            } else {
                osc.type = 'sine';
            }
            osc.frequency.value = frequency;

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(vol, now + env.attack * ds);
            gainNode.gain.linearRampToValueAtTime(vol * env.sustain, now + (env.attack + env.decay) * ds);
            gainNode.gain.setValueAtTime(vol * env.sustain, now + dur - env.release * ds);
            gainNode.gain.linearRampToValueAtTime(0, now + dur);

            osc.connect(gainNode);

            if (filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 1;
                gainNode.connect(filter);
                filter.connect(this.dryGain);
                if (useReverb) filter.connect(this.reverbGain);
            } else {
                gainNode.connect(this.dryGain);
                if (useReverb) gainNode.connect(this.reverbGain);
            }

            osc.start(now);
            osc.stop(now + dur + 0.05);
            this.activeNodes.add(osc);
            osc.onended = () => this.activeNodes.delete(osc);
        }

        playSequence(notes, tempo, waveName, envelope, filterFreq, useReverb) {
            const beatDuration = 60 / tempo;
            const ds = this.getDurationScale();
            notes.forEach((note, i) => {
                const freq = note.freq ?? note;
                const dur = (note.dur ?? beatDuration) * ds;
                const vol = note.vol ?? 1.0;
                setTimeout(() => {
                    this.playNote(freq, dur, waveName, envelope, filterFreq, useReverb, vol);
                }, i * beatDuration * ds * 1000);
            });
        }

        playCorrectSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.12},{freq:659.25,dur:0.12},{freq:783.99,dur:0.2}], 480, 'bell', ENVELOPES.bell, 2000, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playWrongSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('error'); return; }
            this.playSequence([{freq:200,dur:0.15,vol:0.3},{freq:150,dur:0.15,vol:0.2}], 300, 'softBuzz', ENVELOPES.softBuzz, 800, false);
            if (this.enableVisualFeedback) this.provideVisualFeedback('error');
        }

        playClickSound() {
            if (!this.isInitialized || this.isMuted) return;
            this.playNote(800, 0.03, 'chime', ENVELOPES.chime, null, false, 0.2);
        }

        playWinSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.25},{freq:659.25,dur:0.25},{freq:783.99,dur:0.25},{freq:1046.5,dur:0.5}], 240, 'brass', ENVELOPES.brass, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playLevelUpSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('action'); return; }
            this.playSequence([{freq:440,dur:0.15},{freq:554.37,dur:0.15},{freq:659.25,dur:0.15},{freq:880,dur:0.3}], 360, 'chime', ENVELOPES.chime, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('action');
        }

        playGameOverSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('warning'); return; }
            this.playSequence([{freq:440,dur:0.4},{freq:415.3,dur:0.4},{freq:392,dur:0.4},{freq:349.23,dur:0.8}], 120, 'warmPad', ENVELOPES.warmPad, 600, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('warning');
        }

        flashScreen(type) { this.provideVisualFeedback(type); }

        provideVisualFeedback(type) {
            if (typeof document === 'undefined') return;
            const existing = document.getElementById('audio-visual-feedback');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'audio-visual-feedback';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;';
            overlay.style.background = this.getFeedbackColor(type);
            overlay.style.animation = 'audioFlash 0.3s ease-out';
            document.body.appendChild(overlay);
            overlay.addEventListener('animationend', () => overlay.remove());
            if (!document.getElementById('audio-flash-style')) {
                const style = document.createElement('style');
                style.id = 'audio-flash-style';
                style.textContent = '@keyframes audioFlash{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}';
                document.head.appendChild(style);
            }
        }

        getFeedbackColor(type) {
            const colors = {
                success: 'radial-gradient(circle,rgba(46,204,113,.4) 0%,transparent 70%)',
                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',
                action: 'radial-gradient(circle,rgba(52,152,219,.4) 0%,transparent 70%)',
                warning: 'radial-gradient(circle,rgba(241,196,15,.4) 0%,transparent 70%)'
            };
            return colors[type] ?? colors.action;
        }

        savePreferences() {
            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

        loadPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem('audioPreferences') ?? '{}');
                this.globalVolume = saved.volume ?? 0.5;
                this.isMuted = saved.muted ?? false;
                this.enableVisualFeedback = saved.visualFeedback ?? true;
                this.mode = saved.mode ?? 'home';
            } catch(e) {}
        }

        setVolume(v) { this.globalVolume = Math.max(0,Math.min(1,v)); if(this.masterGain) this.masterGain.gain.value=this.globalVolume; this.savePreferences(); }
        setMuted(m) { this.isMuted = !!m; this.savePreferences(); }
        setVisualFeedback(v) { this.enableVisualFeedback = !!v; this.savePreferences(); }
        setMode(mode) { if (MODES[mode]) this.applyMode(mode); }

        destroy() {
            this.activeNodes.forEach(n => { try{n.stop();}catch(e){} });
            this.activeNodes.clear();
            if (this.context) { try{this.context.close();}catch(e){} }
        }
    }

    window.audioManager = new AudioManager();
    const initAudioOnInteraction = async () => {
        await window.audioManager.initialize();
        ['click','touchstart','keydown'].forEach(evt => document.removeEventListener(evt, initAudioOnInteraction));
    };
    ['click','touchstart','keydown'].forEach(evt => document.addEventListener(evt, initAudioOnInteraction, {once:false}));
    window.addEventListener('beforeunload', () => { if(window.audioManager) window.audioManager.destroy(); });
})();
</script>

    <script>
        // Game State Management v5.0 - Enhanced state management with persistence
        const GAME_STATE_KEY = 'memoryMatchGameState';
        
        function saveGameState() {
            if (!gameStarted) return;
            
            const gameState = {
                matchedPairs,
                moves,
                hintsLeft,
                elapsedTime: Math.floor((Date.now() - startTime) / 1000),
                matchedPairIndices: cards
                    .filter(card => card.classList.contains('matched'))
                    .map(card => card.dataset.pairIndex),
                timestamp: Date.now()
            };
            
            try {
                localStorage.setItem(GAME_STATE_KEY, JSON.stringify(gameState));
            } catch (e) {
                console.warn('Cannot save game state:', e);
            }
        }

        function loadGameState() {
            try {
                const saved = localStorage.getItem(GAME_STATE_KEY);
                if (!saved) return false;
                
                const gameState = JSON.parse(saved);
                const timeSinceLastSave = Date.now() - gameState.timestamp;
                
                // Don't restore if more than 1 hour has passed
                if (timeSinceLastSave > 3600000) {
                    localStorage.removeItem(GAME_STATE_KEY);
                    return false;
                }
                
                return gameState;
            } catch (e) {
                console.warn('Cannot load game state:', e);
                localStorage.removeItem(GAME_STATE_KEY);
                return false;
            }
        }

        function clearGameState() {
            try {
                localStorage.removeItem(GAME_STATE_KEY);
            } catch (e) {
                console.warn('Cannot clear game state:', e);
            }
        }

        // Utility function for null safety with nullish coalescing
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        
        // Game variables with enhanced state management and null safety
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let gameStarted = false;
        let startTime;
        let timerInterval;
        let hintsLeft = 3;
        let isProcessing = false;
        let isPaused = false;
        let pausedTime = 0;
        let highScore = parseInt(localStorage.getItem('memoryMatchHighScore'), 10) || Infinity;
        let lastTouchTime = 0;
        const DEBOUNCE_TIME = 300;

        // Hebrew-English vocabulary pairs for card faces
        const cardPairs = [
            { hebrew: 'כלב', english: 'Dog', emoji: '🐕' },
            { hebrew: 'חתול', english: 'Cat', emoji: '🐈' },
            { hebrew: 'בית', english: 'House', emoji: '🏠' },
            { hebrew: 'שמש', english: 'Sun', emoji: '☀️' },
            { hebrew: 'ספר', english: 'Book', emoji: '📖' },
            { hebrew: 'פרח', english: 'Flower', emoji: '🌸' }
        ];
        
        // Audio: Uses global window.audioManager (Audio Manager v6.0)

        // Performance optimization with requestAnimationFrame
        function updateTimer() {
            if (isPaused || !gameStarted) return;
            
            requestAnimationFrame(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timer').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Auto-save game state periodically
                if (elapsed % 10 === 0) {
                    saveGameState();
                }
            });
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = matchedPairs;
        }

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function createCard(cardData, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.pairIndex = cardData.pairIndex;
            card.dataset.cardType = cardData.type;
            card.dataset.displayText = cardData.text;

            const isHebrew = cardData.type === 'hebrew';
            const textStyle = isHebrew
                ? 'font-size: 1.8em; font-family: Arial, sans-serif; direction: rtl;'
                : 'font-size: 1em;';

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">?</div>
                    <div class="card-back" style="${textStyle}">${cardData.text}</div>
                </div>
            `;

            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            const currentTime = Date.now();
            
            // Enhanced debouncing for all input types
            if (currentTime - lastTouchTime < DEBOUNCE_TIME) {
                return;
            }
            lastTouchTime = currentTime;

            if (isProcessing || isPaused || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            if (!gameStarted) {
                startGame();
            }

            if (window.audioManager) window.audioManager.playClickSound();
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                isProcessing = true;
                moves++;
                updateStats();
                updateAccessibility();
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;

            if (card1.dataset.pairIndex === card2.dataset.pairIndex && card1 !== card2) {
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    if (window.audioManager) window.audioManager.playCorrectSound();
                    matchedPairs++;
                    updateStats();
                    updateAccessibility();

                    if (matchedPairs === cardPairs.length) {
                        endGame();
                    }

                    flippedCards = [];
                    isProcessing = false;
                }, 600);
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                    updateAccessibility();
                }, 1200);
            }
        }

        function startGame() {
            gameStarted = true;
            startTime = Date.now() - pausedTime;
            timerInterval = setInterval(updateTimer, 1000);
        }

        function showHint() {
            if (hintsLeft <= 0 || isProcessing) return;
            
            hintsLeft--;
            document.querySelector('.controls button:nth-child(2)').textContent = `רמז (נותרו ${hintsLeft})`;
            
            const unmatched = cards.filter(card => 
                !card.classList.contains('matched') && 
                !card.classList.contains('flipped')
            );
            
            if (unmatched.length > 0) {
                const hintCard = unmatched[Math.floor(Math.random() * unmatched.length)];
                hintCard.classList.add('flipped');
                setTimeout(() => {
                    if (!hintCard.classList.contains('matched')) {
                        hintCard.classList.remove('flipped');
                    }
                }, 1500);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            clearGameState(); // Clear saved state on completion
            
            const time = document.getElementById('timer').textContent;
            const winMessage = document.getElementById('winMessage');
            
            if (window.audioManager) window.audioManager.playWinSound();
            
            // Check for high score
            if (moves < highScore) {
                highScore = moves;
                localStorage.setItem('memoryMatchHighScore', highScore);
            }
            
            let rating = '⭐⭐⭐';
            if (moves <= 15) rating = '⭐⭐⭐⭐⭐';
            else if (moves <= 20) rating = '⭐⭐⭐⭐';
            
            winMessage.innerHTML = `
                🎉 כל הכבוד! 🎉<br>
                ניצחת ב-${moves} מהלכים ובזמן ${time}!<br>
                דירוג: ${rating}<br>
                שיא אישי: ${highScore === Infinity ? 'אין' : highScore} מהלכים
            `;
            winMessage.style.display = 'block';
        }

        function startNewGame() {
            // Null safety checks
            if (gameStarted !== null && typeof gameStarted !== 'undefined') {
                // Continue
            }
            
            // Reset game state
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            gameStarted = false;
            hintsLeft = 3;
            isProcessing = false;
            isPaused = false;
            pausedTime = 0;
            
            clearInterval(timerInterval);
            clearGameState(); // Clear saved state
            
            // Reset UI
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('winMessage').style.display = 'none';
            document.getElementById('hintButton').textContent = 'רמז (נותרו 3)';
            
            // Create new deck from Hebrew-English vocabulary pairs
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';

            const deck = [];
            cardPairs.forEach((pair, i) => {
                deck.push({ type: 'hebrew', text: pair.hebrew, pairIndex: i });
                deck.push({ type: 'english', text: pair.english + ' ' + pair.emoji, pairIndex: i });
            });
            const shuffledDeck = shuffle(deck);

            shuffledDeck.forEach((cardData, index) => {
                const card = createCard(cardData, index);
                cards.push(card);
                gameBoard.appendChild(card);
            });
            
            // Initialize accessibility after creating cards
            updateAccessibility();
        }

        // Enhanced accessibility and ARIA support v5.0
        function updateAccessibility() {
            const cardElements = document.querySelectorAll('.card');
            cardElements.forEach((card, index) => {
                const isFlipped = card.classList.contains('flipped');
                const isMatched = card.classList.contains('matched');
                const displayText = card.dataset.displayText;

                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', gameStarted && !isMatched ? '0' : '-1');
                card.setAttribute('aria-label',
                    isFlipped || isMatched
                        ? `קלף ${displayText} - ${isMatched ? 'מותאם' : 'פתוח'}`
                        : `קלף ${index + 1} - לחץ לחשיפה`
                );
                card.setAttribute('aria-pressed', isFlipped ? 'true' : 'false');
            });
        }

        // Keyboard navigation support
        let selectedIndex = -1;
        
        document.addEventListener('keydown', (e) => {
            if (!gameStarted && e.key === 'Enter') {
                startNewGame();
                return;
            }
            
            if (isProcessing || isPaused) return;
            
            const visibleCards = cards.filter(card => 
                !card.classList.contains('matched')
            );
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (selectedIndex > 0) selectedIndex--;
                    else selectedIndex = visibleCards.length - 1;
                    highlightCard(visibleCards[selectedIndex]);
                    break;
                case 'ArrowRight':
                    if (selectedIndex < visibleCards.length - 1) selectedIndex++;
                    else selectedIndex = 0;
                    highlightCard(visibleCards[selectedIndex]);
                    break;
                case 'ArrowUp':
                    if (selectedIndex >= 4) selectedIndex -= 4;
                    else selectedIndex = visibleCards.length - 1;
                    highlightCard(visibleCards[selectedIndex]);
                    break;
                case 'ArrowDown':
                    if (selectedIndex < visibleCards.length - 4) selectedIndex += 4;
                    else selectedIndex = 0;
                    highlightCard(visibleCards[selectedIndex]);
                    break;
                case 'Enter':
                case ' ':
                    if (selectedIndex >= 0 && selectedIndex < visibleCards.length) {
                        flipCard(visibleCards[selectedIndex]);
                    }
                    break;
                case 'h':
                case 'H':
                    showHint();
                    break;
                case 'r':
                case 'R':
                    startNewGame();
                    break;
            }
        });
        
        function highlightCard(card) {
            cards.forEach(c => c.style.outline = 'none');
            if (card) {
                card.style.outline = '3px solid #ffd700';
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Visibility API for pause/resume v5.0
        document.addEventListener('visibilitychange', () => {
            if (gameStarted && !document.hidden && isPaused) {
                // Resume game
                isPaused = false;
                startTime = Date.now() - pausedTime;
                timerInterval = setInterval(updateTimer, 1000);
            } else if (gameStarted && document.hidden && !isPaused) {
                // Pause game
                isPaused = true;
                pausedTime = Date.now() - startTime;
                clearInterval(timerInterval);
                saveGameState(); // Save state when pausing
            }
        });

        // Enhanced cleanup for memory management (audio cleanup handled by global window.audioManager)
        window.addEventListener('beforeunload', () => {
            clearInterval(timerInterval);
            timerInterval = null;
            if (gameStarted) {
                saveGameState(); // Save state before leaving
            }
        });

        window.addEventListener('pagehide', () => {
            clearInterval(timerInterval);
            timerInterval = null;
            if (gameStarted) {
                saveGameState(); // Save state before hiding
            }
        });

        // Initialize game on load with state restoration
        document.addEventListener('DOMContentLoaded', () => {
            const savedState = loadGameState();
            if (savedState) {
                // Restore game state if available
                matchedPairs = savedState.matchedPairs;
                moves = savedState.moves;
                hintsLeft = savedState.hintsLeft;
                
                // Initialize game board
                startNewGame();
                
                // Restore UI
                updateStats();
                document.getElementById('hintButton').textContent = `רמז (נותרו ${hintsLeft})`;
                
                // Restore matched cards
                setTimeout(() => {
                    const matchedIndices = savedState.matchedPairIndices || savedState.matchedEmojis || [];
                    cards.forEach(card => {
                        if (matchedIndices.includes(card.dataset.pairIndex)) {
                            card.classList.add('matched', 'flipped');
                        }
                    });
                    updateAccessibility();
                }, 100);
                
                // Resume timer if game was active
                if (savedState.elapsedTime > 0) {
                    gameStarted = true;
                    startTime = Date.now() - (savedState.elapsedTime * 1000);
                    timerInterval = setInterval(updateTimer, 1000);
                }
            } else {
                startNewGame();
            }
        });
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
