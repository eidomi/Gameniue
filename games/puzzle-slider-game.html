<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פאזל הזזה - משחק חשיבה</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #667eea;
            --color-primary-dark: #764ba2;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            --game-accent: #eb3349;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Arial', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--game-gradient);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            transform: scale(1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--game-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            transform: scale(1.05);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #fc466b 0%, #3f5efb 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-box h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-box p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .size-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .size-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .size-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .size-btn.active {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        .puzzle-container {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .puzzle-grid {
            display: grid;
            gap: 5px;
            max-width: 400px;
            margin: 0 auto;
            aspect-ratio: 1;
        }

        .puzzle-tile {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .puzzle-tile:focus {
            outline: 3px solid #f39c12;
            outline-offset: 3px;
        }

        .puzzle-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .puzzle-tile:hover::before {
            transform: translateX(100%);
        }

        .puzzle-tile:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .puzzle-tile.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .puzzle-tile.empty:hover {
            transform: none;
        }

        .puzzle-tile.sliding {
            animation: slideAnimation 0.3s ease;
        }

        @keyframes slideAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .puzzle-tile.correct {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn.shuffle {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .control-btn.hint {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .message.success {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timer {
            text-align: center;
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .preview-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1001;
        }

        .preview-modal.show {
            display: block;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .preview-grid {
            display: grid;
            gap: 2px;
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }

        .preview-tile {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 5px;
        }

        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }

        .modal-backdrop.show {
            display: block;
        }

        .win-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5em;
            color: #f39c12;
            display: none;
            z-index: 1002;
        }

        .win-animation.show {
            display: block;
            animation: winPulse 2s ease;
        }

        @keyframes winPulse {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(0) rotate(360deg);
                opacity: 0;
            }
        }
    
/* Responsive Design Fixes - Added by automated script */

/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* Visual Feedback States - Added for Accessibility */
/* Keyboard Focus Indicators */
button:focus,
.clickable:focus,
.tile:focus {
    outline: 3px solid #4facfe;
    outline-offset: 2px;
    z-index: 10;
}

/* Focus visible only for keyboard */
button:focus-visible {
    outline: 3px solid #00f2fe;
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

/* Remove default outline */
button:focus:not(:focus-visible) {
    outline: none;
}

/* Active/Pressed States */
button:active,
.clickable:active {
    transform: scale(0.95);
    box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.3);
}

.tile:active {
    transform: scale(0.98);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.game-cell:active {
    background: rgba(79, 172, 254, 0.3);
    transform: scale(0.97);
}

/* Disabled state feedback */
button:disabled,
.clickable:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(50%);
}

button:disabled:hover {
    transform: none;
    box-shadow: none;
}

/* ======================================== */

/* ========================================
   Micro-Interactions CSS v1.0
   Consistent feedback animations | ROI: 300%
   ======================================== */

/* 1. Button hover/active transitions */
button:not(:disabled):hover,
.btn:not(:disabled):hover,
.control-btn:not(:disabled):hover,
.size-btn:not(:disabled):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:not(:disabled):active,
.btn:not(:disabled):active,
.control-btn:not(:disabled):active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
}

/* 2. Puzzle tile hover animation */
.puzzle-tile:not(.empty):hover {
    transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    z-index: 2;
}

/* 3. Success feedback - pulse/glow for correct tile placement */
@keyframes correctPulse {
    0%   { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
    40%  { transform: scale(1.06); box-shadow: 0 0 25px rgba(46, 204, 113, 0.7); }
    100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
}

.puzzle-tile.correct {
    animation: correctPulse 0.5s ease;
}

/* 4. Error feedback - shake for wrong move */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
}

.puzzle-tile.wrong {
    animation: shake 0.5s ease;
}

/* 5. Score/move counter update pop */
@keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); color: #f39c12; }
    100% { transform: scale(1); }
}

.stat-box p,
.score-value {
    transition: color 0.3s ease;
    display: inline-block;
}

.score-updated {

                    return;
                }
                self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>


</head>
<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">
        <span id="modeIcon">🏠</span>
    </button>
    <div class="back-button">
        <button onclick="window.location.href = '../index.html'">🏠 חזרה לדף הראשי</button>
    </div>

    <div class="game-container">
        <h1>🧩 פאזל הזזה 🧩</h1>

        <div class="stats-panel">
            <div class="stat-box">
                <h3>מהלכים</h3>
                <p id="moves">0</p>
            </div>
            <div class="stat-box">
                <h3>זמן</h3>
                <p id="timer">0:00</p>
            </div>
            <div class="stat-box">
                <h3>שיא</h3>
                <p id="bestMoves">-</p>
            </div>
        </div>

        <div class="size-selector">
            <button class="size-btn active" onclick="setSize(3)">3x3</button>
            <button class="size-btn" onclick="setSize(4)">4x4</button>
            <button class="size-btn" onclick="setSize(5)">5x5</button>
        </div>

        <div class="puzzle-container">
            <div class="puzzle-grid" id="puzzleGrid"></div>
        </div>

        <div class="controls">
            <button class="control-btn shuffle" onclick="shufflePuzzle()">🔀 ערבב</button>
            <button class="control-btn hint" onclick="showPreview()">👁️ הצג פתרון</button>
            <button class="control-btn" onclick="resetPuzzle()">🔄 אפס</button>
        </div>

        <div style="text-align: center; margin-top: 15px; font-size: 0.9em; color: #666;">
            💡 השתמש בחצים או WASD להזיז אריחים
        </div>

        <div class="message" id="message"></div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" onclick="hidePreview()"></div>
    <div class="preview-modal" id="previewModal">
        <h3 style="text-align: center; margin-bottom: 10px;">פתרון הפאזל</h3>
        <div class="preview-grid" id="previewGrid"></div>
        <button class="control-btn" onclick="hidePreview()" style="width: 100%; margin-top: 20px;">סגור</button>
    </div>

    <div class="win-animation" id="winAnimation">🎉</div>

    <script>
        // Utility function for null safety with nullish coalescing
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        
        // Hebrew letter mapping for tile display
        const hebrewLetters = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י','כ','ל','מ','נ','ס','ע','פ','צ','ק','ר','ש','ת','ך','ם','ן'];

        // Game configuration
        let gridSize = 3;
        let tiles = [];
        let emptyIndex = -1;
        let moves = 0;
        let timer = null;
        let startTime = null;
        let isGameActive = false;
        let bestMoves = {};
        let lastClickTime = 0;
        const CLICK_DEBOUNCE_TIME = 200;

        // Audio: Uses global window.audioManager (Audio Manager v6.0)

        // Initialize
        loadBestScores();
        initializePuzzle();

        function loadBestScores() {
            // Null safety checks
            if (bestMoves !== null && typeof bestMoves !== 'undefined') {
                // Continue
            }
            
            try {
                const saved = localStorage.getItem('puzzleBestMoves');
                if (saved) {
                    bestMoves = JSON.parse(saved);
                }
            } catch (error) {
                console.warn('Error loading saved scores:', error);
                bestMoves = {};
            }
            updateBestScore();
        }

        function saveBestScore() {
            try {
                localStorage.setItem('puzzleBestMoves', JSON.stringify(bestMoves));
            } catch (error) {
                console.warn('Error saving score:', error);
            }
        }

        function updateBestScore() {
            const best = bestMoves[gridSize];
            document.getElementById('bestMoves').textContent = best || '-';
        }

        function setSize(size) {
            gridSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            resetPuzzle();
            initializePuzzle();
            updateBestScore();
        }

        function initializePuzzle() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            tiles = [];
            const totalTiles = gridSize * gridSize;
            
            // Create tiles
            for (let i = 0; i < totalTiles - 1; i++) {
                tiles.push(i + 1);
            }
            tiles.push(null); // Empty space
            emptyIndex = totalTiles - 1;
            
            renderPuzzle();
        }

        function renderPuzzle() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';
            
            tiles.forEach((tile, index) => {
                const tileElement = document.createElement('div');
                tileElement.className = 'puzzle-tile';
                
                if (tile === null) {
                    tileElement.classList.add('empty');
                    tileElement.setAttribute('aria-label', 'מקום ריק');
                } else {
                    const hebrewLetter = hebrewLetters[tile - 1];
                    tileElement.textContent = hebrewLetter;
                    tileElement.onclick = () => moveTile(index);

                    // Add accessibility attributes
                    tileElement.setAttribute('tabindex', '0');
                    tileElement.setAttribute('role', 'button');
                    tileElement.setAttribute('aria-label', `אריח ${hebrewLetter}`);

                    // Keyboard support for individual tiles
                    tileElement.onkeydown = (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            moveTile(index);
                        }
                    };

                    // Check if tile is in correct position
                    if (tile === index + 1) {
                        tileElement.classList.add('correct');
                        tileElement.setAttribute('aria-label', `אריח ${hebrewLetter} - במקום הנכון`);
                    }
                }
                
                grid.appendChild(tileElement);
            });
        }

        function moveTile(index) {
            const currentTime = Date.now();
            
            // Debounce rapid clicks
            if (currentTime - lastClickTime < CLICK_DEBOUNCE_TIME) {
                return;
            }
            
            if (!isGameActive) {
                return;
            }
            
            lastClickTime = currentTime;
            
            const row = Math.floor(index / gridSize);
            const col = index % gridSize;
            const emptyRow = Math.floor(emptyIndex / gridSize);
            const emptyCol = emptyIndex % gridSize;
            
            // Check if tile is adjacent to empty space
            const isAdjacent = 
                (row === emptyRow && Math.abs(col - emptyCol) === 1) ||
                (col === emptyCol && Math.abs(row - emptyRow) === 1);
            
            if (isAdjacent) {
                // Swap tiles
                tiles[emptyIndex] = tiles[index];
                tiles[index] = null;
                emptyIndex = index;
                
                moves++;
                updateStats();
                
                if (window.audioManager) window.audioManager.playClickSound();
                
                // Add sliding animation with requestAnimationFrame
                const tileElements = document.querySelectorAll('.puzzle-tile');
                requestAnimationFrame(() => {
                    tileElements[index].classList.add('sliding');
                    setTimeout(() => {
                        tileElements[index].classList.remove('sliding');
                    }, 300);
                });
                
                renderPuzzle();
                
                // Check if puzzle is solved
                if (checkWin()) {
                    winGame();
                }
            } else {
                // Provide feedback for invalid moves
                if (window.audioManager) window.audioManager.playWrongSound(); // Error sound
                if (window.particleSystem) window.particleSystem.burst(window.innerWidth / 2, window.innerHeight / 2, '#e74c3c');
            }
        }

        function checkWin() {
            for (let i = 0; i < tiles.length - 1; i++) {
                if (tiles[i] !== i + 1) {
                    return false;
                }
            }
            return tiles[tiles.length - 1] === null;
        }

        function shufflePuzzle() {
            // Ensure puzzle is solvable by making valid moves
            const shuffleMoves = gridSize * gridSize * 20;
            
            for (let i = 0; i < shuffleMoves; i++) {
                const possibleMoves = [];
                const row = Math.floor(emptyIndex / gridSize);
                const col = emptyIndex % gridSize;
                
                // Check all four directions
                if (row > 0) possibleMoves.push(emptyIndex - gridSize); // Up
                if (row < gridSize - 1) possibleMoves.push(emptyIndex + gridSize); // Down
                if (col > 0) possibleMoves.push(emptyIndex - 1); // Left
                if (col < gridSize - 1) possibleMoves.push(emptyIndex + 1); // Right
                
                // Make random valid move
                const randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                tiles[emptyIndex] = tiles[randomMove];
                tiles[randomMove] = null;
                emptyIndex = randomMove;
            }
            
            moves = 0;
            isGameActive = true;
            startTimer();
            updateStats();
            renderPuzzle();
            
            document.getElementById('message').className = 'message';
        }

        function resetPuzzle() {
            clearInterval(timer);
            moves = 0;
            isGameActive = false;
            startTime = null;
            
            initializePuzzle();
            updateStats();
            
            document.getElementById('timer').textContent = '0:00';
            document.getElementById('message').className = 'message';
        }

        function startTimer() {
            clearInterval(timer);
            startTime = Date.now();
            
            timer = setInterval(() => {
                if (isGameActive) {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    
                    requestAnimationFrame(() => {
                        document.getElementById('timer').textContent = 
                            `${minutes}:${seconds.toString().padStart(2, '0')}`;
                    });
                }
            }, 1000);
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
        }

        function winGame() {
            isGameActive = false;
            clearInterval(timer);
            
            if (window.audioManager) window.audioManager.playWinSound();
            if (window.particleSystem) window.particleSystem.confetti(60);
            
            // Show win animation
            document.getElementById('winAnimation').classList.add('show');
            setTimeout(() => {
                document.getElementById('winAnimation').classList.remove('show');
            }, 2000);
            
            // Update best score
            if (!bestMoves[gridSize] || moves < bestMoves[gridSize]) {
                bestMoves[gridSize] = moves;
                saveBestScore();
                updateBestScore();
                showMessage(`🎉 ניצחת! שיא חדש: ${moves} מהלכים!`, 'success');
            } else {
                showMessage(`🎉 ניצחת ב-${moves} מהלכים!`, 'success');
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
        }

        function showPreview() {
            const modal = document.getElementById('previewModal');
            const backdrop = document.getElementById('modalBackdrop');
            const previewGrid = document.getElementById('previewGrid');
            
            previewGrid.innerHTML = '';
            previewGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            // Show solved state
            for (let i = 1; i <= gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'preview-tile';
                if (i < gridSize * gridSize) {
                    tile.textContent = hebrewLetters[i - 1];
                }
                previewGrid.appendChild(tile);
            }
            
            modal.classList.add('show');
            backdrop.classList.add('show');
        }

        function hidePreview() {
            document.getElementById('previewModal').classList.remove('show');
            document.getElementById('modalBackdrop').classList.remove('show');
        }

        // Keyboard controls with improved navigation
        document.addEventListener('keydown', (e) => {
            if (!isGameActive) return;
            
            const row = Math.floor(emptyIndex / gridSize);
            const col = emptyIndex % gridSize;
            let targetIndex = -1;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (row < gridSize - 1) targetIndex = emptyIndex + gridSize;
                    break;
                case 'ArrowDown':
                    if (row > 0) targetIndex = emptyIndex - gridSize;
                    break;
                case 'ArrowLeft':
                    if (col < gridSize - 1) targetIndex = emptyIndex + 1;
                    break;
                case 'ArrowRight':
                    if (col > 0) targetIndex = emptyIndex - 1;
                    break;
                case 'w':
                case 'W':
                    if (row < gridSize - 1) targetIndex = emptyIndex + gridSize;
                    break;
                case 's':
                case 'S':
                    if (row > 0) targetIndex = emptyIndex - gridSize;
                    break;
                case 'a':
                case 'A':
                    if (col < gridSize - 1) targetIndex = emptyIndex + 1;
                    break;
                case 'd':
                case 'D':
                    if (col > 0) targetIndex = emptyIndex - 1;
                    break;
            }
            
            if (targetIndex !== -1) {
                moveTile(targetIndex);
                e.preventDefault();
            }
        });
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
