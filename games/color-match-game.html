<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התאמת צבעים - משחק מהירות</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #667eea;
            --color-primary-dark: #764ba2;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --game-accent: #a8edea;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Arial', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--game-gradient);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            transform: scale(1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--game-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            transform: scale(1.05);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #ffd93d 0%, #ff6bcb 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            flex: 1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-box h3 {
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .stat-box p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .game-modes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #6c5ce7 0%, #5f3dc4 100%);
        }

        .timer-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
            width: 100%;
            transition: width 0.1s linear;
        }

        .color-display {
            background: white;
            padding: 60px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .color-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.05) 100%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .color-word {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
            transition: all var(--transition-normal);
        }

        .instruction {
            font-size: 1.2em;
            color: #7f8c8d;
            position: relative;
            z-index: 1;
        }

        .color-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-btn {
            padding: 25px;
            border: none;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .color-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .color-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .color-btn.correct {
            animation: correctFlash 0.6s ease;
        }

        .color-btn.incorrect {
            animation: wrongShake 0.5s ease;
        }

        @keyframes correctFlash {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(46, 204, 113, 0.8); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .controls {
            text-align: center;
        }

        .start-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: var(--radius-pill);
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .message.success {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            color: white;
        }

        .message.error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .level-indicator {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #7f8c8d;
        }

        .power-up {
            position: fixed;
            font-size: 3em;
            animation: powerUpFloat 2s ease;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes powerUpFloat {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            50% {
                transform: translateY(-50px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(0);
                opacity: 0;
            }
        }

        /* Color definitions */
        .color-red { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        .color-blue { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); }
        .color-green { background: linear-gradient(135deg, #55efc4 0%, #00b894 100%); }
        .color-yellow { background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%); }
        .color-purple { background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%); }
        .color-orange { background: linear-gradient(135deg, #fab1a0 0%, #e17055 100%); }

    .game-container {

        width: 100%;

/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* ========================================
   Micro-Interactions CSS v1.0
   Consistent feedback animations | ROI: 300%
   ======================================== */

/* 1. Button hover/active transitions */
button:not(:disabled):hover,
.btn:not(:disabled):hover,
.control-btn:not(:disabled):hover,
.start-btn:not(:disabled):hover,
.mode-btn:not(:disabled):hover,
.diff-btn:not(:disabled):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:not(:disabled):active,
.btn:not(:disabled):active,
.control-btn:not(:disabled):active,
.start-btn:not(:disabled):active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
}

/* 2. Success feedback - pulse/glow */
@keyframes correctPulse {
    0%   { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
    40%  { transform: scale(1.08); box-shadow: 0 0 25px rgba(46, 204, 113, 0.7); }
    100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
}

/* 3. Error feedback - shake */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
}

/* 4. Score update - pop transition */
@keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); color: #f39c12; }
    100% { transform: scale(1); }
}

.stat-box p,
.score-item p,
.score-value,
.stat-number {
    transition: color 0.3s ease, transform 0.3s ease;
    display: inline-block;
}

.score-updated {
    animation: scorePop 0.4s ease;
}

/* 5. Slide-in for message feedback */
@keyframes slideInDown {
    from { opacity: 0; transform: translateY(-15px); }

<script>
(function() {
    'use strict';

    const WAVETABLES = {
        bell: { real: [0, 0, 0.4, 0, 0.2, 0, 0.1, 0, 0.05], imag: [0, 1, 0, 0.3, 0, 0.1, 0, 0.05, 0] },
        chime: { real: [0, 0, 0.5, 0, 0.25, 0, 0.125], imag: [0, 1, 0, 0.5, 0, 0.25, 0] },
        brass: { real: [0, 0.5, 0.5, 0.35, 0.25, 0.2, 0.15, 0.1, 0.08], imag: [0, 0, 0, 0, 0, 0, 0, 0, 0] },
        warmPad: { real: [0, 1, 0.5, 0.25, 0.125, 0.0625], imag: [0, 0, 0.3, 0.15, 0.075, 0.0375] },
        softBuzz: { real: [0, 0.3, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05], imag: [0, 0.3, 0.2, 0.15, 0.1, 0.08, 0.05, 0.03] }
    };

    const ENVELOPES = {
        bell: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.4 },
        chime: { attack: 0.002, decay: 0.1, sustain: 0.0, release: 0.08 },
        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },
        warmPad: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1.0 },
        softBuzz: { attack: 0.01, decay: 0.15, sustain: 0.1, release: 0.2 }
    };

    const MODES = {
        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },
        classroom: { volume: 0.25, reverbMix: 0.0, durationScale: 0.6 }
    };

    class AudioManager {
        constructor() {
            if (AudioManager.instance) return AudioManager.instance;
            AudioManager.instance = this;
            this.context = null;
            this.isInitialized = false;
            this.isMuted = false;
            this.globalVolume = 0.5;
            this.activeNodes = new Set();
            this.isSupported = !!(window.AudioContext || window.webkitAudioContext);
            this.enableVisualFeedback = true;
            this.waves = {};
            this.masterGain = null;
            this.dryGain = null;
            this.reverbGain = null;
            this.convolver = null;
            this.mode = 'home';
            this.loadPreferences();
        }

        async initialize() {
            if (this.isInitialized || !this.isSupported) return;
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                this.context = new AC();
                if (this.context.state === 'suspended') await this.context.resume();

                this.masterGain = this.context.createGain();
                this.masterGain.gain.value = this.globalVolume;
                this.masterGain.connect(this.context.destination);

                this.dryGain = this.context.createGain();
                this.dryGain.gain.value = 0.7;
                this.dryGain.connect(this.masterGain);

                this.reverbGain = this.context.createGain();
                this.reverbGain.gain.value = MODES[this.mode].reverbMix;
                this.convolver = this.context.createConvolver();
                this.convolver.buffer = this.createImpulseResponse(1.5, 2.0);
                this.reverbGain.connect(this.convolver);
                this.convolver.connect(this.masterGain);

                for (const [name, table] of Object.entries(WAVETABLES)) {
                    this.waves[name] = this.context.createPeriodicWave(
                        new Float32Array(table.real), new Float32Array(table.imag)
                    );
                }
                this.applyMode(this.mode);
                this.isInitialized = true;
            } catch (e) {
                console.warn('AudioManager v7.0: init failed', e);
                this.isSupported = false;
            }
        }

        createImpulseResponse(duration, decay) {
            const length = this.context.sampleRate * duration;
            const buffer = this.context.createBuffer(2, length, this.context.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
                }
            }
            return buffer;
        }

        applyMode(mode) {
            this.mode = mode;
            const profile = MODES[mode] ?? MODES.home;
            this.globalVolume = profile.volume;
            if (this.masterGain) this.masterGain.gain.value = profile.volume;
            if (this.reverbGain) this.reverbGain.gain.value = profile.reverbMix;
            this.savePreferences();
        }

        getDurationScale() { return MODES[this.mode]?.durationScale ?? 1.0; }

        playNote(frequency, duration, waveName, envelope, filterFreq, useReverb, volume) {
            if (!this.isInitialized || this.isMuted || !this.isSupported) {
                if (this.enableVisualFeedback) this.provideVisualFeedback('action');
                return;
            }
            const ctx = this.context;
            const now = ctx.currentTime;
            const env = envelope ?? ENVELOPES.bell;
            const ds = this.getDurationScale();
            const dur = duration * ds;
            const vol = volume ?? 1.0;

            const osc = ctx.createOscillator();
            if (waveName && this.waves[waveName]) {
                osc.setPeriodicWave(this.waves[waveName]);
            } else {
                osc.type = 'sine';
            }
            osc.frequency.value = frequency;

            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(vol, now + env.attack * ds);
            gainNode.gain.linearRampToValueAtTime(vol * env.sustain, now + (env.attack + env.decay) * ds);
            gainNode.gain.setValueAtTime(vol * env.sustain, now + dur - env.release * ds);
            gainNode.gain.linearRampToValueAtTime(0, now + dur);

            osc.connect(gainNode);

            if (filterFreq) {
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = filterFreq;
                filter.Q.value = 1;
                gainNode.connect(filter);
                filter.connect(this.dryGain);
                if (useReverb) filter.connect(this.reverbGain);
            } else {
                gainNode.connect(this.dryGain);
                if (useReverb) gainNode.connect(this.reverbGain);
            }

            osc.start(now);
            osc.stop(now + dur + 0.05);
            this.activeNodes.add(osc);
            osc.onended = () => this.activeNodes.delete(osc);

            const beatDuration = 60 / tempo;
            const ds = this.getDurationScale();
            notes.forEach((note, i) => {
                const freq = note.freq ?? note;
                const dur = (note.dur ?? beatDuration) * ds;
                const vol = note.vol ?? 1.0;

        playCorrectSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.12},{freq:659.25,dur:0.12},{freq:783.99,dur:0.2}], 480, 'bell', ENVELOPES.bell, 2000, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playWrongSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('error'); return; }
            this.playSequence([{freq:200,dur:0.15,vol:0.3},{freq:150,dur:0.15,vol:0.2}], 300, 'softBuzz', ENVELOPES.softBuzz, 800, false);
            if (this.enableVisualFeedback) this.provideVisualFeedback('error');
        }

        playClickSound() {
            if (!this.isInitialized || this.isMuted) return;
            this.playNote(800, 0.03, 'chime', ENVELOPES.chime, null, false, 0.2);
        }

        playWinSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('success'); return; }
            this.playSequence([{freq:523.25,dur:0.25},{freq:659.25,dur:0.25},{freq:783.99,dur:0.25},{freq:1046.5,dur:0.5}], 240, 'brass', ENVELOPES.brass, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('success');
        }

        playLevelUpSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('action'); return; }
            this.playSequence([{freq:440,dur:0.15},{freq:554.37,dur:0.15},{freq:659.25,dur:0.15},{freq:880,dur:0.3}], 360, 'chime', ENVELOPES.chime, null, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('action');
        }

        playGameOverSound() {
            if (!this.isInitialized || this.isMuted) { if (this.enableVisualFeedback) this.provideVisualFeedback('warning'); return; }
            this.playSequence([{freq:440,dur:0.4},{freq:415.3,dur:0.4},{freq:392,dur:0.4},{freq:349.23,dur:0.8}], 120, 'warmPad', ENVELOPES.warmPad, 600, true);
            if (this.enableVisualFeedback) this.provideVisualFeedback('warning');
        }

        flashScreen(type) { this.provideVisualFeedback(type); }

        provideVisualFeedback(type) {
            if (typeof document === 'undefined') return;
            const existing = document.getElementById('audio-visual-feedback');
            if (existing) existing.remove();
            const overlay = document.createElement('div');
            overlay.id = 'audio-visual-feedback';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0;';
            overlay.style.background = this.getFeedbackColor(type);
            overlay.style.animation = 'audioFlash 0.3s ease-out';
            document.body.appendChild(overlay);
            overlay.addEventListener('animationend', () => overlay.remove());
            if (!document.getElementById('audio-flash-style')) {
                const style = document.createElement('style');
                style.id = 'audio-flash-style';
                style.textContent = '@keyframes audioFlash{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}';
                document.head.appendChild(style);
            }
        }

        getFeedbackColor(type) {
            const colors = {
                success: 'radial-gradient(circle,rgba(46,204,113,.4) 0%,transparent 70%)',
                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',
                action: 'radial-gradient(circle,rgba(52,152,219,.4) 0%,transparent 70%)',
                warning: 'radial-gradient(circle,rgba(241,196,15,.4) 0%,transparent 70%)'
            };
            return colors[type] ?? colors.action;
        }

        savePreferences() {
            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

        loadPreferences() {
            try {
                const saved = JSON.parse(localStorage.getItem('audioPreferences') ?? '{}');
                this.globalVolume = saved.volume ?? 0.5;
                this.isMuted = saved.muted ?? false;
                this.enableVisualFeedback = saved.visualFeedback ?? true;
                this.mode = saved.mode ?? 'home';
            } catch(e) {}
        }

        setVolume(v) { this.globalVolume = Math.max(0,Math.min(1,v)); if(this.masterGain) this.masterGain.gain.value=this.globalVolume; this.savePreferences(); }
        setMuted(m) { this.isMuted = !!m; this.savePreferences(); }
        setVisualFeedback(v) { this.enableVisualFeedback = !!v; this.savePreferences(); }
        setMode(mode) { if (MODES[mode]) this.applyMode(mode); }

        destroy() {
            this.activeNodes.forEach(n => { try{n.stop();}catch(e){} });
            this.activeNodes.clear();
            if (this.context) { try{this.context.close();}catch(e){} }
        }
    }

    window.audioManager = new AudioManager();
    const initAudioOnInteraction = async () => {
        await window.audioManager.initialize();
        ['click','touchstart','keydown'].forEach(evt => document.removeEventListener(evt, initAudioOnInteraction));
    };
    ['click','touchstart','keydown'].forEach(evt => document.addEventListener(evt, initAudioOnInteraction, {once:false}));
    window.addEventListener('beforeunload', () => { if(window.audioManager) window.audioManager.destroy(); });
})();

                    type: 'burst'
                });
            }
            this.startLoop();
        }

        startLoop() {
            if (this.animationId) return;
            var self = this;
            var loop = function() {
                if (self.particles.length === 0) {
                    self.animationId = null;
                    if (self.ctx) self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                    return;
                }
                self.ctx.clearRect(0, 0, self.canvas.width, self.canvas.height);
                self.particles = self.particles.filter(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>


</head>
<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">
        <span id="modeIcon">🏠</span>
    </button>
    <div class="back-button">
        <button onclick="window.location.href = '../index.html'">🏠 חזרה לדף הראשי</button>
    </div>

    <div class="game-container">
        <h1>🎨 התאמת צבעים 🎨</h1>

        <div class="stats-row">
            <div class="stat-box">
                <h3>ניקוד</h3>
                <p id="score">0</p>
            </div>
            <div class="stat-box">
                <h3>רמה</h3>
                <p id="level">1</p>
            </div>
            <div class="stat-box">
                <h3>רצף</h3>
                <p id="streak">0</p>
            </div>
        </div>

        <div class="game-modes">
            <button class="mode-btn active" onclick="setMode('meaning')">משמעות</button>
            <button class="mode-btn" onclick="setMode('color')">צבע</button>
            <button class="mode-btn" onclick="setMode('mixed')">מעורב</button>
        </div>

        <div class="timer-bar">
            <div class="timer-fill" id="timerFill"></div>
        </div>

        <div class="level-indicator" id="levelIndicator">
            לחץ על הצבע הנכון!
        </div>

        <div class="color-display">
            <div class="color-word" id="colorWord">התחל משחק</div>
            <div class="instruction" id="instruction">לחץ על כפתור ההתחלה</div>
        </div>

        <div class="color-options" id="colorOptions">
            <button class="color-btn color-red" onclick="selectColor('red')">אדום</button>
            <button class="color-btn color-blue" onclick="selectColor('blue')">כחול</button>
            <button class="color-btn color-green" onclick="selectColor('green')">ירוק</button>
            <button class="color-btn color-yellow" onclick="selectColor('yellow')">צהוב</button>
            <button class="color-btn color-purple" onclick="selectColor('purple')">סגול</button>
            <button class="color-btn color-orange" onclick="selectColor('orange')">כתום</button>
        </div>

        <div class="controls">
            <button class="start-btn" id="startBtn" onclick="startGame()">התחל משחק</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // Game configuration
        const colors = {
            red: { name: 'אדום', hex: '#ff6b6b' },
            blue: { name: 'כחול', hex: '#74b9ff' },
            green: { name: 'ירוק', hex: '#55efc4' },
            yellow: { name: 'צהוב', hex: '#ffeaa7' },
            purple: { name: 'סגול', hex: '#a29bfe' },
            orange: { name: 'כתום', hex: '#fab1a0' }
        };
        const colorKeys = Object.keys(colors);

        // Utility function for null safety with nullish coalescing
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        
        // Game state
        let score = 0;
        let level = 1;
        let streak = 0;
        let gameMode = 'meaning';
        let currentQuestion = null;
        let correctAnswer = null;
        let gameActive = false;
        let timer = null;
        let timePerQuestion = 5000;
        let lastClickTime = 0;
        const DEBOUNCE_TIME = 300;
        let timeoutId = null;

        // Sound effects with enhanced error handling and mobile support
        // Audio functions provided by global window.audioManager (Audio System v7.0)

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            resetGame();
        }

        function startGame() {
            // Null safety checks for game state
            if (gameActive !== null && typeof gameActive !== 'undefined') {
                gameActive = true;
            } else {
                gameActive = true;
            }
            
            score = 0;
            level = 1;
            streak = 0;
            timePerQuestion = 5000;
            
            updateStats();
            updateAccessibility();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('colorOptions').style.opacity = '1';
            
            nextQuestion();
        }

        function resetGame() {
            clearTimeout(timeoutId);
            clearInterval(timer);

            gameActive = true;
            score = 0;
            level = 1;
            streak = 0;

            updateStats();
            nextQuestion();
        }

        function nextQuestion() {
            if (!gameActive) return;
            
            clearInterval(timer);
            
            // Generate new question
            const randomKey = colorKeys[Math.floor(Math.random() * colorKeys.length)];
            targetColor = { key: randomKey, ...colors[randomKey] };
            correctAnswer = colorKeys.indexOf(randomKey);

            // Update display
            document.getElementById('colorWord').style.backgroundColor = targetColor.hex;
            document.getElementById('colorWord').textContent = targetColor.name;

            // Update buttons
            const buttons = document.querySelectorAll('.color-btn');
            buttons.forEach((btn, index) => {
                const key = colorKeys[index];
                btn.textContent = colors[key].name;
                btn.style.backgroundColor = colors[key].hex;
                btn.disabled = false;
                btn.classList.remove('correct', 'wrong', 'selected');
                btn.setAttribute('tabindex', '0');
            });
            
            updateAccessibility();
            
            // Start timer
            currentTime = Math.max(3, 10 - Math.floor(level / 2));
            updateTimer();
            
            timer = setInterval(() => {
                currentTime--;
                updateTimer();
                
                if (currentTime <= 0) {
                    timeOut();
                }
            }, 1000);
        }

        function startTimer() {
            const startTime = Date.now();
            const duration = timePerQuestion - (level - 1) * 200; // Decrease time as level increases
            
            timer = setInterval(() => {
                requestAnimationFrame(() => {
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, duration - elapsed);
                    const percentage = (remaining / duration) * 100;
                    
                    document.getElementById('timerFill').style.width = percentage + '%';
                    
                    if (remaining <= 0) {
                        clearInterval(timer);
                        timer = null;
                        timeOut();
                    }
                });
            }, 50);
        }

        function selectColor(color) {
            const currentTime = Date.now();
            
            // Debounce rapid clicks
            if (currentTime - lastClickTime < DEBOUNCE_TIME) {
                return;
            }
            lastClickTime = currentTime;
            
            if (!gameActive) {
                return;
            }

            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            
            const buttons = document.querySelectorAll('.color-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            const selectedButton = event.target;
            
            if (color === correctAnswer) {
                // Correct answer
                selectedButton.classList.add('correct');
                streak++;
                score += 10 * level;
                
                if (window.audioManager) window.audioManager.playCorrectSound();
                if (window.particleSystem) {
                    var el = selectedButton || document.querySelector('.color-display');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.sparkle(rect.left + rect.width / 2, rect.top + rect.height / 2, '#2ecc71', 15); }
                }

                if (streak > 0 && streak % 10 === 0) {
                    level++;
                    showPowerUp('⭐', event.pageX, event.pageY);
                    if (window.audioManager) window.audioManager.playLevelUpSound();
                    if (window.particleSystem) window.particleSystem.confetti(40);
                    showMessage(`מעולה! עלית לרמה ${level}!`, 'success');
                }
                
                updateStats();
                
                timeoutId = setTimeout(nextQuestion, 1000);
            } else {
                // Wrong answer
                selectedButton.classList.add('incorrect');
                streak = 0;
                
                if (window.audioManager) window.audioManager.playWrongSound();
                if (window.particleSystem) {
                    var el = selectedButton || document.querySelector('.color-display');
                    if (el) { var rect = el.getBoundingClientRect(); window.particleSystem.burst(rect.left + rect.width / 2, rect.top + rect.height / 2, '#e74c3c'); }
                }

                // Show correct answer
                buttons.forEach(btn => {
                    if (btn.textContent === colors[correctAnswer].name) {
                        btn.classList.add('correct');
                    }
                });
                
                showMessage('לא נכון! נסה שוב', 'error');
                updateStats();
                
                timeoutId = setTimeout(nextQuestion, 2000);
            }
        }

        function timeOut() {
            if (!gameActive) return;
            
            gameActive = false;
            if (window.audioManager) window.audioManager.playWrongSound();
            if (window.particleSystem) window.particleSystem.burst(window.innerWidth / 2, window.innerHeight / 2, '#e74c3c');

            showMessage(`נגמר הזמן! ניקוד סופי: ${score}`, 'error');
            
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === colors[correctAnswer].name) {
                    btn.classList.add('correct');
                }
            });
            
            timeoutId = setTimeout(resetGame, 3000);
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('streak').textContent = streak;
            
            // Update level indicator
            const levelText = level <= 5 ? 'מתחיל' : 
                            level <= 10 ? 'מתקדם' : 
                            level <= 15 ? 'מומחה' : 'אלוף';
            document.getElementById('levelIndicator').textContent = `רמה ${level} - ${levelText}`;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
            
            setTimeout(() => {
                message.className = 'message';
            }, 2000);
        }

        function showPowerUp(emoji, x, y) {
            const powerUp = document.createElement('div');
            powerUp.className = 'power-up';
            powerUp.textContent = emoji;
            powerUp.style.left = x + 'px';
            powerUp.style.top = y + 'px';
            
            document.body.appendChild(powerUp);
            
            setTimeout(() => {
                powerUp.remove();
            }, 2000);
        }

        // Add keyboard navigation and accessibility
        document.addEventListener('keydown', function(e) {
            if (!gameActive) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            
            // Number keys 1-4 for color selection
            const keyNumber = parseInt(e.key);
            if (keyNumber >= 1 && keyNumber <= 4) {
                e.preventDefault();
                const colorIndex = keyNumber - 1;
                if (colorIndex < colorKeys.length) {
                    selectColor(colorIndex);
                }
            }
            
            // Arrow key navigation
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const buttons = Array.from(document.querySelectorAll('.color-btn:not(:disabled)'));
                const currentFocus = document.activeElement;
                const currentIndex = buttons.indexOf(currentFocus);
                
                let newIndex;
                switch (e.key) {
                    case 'ArrowUp':
                    case 'ArrowLeft':
                        newIndex = currentIndex > 0 ? currentIndex - 1 : buttons.length - 1;
                        break;
                    case 'ArrowDown':
                    case 'ArrowRight':
                        newIndex = currentIndex < buttons.length - 1 ? currentIndex + 1 : 0;
                        break;
                }
                
                if (buttons[newIndex]) {
                    buttons[newIndex].focus();
                }
            }
            
            // Enter or Space to click focused button
            if ((e.key === 'Enter' || e.key === ' ') && document.activeElement.classList.contains('color-btn')) {
                e.preventDefault();
                if (window.audioManager) window.audioManager.playClickSound();
            }
        });

        // Add ARIA labels and focus management
        function updateAccessibility() {
            const colorBtns = document.querySelectorAll('.color-btn');
            const colorNames = Object.values(colors).map(c => c.name);
            colorBtns.forEach((btn, index) => {
                const colorName = colorNames[index] || 'צבע';
                btn.setAttribute('aria-label', `בחר צבע ${colorName} - מקש ${index + 1}`);
                btn.setAttribute('tabindex', gameActive ? '0' : '-1');
            });
            
            const startBtn = document.getElementById('startBtn');
            startBtn.setAttribute('aria-label', gameActive ? 'המשחק פעיל' : 'התחל משחק חדש - Enter או רווח');

            // Update timer with ARIA live region
            document.getElementById('timerFill')?.setAttribute('aria-live', 'assertive');
            document.getElementById('score').setAttribute('aria-live', 'polite');
        }

        // Initialize
        document.getElementById('colorOptions').style.opacity = '0.5';
        updateStats();
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
