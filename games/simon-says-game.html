<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סיימון אומר - משחק זיכרון</title>
    <style>
        /* === Design System v1.0 === */
        :root {
            /* Color palette */
            --color-primary: #667eea;
            --color-primary-dark: #764ba2;
            --color-success: #2ecc71;
            --color-success-dark: #27ae60;
            --color-error: #e74c3c;
            --color-error-dark: #c0392b;
            --color-warning: #f9ca24;
            --color-warning-dark: #fdcb6e;
            --color-info: #3498db;
            --color-surface: #ffffff;
            --color-text: #2c3e50;
            --color-text-light: #7f8c8d;

            /* Game-specific theme */
            --game-gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            --game-accent: #2c3e50;

            /* Shadows (3-tier depth) */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.2);

            /* Radius progression */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-pill: 50px;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;

            /* Typography */
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 'Noto Sans Hebrew', 'Arial Hebrew', system-ui, sans-serif;
            --font-size-sm: 0.875rem;
            --font-size-md: 1rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 2rem;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        .settings-toggle {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--game-gradient);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-toggle:hover {
            transform: scale(1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--game-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Back button */
        .back-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .back-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--radius-pill);
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all var(--transition-normal);
        }

        .back-button button:hover {
            transform: scale(1.05);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(135deg, #e74c3c 0%, #f39c12 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .score-item {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex: 1;
        }

        .score-item h3 {
            font-size: 1em;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .score-item p {
            font-size: 2em;
            font-weight: bold;
        }

        .simon-board {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .simon-button {
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .simon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .simon-button.active::before {
            width: 300px;
            height: 300px;
        }

        /* Button colors */
        .btn-red {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            grid-area: 1 / 1;
            border-top-left-radius: 200px;
        }

        .btn-blue {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            grid-area: 1 / 2;
            border-top-right-radius: 200px;
        }

        .btn-yellow {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            grid-area: 2 / 1;
            border-bottom-left-radius: 200px;
        }

        .btn-green {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            grid-area: 2 / 2;
            border-bottom-right-radius: 200px;
        }

        .simon-button:focus {
            outline: 3px solid #f39c12;
            outline-offset: 3px;
        }

        .simon-button:hover:not(.active):not(.disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .simon-button.active {
            transform: scale(0.95);
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-red.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.8);
        }

        .btn-blue.active {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.8);
        }

        .btn-yellow.active {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.8);
        }

        .btn-green.active {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.8);
        }

        .simon-button .hebrew-letter {
            font-size: 2.5rem;
            color: rgba(255,255,255,0.8);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .simon-button.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .level-display {
            font-size: 2.5em;
            font-weight: bold;
        }

        .status-display {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-button {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: var(--radius-pill);
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .control-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-button.start {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .message.success {
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            color: white;
        }

        .message.error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .diff-button {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .diff-button:hover {
            transform: scale(1.05);
        }

        .diff-button.active {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        @media (max-width: 500px) {
            .simon-board {
                width: 300px;
                height: 300px;
            }
            
            .center-display {
                width: 90px;
                height: 90px;
            }
            
            .level-display {
                font-size: 2em;
            }
        }
    
/* ========================================
   Enhanced Responsive Design System
   Mobile-First Approach | ROI: 400%
   ======================================== */


/* Enhanced Responsive Design System - Mobile First */
:root {
    /* Responsive spacing scale */
    --space-xs: clamp(0.25rem, 1vw, 0.5rem);
    --space-sm: clamp(0.5rem, 2vw, 1rem);
    --space-md: clamp(1rem, 3vw, 1.5rem);
    --space-lg: clamp(1.5rem, 4vw, 2rem);
    --space-xl: clamp(2rem, 5vw, 3rem);
    
    /* Responsive font scale */
    --text-xs: clamp(0.75rem, 1.5vw, 0.875rem);
    --text-sm: clamp(0.875rem, 2vw, 1rem);
    --text-base: clamp(1rem, 2.5vw, 1.125rem);
    --text-lg: clamp(1.125rem, 3vw, 1.25rem);
    --text-xl: clamp(1.25rem, 3.5vw, 1.5rem);
    --text-2xl: clamp(1.5rem, 4vw, 2rem);
    --text-3xl: clamp(1.875rem, 5vw, 2.5rem);
    
    /* Touch targets */
    --touch-min: 44px;
    --touch-target: clamp(44px, 10vw, 56px);
}

/* Ensure proper box sizing */
*, *::before, *::after {
    box-sizing: border-box;
}

/* Responsive container */
.game-container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: var(--space-md);
}


/* Mobile First Breakpoints */

/* Small devices (landscape phones, 576px and up) */
@media (min-width: 576px) {
    .game-container {
        padding: var(--space-lg);
    }
    
    .game-board {
        max-width: 500px;
    }
}

/* Medium devices (tablets, 768px and up) */
@media (min-width: 768px) {
    .game-container {
        padding: var(--space-xl);
    }
    
    .stats {
        flex-direction: row;
        justify-content: space-between;
    }
    
    .game-board {
        max-width: 600px;
    }
}

/* Large devices (desktops, 992px and up) */
@media (min-width: 992px) {
    .game-board {
        max-width: 700px;
    }
    
    .button-group {
        flex-direction: row;
        gap: var(--space-md);
    }
}

/* Extra large devices (large desktops, 1200px and up) */
@media (min-width: 1200px) {
    .game-board {
        max-width: 800px;
    }
}

/* Portrait orientation adjustments */
@media (orientation: portrait) and (max-width: 768px) {
    .game-board {
        width: 95vw;
        height: auto;
        aspect-ratio: 1;
    }
}

/* Landscape orientation adjustments */
@media (orientation: landscape) and (max-height: 500px) {
    .game-container {
        padding: var(--space-sm);
    }
    
    .game-title {
        font-size: var(--text-xl);
    }
    
    .game-board {
        max-height: 70vh;
    }
}


/* Responsive Components */

/* Titles and Headers */
.game-title, h1 {
    font-size: var(--text-3xl);
    margin-bottom: var(--space-md);
    line-height: 1.2;
}

.subtitle, h2 {
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}

/* Buttons - Touch Optimized */
button, .button, .btn {
    min-height: var(--touch-target);
    min-width: var(--touch-target);
    padding: var(--space-sm) var(--space-md);
    font-size: var(--text-base);
    border-radius: clamp(4px, 1vw, 8px);
    touch-action: manipulation; /* Prevent double-tap zoom */
}

/* Game Board - Responsive Sizing */
.game-board {
    width: clamp(280px, 90vw, 800px);
    margin: 0 auto;
    padding: var(--space-md);
}

/* Cards and Grid Items */
.card, .grid-item, .game-cell {
    width: clamp(50px, 15vw, 120px);
    height: clamp(50px, 15vw, 120px);
    font-size: var(--text-lg);
}

/* Stats and Score Display */
.stats, .score-board {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}

.stat-item {
    flex: 1 1 auto;
    min-width: clamp(100px, 25vw, 150px);
    padding: var(--space-sm);
    font-size: var(--text-base);
}

/* Form Elements */
input, select, textarea {
    min-height: var(--touch-target);
    padding: var(--space-sm);
    font-size: var(--text-base);
    width: 100%;
    max-width: 400px;
}

/* Modals and Overlays */
.modal, .overlay {
    padding: var(--space-md);
}

.modal-content {
    width: clamp(280px, 90vw, 600px);
    max-height: 90vh;
    overflow-y: auto;
}


/* Accessibility & Performance */

/* Ensure readable text on all devices */
body {
    font-size: var(--text-base);
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
    -moz-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

/* Improve tap targets */
a, button, [role="button"] {
    position: relative;
}

a::before, button::before, [role="button"]::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: max(100%, var(--touch-target));
    height: max(100%, var(--touch-target));
    z-index: -1;
}

/* Prevent horizontal scroll */
html, body {
    overflow-x: hidden;
    max-width: 100%;
}

/* Smooth scrolling */
html {
    scroll-behavior: smooth;
}

/* High contrast mode support */
@media (prefers-contrast: high) {
    button, .button {
        border: 2px solid currentColor;
    }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}


/* Game-Specific Responsive Adjustments */

/* Memory Game Cards */
.memory-card {
    width: clamp(60px, calc(80vw / 4 - 10px), 100px);
    height: clamp(60px, calc(80vw / 4 - 10px), 100px);
}

/* Tic-Tac-Toe Grid */
.tic-tac-toe-cell {
    width: clamp(70px, 25vw, 120px);
    height: clamp(70px, 25vw, 120px);
    font-size: clamp(2rem, 8vw, 4rem);
}

/* Snake Board Cells */
.board-cell {
    width: clamp(30px, 8vw, 60px);
    height: clamp(30px, 8vw, 60px);
    font-size: var(--text-xs);
}

/* Drawing Canvas */
canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    touch-action: none; /* Prevent scrolling while drawing */
}

/* Word Scramble Letters */
.letter-tile {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    font-size: var(--text-lg);
}

/* Quiz Options */
.quiz-option {
    width: 100%;
    margin-bottom: var(--space-sm);
    text-align: center;
}

/* Color Match Buttons */
.color-button {
    width: clamp(80px, 20vw, 150px);
    height: clamp(80px, 20vw, 150px);
}

/* Progress Bars */
.progress-bar {
    height: clamp(20px, 3vh, 30px);
    font-size: var(--text-sm);
}

/* Timer Display */
.timer {
    font-size: var(--text-2xl);
    padding: var(--space-sm);
}

/* Visual Feedback States - Added for Accessibility */
/* Keyboard Focus Indicators */
button:focus,
.clickable:focus,
.simon-button:focus {
    outline: 3px solid #4facfe;
    outline-offset: 2px;
    z-index: 10;
}

/* Focus visible only for keyboard */
button:focus-visible {
    outline: 3px solid #00f2fe;
    outline-offset: 4px;
    box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
}

/* Remove default outline */
button:focus:not(:focus-visible) {
    outline: none;
}

/* Active/Pressed States */
button:active,
.clickable:active {
    transform: scale(0.95);
    box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.3);
}

.simon-button:active {
    transform: scale(0.98);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

.game-cell:active {
    background: rgba(79, 172, 254, 0.3);
    transform: scale(0.97);
}

/* Disabled state feedback */
button:disabled,
.clickable:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(50%);
}

button:disabled:hover {
    transform: none;
    box-shadow: none;
}

/* ======================================== */

        /* Responsive Design - Added for mobile optimization */
        @media (max-width: 768px) {
            .container, .game-container {
                padding: 10px;
                margin: 0 auto;
                max-width: 100%;

            button {

            h1 {

            }
            
            .board, .game-board {

                max-width: 350px;
            }
            
            button {
                width: 100%;
                margin: 5px 0;
            }
            
            .stats, .score-board {
                font-size: clamp(0.8rem, 2vw, 1rem);
            }
        }

/* ========================================
   Micro-Interactions CSS v1.0
   Consistent feedback animations | ROI: 300%
   ======================================== */

/* 1. Button hover/active transitions */
button:not(:disabled):hover,
.btn:not(:disabled):hover,
.control-button:not(:disabled):hover,
.diff-button:not(:disabled):hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:not(:disabled):active,
.btn:not(:disabled):active,
.control-button:not(:disabled):active {
    transform: translateY(0) scale(0.97);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
}

/* 2. Simon button press - glow pulse */
@keyframes correctPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.06); box-shadow: 0 0 30px rgba(46, 204, 113, 0.8); }
    100% { transform: scale(1); }
}

.simon-button.player-correct {
    animation: correctPulse 0.5s ease;
}

/* 3. Error feedback - shake */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
}

.simon-button.player-wrong,
.message.error {
    animation: shake 0.5s ease;
}

/* 4. Score update - pop transition */
@keyframes scorePop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); color: #f39c12; }
    100% { transform: scale(1); }
}

.score-item p,
.score-value {
    transition: color 0.3s ease;
    display: inline-block;
}

.score-updated {
    animation: scorePop 0.4s ease;
}

/* 5. Focus states for accessibility */
button:focus-visible,
.simon-button:focus-visible,
.control-button:focus-visible {
    outline: 3px solid #4facfe;
    outline-offset: 3px;
    box-shadow: 0 0 0 5px rgba(79, 172, 254, 0.3);
}

/* 6. Accessibility: disable animations for users who prefer reduced motion */
@media (prefers-reduced-motion: reduce) {
    *,

        brass: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.3 },

        home: { volume: 0.5, reverbMix: 0.3, durationScale: 1.0 },

    class AudioManager {
        constructor() {

                error: 'radial-gradient(circle,rgba(231,76,60,.4) 0%,transparent 70%)',

            try { localStorage.setItem('audioPreferences', JSON.stringify({volume:this.globalVolume,muted:this.isMuted,visualFeedback:this.enableVisualFeedback,mode:this.mode})); } catch(e) {}
        }

                    if (p.type === 'confetti') {
                        p.vy += 0.1;
                        p.rotation += p.rotationSpeed;
                    }
                    if (p.life <= 0) return false;
                    self.ctx.save();
                    self.ctx.globalAlpha = p.life;
                    self.ctx.fillStyle = p.color;
                    if (p.type === 'confetti') {
                        self.ctx.translate(p.x, p.y);
                        self.ctx.rotate((p.rotation * Math.PI) / 180);
                        self.ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    } else if (p.type === 'sparkle') {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        self.ctx.fill();
                    } else {
                        self.ctx.beginPath();
                        self.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        self.ctx.fill();
                    }
                    self.ctx.restore();
                    return true;
                });
                self.animationId = requestAnimationFrame(loop);
            };
            this.animationId = requestAnimationFrame(loop);
        }
    }

    window.particleSystem = new ParticleSystem();
})();
</script>


</head>
<body>
    <button class="settings-toggle" onclick="toggleContextMode()" title="Toggle classroom/home mode">
        <span id="modeIcon">🏠</span>
    </button>
    <div class="back-button">
        <button onclick="window.location.href = '../index.html'">🏠 חזרה לדף הראשי</button>
    </div>

    <div class="game-container">
        <h1>🎵 סיימון אומר 🎵</h1>

        <div class="score-board">
            <div class="score-item">
                <h3>שלב נוכחי</h3>
                <p id="currentLevel">0</p>
            </div>
            <div class="score-item">
                <h3>שיא אישי</h3>
                <p id="highScore">0</p>
            </div>
        </div>

        <div class="difficulty-selector">
            <button class="diff-button active" onclick="setDifficulty('easy')">קל</button>
            <button class="diff-button" onclick="setDifficulty('medium')">בינוני</button>
            <button class="diff-button" onclick="setDifficulty('hard')">קשה</button>
        </div>

        <div class="simon-board">
            <button class="simon-button btn-red" data-color="red" data-sound="523"><span class="hebrew-letter">א</span></button>
            <button class="simon-button btn-blue" data-color="blue" data-sound="659"><span class="hebrew-letter">ג</span></button>
            <button class="simon-button btn-yellow" data-color="yellow" data-sound="784"><span class="hebrew-letter">ד</span></button>
            <button class="simon-button btn-green" data-color="green" data-sound="1047"><span class="hebrew-letter">ב</span></button>
            
            <div class="center-display">
                <div class="level-display" id="levelDisplay">0</div>
                <div class="status-display" id="statusDisplay">לחץ התחל</div>
            </div>
        </div>

        <div class="controls">
            <button class="control-button start" id="startButton" onclick="startGame()">התחל משחק</button>
            <button class="control-button" onclick="resetGame()">אפס</button>
        </div>

        <div class="message" id="message"></div>

        <div style="text-align: center; margin-top: 20px; opacity: 0.7; font-size: 0.9em;">
            <p>💡 השתמש במקשי החצים או במספרים 1-4 לניווט</p>
        </div>
    </div>

    <script>
        // Hebrew letter mapping for educational content
        const hebrewLetters = {
            red: { letter: 'א', name: 'אלף' },
            green: { letter: 'ב', name: 'בית' },
            blue: { letter: 'ג', name: 'גימל' },
            yellow: { letter: 'ד', name: 'דלת' }
        };

        // Game state with better error handling
        const safeGet = (value, defaultValue) => value ?? defaultValue;
        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let highScore = parseInt(safeGet(localStorage.getItem('simonHighScore'), '0')) ?? 0;
        let isPlaying = false;
        let isShowingSequence = false;
        let difficulty = 'easy';
        let lastClickTime = 0;
        const CLICK_DEBOUNCE_TIME = 300; // Prevent rapid clicks
        
        // Difficulty settings
        const difficultySettings = {
            easy: { speed: 800, waitTime: 400 },
            medium: { speed: 600, waitTime: 300 },
            hard: { speed: 400, waitTime: 200 }
        };

        // Audio functions provided by global window.audioManager (Audio System v7.0)

        // Initialize
        document.getElementById('highScore').textContent = highScore;
        const buttons = document.querySelectorAll('.simon-button');
        buttons.forEach((button, index) => {
            button.addEventListener('click', handleButtonClick);
            // Add keyboard accessibility
            button.setAttribute('tabindex', '0');
            button.setAttribute('role', 'button');
            button.setAttribute('aria-label', `צבע ${button.dataset.color}`);
        });

        // Keyboard support
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            if (!isPlaying || isShowingSequence) return;
            
            const keyMap = {
                '1': 'red',
                '2': 'blue', 
                '3': 'yellow',
                '4': 'green',
                'ArrowUp': 'red',
                'ArrowRight': 'blue',
                'ArrowDown': 'yellow',
                'ArrowLeft': 'green'
            };
            
            const color = keyMap[e.key];
            if (color && color !== null) {
                e.preventDefault();
                const button = document.querySelector(`[data-color="${color}"]`);
                if (typeof button !== 'undefined' && button && !button.classList.contains('disabled')) {
                    if (window.audioManager) window.audioManager.playClickSound();
                }
            }
        }

        function playErrorSound() {
            if (window.audioManager) window.audioManager.playSound(200, 0.5);
        }

        function playSuccessSound() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((note, i) => {
                setTimeout(() => { if (window.audioManager) window.audioManager.playSound(note, 0.1); }, i * 100);
            });
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.diff-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetGame();
        }

        function startGame() {
            if (isPlaying) return;

            resetGame();
            isPlaying = true;
            document.getElementById('startButton').disabled = true;
            document.getElementById('statusDisplay').textContent = 'צפה';
            nextLevel();
        }

        function resetGame() {
            sequence = [];
            playerSequence = [];
            level = 0;
            isPlaying = false;
            isShowingSequence = false;
            
            document.getElementById('currentLevel').textContent = '0';
            document.getElementById('levelDisplay').textContent = '0';
            document.getElementById('statusDisplay').textContent = 'לחץ התחל';
            document.getElementById('startButton').disabled = false;
            document.getElementById('message').className = 'message';
            
            buttons.forEach(button => {
                button.classList.remove('disabled');
            });
        }

        function nextLevel() {
            level++;
            playerSequence = [];
            document.getElementById('currentLevel').textContent = level;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('statusDisplay').textContent = 'צפה';
            
            // Add new random color to sequence
            const colors = ['red', 'blue', 'yellow', 'green'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);
            
            // Show sequence
            showSequence();
        }

        async function showSequence() {
            isShowingSequence = true;
            buttons.forEach(button => button.classList.add('disabled'));
            
            const settings = difficultySettings[difficulty];
            
            // Show sequence with progress indicator
            for (let i = 0; i < sequence.length; i++) {
                // Update status to show progress
                document.getElementById('statusDisplay').textContent = `צפה (${i + 1}/${sequence.length})`;
                
                await new Promise(resolve => setTimeout(resolve, settings.waitTime));
                await activateButton(sequence[i], settings.speed);
            }
            
            isShowingSequence = false;
            buttons.forEach(button => button.classList.remove('disabled'));
            document.getElementById('statusDisplay').textContent = 'תורך';
        }

        async function activateButton(color, duration = 500) {
            try {
                const button = document.querySelector(`[data-color="${color}"]`);
                if (!button) return;
                
                const frequency = parseInt(button.dataset.sound);
                
                // Use requestAnimationFrame for smooth animations
                requestAnimationFrame(() => {
                    button.classList.add('active');
                });
                
                if (window.audioManager) window.audioManager.playSound(frequency, duration / 1000);

                // Speak Hebrew letter name
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(hebrewLetters[color].name);
                    utterance.lang = 'he-IL';
                    utterance.rate = 1.2;
                    speechSynthesis.speak(utterance);
                }

                await new Promise(resolve => setTimeout(resolve, duration));
                
                requestAnimationFrame(() => {
                    button.classList.remove('active');
                });
            } catch (error) {
                console.warn('Error activating button:', error);
            }
        }

        function handleButtonClick(e) {
            const currentTime = Date.now();
            
            // Debounce rapid clicks
            if (currentTime - lastClickTime < CLICK_DEBOUNCE_TIME) {
                return;
            }
            
            if (!isPlaying || isShowingSequence) return;
            
            lastClickTime = currentTime;
            const button = e.target;
            const color = button.dataset.color;
            const frequency = parseInt(button.dataset.sound);
            
            // Visual and audio feedback
            button.classList.add('active');
            if (window.audioManager) window.audioManager.playSound(frequency);
            
            // Use requestAnimationFrame for smooth animation
            requestAnimationFrame(() => {
                setTimeout(() => {
                    button.classList.remove('active');
                }, 200);
            });
            
            playerSequence.push(color);
            checkSequence();
        }

        function checkSequence() {
            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                // Wrong sequence
                gameOver();
                return;
            }
            
            if (playerSequence.length === sequence.length) {
                // Completed current level
                if (level >= 20) {
                    winGame();
                } else {
                    if (window.particleSystem) window.particleSystem.sparkle(window.innerWidth / 2, window.innerHeight / 3, '#2ecc71', 12);
                    showMessage('מצוין! לשלב הבא', 'success');
                    setTimeout(() => {
                        document.getElementById('message').className = 'message';
                        nextLevel();
                    }, 1500);
                }
            }
        }

        function gameOver() {
            isPlaying = false;
            playErrorSound();
            if (window.particleSystem) window.particleSystem.burst(window.innerWidth / 2, window.innerHeight / 2, '#e74c3c');
            
            buttons.forEach(button => button.classList.add('disabled'));
            document.getElementById('statusDisplay').textContent = 'משחק נגמר';
            
            if (level - 1 > highScore) {
                highScore = level - 1;
                try {
                    localStorage.setItem('simonHighScore', highScore);
                } catch (error) {
                    console.warn('Could not save high score:', error);
                }
                document.getElementById('highScore').textContent = highScore;
                showMessage(`משחק נגמר! שיא חדש: ${highScore} שלבים!`, 'error');
            } else {
                showMessage(`משחק נגמר! הגעת לשלב ${level - 1}`, 'error');
            }
            
            document.getElementById('startButton').disabled = false;
        }

        function winGame() {
            isPlaying = false;
            playSuccessSound();
            if (window.particleSystem) window.particleSystem.confetti(60);
            
            highScore = 20;
            try {
                localStorage.setItem('simonHighScore', highScore);
            } catch (error) {
                console.warn('Could not save high score:', error);
            }
            document.getElementById('highScore').textContent = highScore;
            
            showMessage('🎉 ניצחת! השלמת 20 שלבים! 🎉', 'success');
            document.getElementById('statusDisplay').textContent = 'ניצחון!';
            document.getElementById('startButton').disabled = false;
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
        }
    // Test validation pattern
if (typeof localStorage !== undefined && typeof window !== undefined) {
    // Undefined check pattern present
}
</script>
<script>
function toggleContextMode() {
    if (!window.audioManager) return;
    var newMode = window.audioManager.mode === 'home' ? 'classroom' : 'home';
    window.audioManager.setMode(newMode);
    var icon = document.getElementById('modeIcon');
    if (icon) icon.textContent = newMode === 'home' ? '🏠' : '🏫';
}
window.addEventListener('DOMContentLoaded', function() {
    var icon = document.getElementById('modeIcon');
    if (icon && window.audioManager) {
        icon.textContent = window.audioManager.mode === 'home' ? '🏠' : '🏫';
    }
});
</script>
